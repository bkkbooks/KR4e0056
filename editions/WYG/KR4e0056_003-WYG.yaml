body:
  text: 耕學齋詩集巻三明袁華撰五言古詩至正乙巳紀興炎精罹阨㑹新都肆奸媮竊權造符命居攝倣伊周甄阜主擊斷王邑叅謀猷殺子墮三綱進女位長秋金匱授神禪即真成篡謀民心本思漢天意終眷劉二八火為主龍奮南陽秋發兵捕不道前騎驅旄頭一皷入長安尚阻漸臺流周還威斗柄按式審休囚傳首詣宛下黔黎起歌謳帝王有真數智力焉能求區區事譎詐萬古徒貽羞揚䧺莽大夫陶潛晋處士校書天禄閣歸耕柴桑里陶情緑酒傾凖易太𤣥擬文章既雄世出處多殊軌直書義自見珎重子朱子朱樓臨大道畵㦸列髙門問是誰人第䟽封兩國尊任俠若孟公養士擬平原客趿明珠履宰胹封熊蹯長兒尚公主中子守名藩睥睨仇讎報誅求鄉里怨一朝被流放不得窺田園富貴如浮雲飄散豈常存階有蒿萊長門無車馬喧鵂鶹鳴廢井鼯䑕上頽垣豪華易凋歇往事那可論空餘乞墦者猶是俠王孫閭閻輕薄兒掉臂起亂離捐生取功名狥財忘險􅇖魚麗朝結陳肉薄夜登陴論功秉節鉞干城羅虎貔玉刻鹿盧劍翠織蝥弧旗燕馬飽芻豆韓盧厭肉糜晏安懐酖毒富貴履危機飛言起不測車裂徇其屍空令行路人感慨興嗟咨所以昌黎翁為賦召南詩城西有冶女被服何姍姍白玉搔頭鳳黄金㔩髩蟬肌膚若氷雪標格擬神仙不聞傅姆教自擇心所憐俠逰者誰子東家惡少年椎埋白日内剽擊大道邊目成如宿約竊出夜私奔託身不分明色衰中棄捐男兒慎出處景行當勉旃貞哉宿瘤女千古稱其賢蒼龍何煌煌芒角在東方感時耿無寐起視夜未央晨興糞田疇灑流固隄防糓雨扇條風負耒欲分秧立苖本欲䟽薅鉏莠與稂耕耘不鹵莾所報千斯倉豈惟田畯喜婦子亦洋洋嚴霜降中野黍稌登圃塲上當輸國賦下以充餱粮于斯祀先農擊鮮羅酒漿飲福既賜胙再拜奉親嘗願親彌壽考黄耉膺天慶嚶嚶黄鳥鳴莫莫柔桑黝行行抱懿筐摻摻出素手長條手難扳卑枝鈎可取摘遲蠶苦饑姑嫜望來久惟願繭如山繅絲易升斗號寒固未免輸官安敢後輸官庶有餘染絲作長綬蕭闗夫戍還黄金印縣肘燕燕羽差池雙飛復雙止朝從舊主歸暮將舊巢理巢完乳我雛寜辭汙泥滓雄飛去不返雛長各他徙孤鳴芹塘中獨宿杏梁裏蒲栁風凄凄蒹葭露泥泥紅縷繫將離孌彼玉京氏别來隔黄壚飛投墓門死禽鳥尚有知人胡不循禮夭天原上桃濯濯園中栁商飆颯然至榮華變衰朽青年不努力白髪倐盈首身後千載名生前一盃酒歸與東曹掾還為蓴鱸否人生居世間弱草栖輕塵胡為事微利汨汨疲精神牙籌較錙銖㑹計夜逹晨黄金積成埒焉能葆吾真題凑錮三泉虆梩亦掩身貴賤同一死感慨為酸辛不同草木腐予懐古其人過張子英閒止齋閲法書名畵歩出甘泉坊始得閒止齋雖廹市中襍頗惬靜者懐閲架發古秘展玩心所諧方忻晝晷永適際風日佳䟽花鄂韡韡好鳥鳴喈喈回策古城隅叢祠臨水涯喬木暝烟合遥峰夕嵐霾寤歌遂成章聊以慰離乖郊居郊居旭日旦草木發華妍沃壤潤含雨芳林澹浮烟飛鳴變新聲游泳戱清漣所忻氣候和那計莭序遷逍遥城闕中放浪江浦邊曉從銕塘去暮向樊邨還上懐舞雩詠下擬歸田篇宴安古所戒躬耕樂天年野航軒雅集分韻得秋字今日有佳景野航俯清婁酒從碧筩㵼烟向博山浮長林樹隂密方池水氣秋蟬依疎葉語魚唼落花遊暌離獲良覯飛光為遲留題金人校獵圖朔風吹驚沙樺林葉斕斒獸肥馬驍䧺校獵出天山曉踰黄龍塞暮過居庸闗騂弓金僕姑寳刀龍爵鐶鴐鵝天際落小隊磧邊還題頋玉山摘阮小像夫君青雲姿逍遥在丘園㝠心絶遐想燕坐息衆喧攤書白石上摘阮青松根乃非竹林叟似是醴陵孫題頋玉山讀道書小像靈岳聳層霄璚館開金鄉若人秉昭質守一修洞房呼吸龍虎氣𠻳嚥日月芒龜闕西瑶䑓中有明光章下授小兆臣玉檢鸞回翔稽首校隠文琅函耀霞光絳蕉承寳露肉芝冐𤣥霜采掇充服食味傾金梨漿逍遥澹無為壽期穹壤長宿承天寺方丈分韻得深字朝遊雙峨陽暮宿雪堂隂月落踈鐘度霜寒清夜深談𤣥析奥義觀妙徵素心白業儻可修攅眉重相尋賦得江上女蓀橈送桂旌沿洄多冶情扳條約翠䄂掬水弄璚英清吹隨風度纎腰束素明家居白下里夫戍洛陽城明光朝執㦸細栁夜分營許國承恩重忘歸念妾輕貞心似江水朝夕向東傾題松崖圗青山上無極白雲冠其顛旭日照髙林丹碧何鮮妍中有學仙者㝠栖遺世緣天風鼓海濤和以朱絲絃斸苓采白石汲澗煮清泉揮手謝時人飛行凌紫烟嘉樹軒分韻得報字艤舟綽山陽重湖水澄浩百年植嘉樹森列若旌纛眄兹亂心曲觸景起哀悼酌泉薦蘋蘩再拜酹神道嗟哉撫育恩罔極何以報頋曕白雲飛囘翔復髙蹈散策日未昬微懐寄幽討題丘克莊敬雲樓層樓照宏敞大澤起絪緼容容上承宇靄靄度微芬思親惜流景懐土念離羣拄笏延清賞西山未夕曛寄頋玉山窮櫩坐風雨泥涂寡來輈麴生不我即何以寛離憂梧桐漸凋落蟄蟲尚喧啾感時發長歎懐人動遐愁空持菊花詠悵望楚天秋題張復初所藏倪雲林畵春草藹碧色春泉流白雲時覔漁樵侣行穿麋鹿羣覧古發長歗尋幽探秘文姢姢雙徑月流景照夫君秋夜懐友玉露洗空碧銀潢澹無波懐人起遐想況兹良夜何俯聽百蟲泣仰觀衆星多驚烏未遑息飛鳴擇叢柯中心百感集豈謂悲蹉跎終羡林居子躬耕樂太和東臯隠居集陶詩少無適俗韻山澤久見招結廬在人境種苖在東臯披榛歩荒墟晨出肆微勞坐止髙䕃下我行豈不遥繞屋樹扶䟽歛襟獨逍遥渉暑驚秋霜寒風拂枯條時駛不可稽濁酒且自陶提壺挂寒柯聊以咏今朝世短意常多乆去山澤遊草廬寄窮巷嘉穗養南疇凄凄風露支司田眷有秋我實幽居士終懐在歸舟有客賞我趣引滿更獻酧菊為制頽齡酒云消百憂至德冠邦閭自古有黔婁宿白蓮寺桂子軒分韻得月字幽夐阿蘭若逍遥謝城闕池廻白蓮風林墮青桂月語深𤣥理釋心清妙香發道人澹無為悠然思超忽樓上觀蕩舟婦蕙樓臨廣甸蘭塘通曲湖山光落烏几水影上蝦須蕩槳誰家子輕舟迅若鳬扳蓮覔嘉藕剥芡弄明珠送謌情婉孌賣眼意踟蹰姑嫜在堂上返照下桑榆春暉樓前玉繡毬十月試花中園有嘉植凌寒開一枝粉香飄玉質霜氣薄璚肌豈愁冰雪妬應負燕鶯期彷彿唐昌觀依稀后土祠撫時驚節序對酒念暌離太息風塵際看花慰所思半月池靈源發龍泓奫停湛空碧影斜瑶臺鏡氣壓橋門壁蜿蟺菖蒲根贔屭蛟龍跡相期學仙徒握手弄雲液賦得館娃宫送友人之武岡城歩廵檢驅車閶闔門息駕靈岩下靈岩信清麗維兹館娃所稚子停宵征於焉同覽古夫差昔好奢築宫置歌舞璇題麗層霄丹碧耀平楚藻幄曵華幔妒寵爭媚嫵采香朝艤舟響屧暮清暑代謝人事遷商飆動禾黍俛懐諸宫勝亦復一丘土不作楚囚悲將軍本雄武題趙仲穆蘭窈窕楚臯女委蛇佩陸離凌風翳翠袖乘月靡雲旗含嚬嘿延佇怊悵失佳期涉江采璚芳將以遺所思髙人養沖素絶粒栖璚林遊盼瑶華圃珥節閬風岑手持碧玉苗幽香散煩襟相思不可見落日楚江隂送張子正謁選赴都巍峩鳷鵲觀岧嶤鳳凰城衣冠列劔佩龍蛇動旗旌碧漲御溝水聲啼上林鶯覽物寫情思無媿水曹名次韻答秦文仲晨興謝囂襍晞髪㘴廣庭零露泫叢條初日薄東榮矯首懐友生惻愴難為情有酒但斟酌莫嗟年運傾桐川秋夕驅車復驅車駕言適他鄉他鄉非故里相知邈何方敗葉鳴寒蛩素月流空房仰眎河漢髙安得凌風翔商飇下木葉遊子寒無衣山川良阻修嵗暮胡不歸目送孤飛鴻羽翼未有依願言守真素毋勞歌式微史仲先梅雪齋窮冬霜露繁堅冰凝大澤微陽地底回區萌將甲拆齋居觀物化光集飛霙白踈梅若髙士空谷聊自適操行雪比潔傾盖成莫逆峩冠柱下史晤對成三益交誼矢弗渝惟感流光易永訂嵗寒盟忠誠著金石夜宿福聚蘭若白露被衆草炎歊頓消歇散歩入重闗斜暉薄林樾蕭然古蘭若幽邃類岩穴同心偶相集論議何鋒發仰觀河漢髙清光流素月秋毫粲可數隠見白玉闕徘徊廣庭迥涼飇肅毛骨茗飲消渇吻野蓛錯肴核有客僅七人無酒行百罰庸僧太俗惡決去獸驚狘眷予坐最深吴霜㸃須髪衰病目偏盲材澀思枯渇多君儒林英詞源浩溟渤機錦織流黄佩玉刻剞劂或吟行徐徐或寐坐兀兀人生百年内流光嗟倐忽雄文屹巨碑富貴等滅沒始問平泉樹何如首陽蕨努力樹勲業毋為事汨汨送錢逹善之京師白露漙鞠蘂涼飇拂桂枝蕭條平原上黍稌何離離夫君戒行李撫景動遐思山川氣欝葱江河路委蛇青年事鉛槧說禮敦詩書韜鈐秘虎豹竒正分熊羆仰企前哲學節義矢弗虧行矣保令名黄耉以為期日夕佳軒集陶詩養真衡茅下好爵吾不榮榆栁䕃後園幽蘭生前庭神淵冩時雨相命肆農耕虚室絶塵想氣徹天宇明涼風起將夕歸鳥趨林嗚班荆坐松下盃盡壺自傾念之動中懐千載有餘情仲春釋奠燕集存道齋分韻得天字於穆素王廟層構何巋然時維中春月釋奠加豆籩犧尊酌醴齊鸞刀割牲牷陟降禮有序對越神在天竣事既徹爼朝暾曜芳鮮壇杏炫積雪池藻揚輕漣魯叟聖人胄幽齋肆方筵獻酧儀秩秩論辨言便便浩唱發清響希聲寄朱弦明時崇禮樂安車政徵賢題觀泉圖寒泉落幽澗絶壁凌長松之子逍遥遊遐觀意從容俯嗟逝水駛仰企髙山重蒼頭亦解事撰杖以相從送章生海州吏微風動蘋末木落海鄉秋冥鴻戾層霄輕橈泝中流泝流向何許淮水東悠悠青年不擇禄髙堂親白頭萬里起頃歩前途遐且修勿云刀筆賤請視漢廷侯嘉樹軒雙槐何亭亭交柯䕃華軒昔人去已逺手植今猶存寳露流層顛醴泉灌靈根枝葉日以茂子孫日以蕃願同紫荆樹永保矢弗諼夢鶴軒為殷之秀賦琳宫肅𢎞敞華館通曲密蘿月白紛紛竹風清瑟瑟至人本無夢恬澹志專一頎然羽衣仙胡造䂓中室同作鈞天遊飛行周八極蝶化漆園吏螘聚槐安國斯理倘能求至道諒可得萬竹亭髙士圖參差萬玉立窈窕一亭深不改冰霜操時聆鸞鳳音數等零陵石詩同淇澳吟頎然二髙士允若雙南金臨川嗟逝水焚香弦素琴昔賢不復作慨想豁冲襟雲松巢為定之賦結巢雲松裏幽閒意頗濃松聲發靈籟雲氣矯遊龍采拾聊可養持贈愧無蹤何當解塵鞅跨鶴以相從送葛進善遊京師黄鳥出谷鳴春陽被郊墟遊子觀國光薄言駕輕車龍虎勢盤踞回合抱帝居先下酈生揖次陳賈誼書獻納趨金馬校讐登石渠翻憐馮煖輩彈鋏歎無魚谿山讀書圖谿山讀書處衡宇窈且深白雲起層巔嘉禾秀䌓隂緬懐鄭谷耕時為梁甫吟斯人不可見拄笏對遥岑安素齋吴淞何渺漫朝夕流不已上有嘉樹林層軒俯江沚之人樂恬澹脫略紈與綺素履既坦坦安之良有以考祥保貞吉守黙忘賤恥馮髙時引望春還景妍美脩篁拂踈櫺埀楊䕃清泚何當一造門談妙析𤣥理竹林髙士圖淇澳水瀰瀰淇園竹猗猗有斐古君子燕坐淇之涯横琴未暇彈悠然有遐思興懐仰髙躅三復衛風詩送人歸杭春水滿南國櫻桃花未紅蘭舟衝雪去家在玉峯東青山當屋角緑樹覆庭中可憐兵燹後化為蒿棘叢感時心耿耿話别意忡忡林栖儻相憶題字送歸鴻寄逸閒叟義天求法地樓閣倚孱顔憶得舊遊日鳥鳴春樹間行循惠山澗坐對玉岑山逸師既卓錫談𤣥覺㝠頑室飛花似雨洞鎻銕為闗安能脱塵鞅卜居相往還賦得崑山送蔡廣文之子駕言邁春覽崑丘顛鍾秀自前古著名由昔賢昔賢去已逺兹山還巋然玉氣潤凝雨鶴聲清聞天遥思解組日何如入洛年獻納有餘暇為續崑山編次韻奉答印月潭講師炯然摩尼殊照彼圓覺海萬恠形靡逃連城價可待夜光燭蒼㝠歴刼耿不改上人心若珠隨方見五彩流通既無著幻化焉能浼朂爾崇令德優遊樂壽豈斥鷃搶榆枋大鵬摶瀚海所以蓽門士養志固有待貞心如皦日豈為窮逹改白駒不受縶少微自揚彩大節茍弗渝微名豈足浼願遂雞黍期共挹南風豈寄費舜臣印月潭户有讀書聲門多車轍跡丈夫豈長貧一椽聊止息草深蛙鳴池苔滋蝸篆壁俯憐東逝波仰羡南飛翼㑹心不在逺佳處輙終日玉子落文枰錦囊出緗帙相過南山僧戒律謹三尺何如尉遲子酒肉破孤寂原隰何畇畇華木亦莽莽深村寡輪鞅居民樂生聚水芝纔著花莎雞又振羽去日尚能推來日詎可數晷景嗟荏苒質性念椎魯何如證無生趺坐不出户逹人貴聞道仕士重守邊胡為事一室四序從推遷春花碧色敷夏木清隂圎草木亦有時力田尚逢年嗟余濩落材兀兀理殘編丈夫慎出處豈為利禄牽榮名若春花飄散隨風烟䟽雨過郊墟水竹生華妍緬懐靖節翁遇酒輙陶然過溪成大笑此理誰能宣遊永壽寺謁和義王祠復過興福月潭講師丈室秋原聊引望野渉自成趣意循洲渚轉目送江波注栁颸涼拂衣稻露香霑履欲作招提遊己辦濟勝具尋幽趨逺林習靜得佳處丹碧何焜煌樓觀出髙樹繄昔和義王奮身應君募錫封列茅土勛業埀竹素有子味禪悦建寺慰思慕先祠南廡下象設肅徒御雄姿儼若生朱衣佩寳璐緬懐襄樊日酣戰揮白羽宋室已不競皮去毛安傅頋瞻徘徊久秋陽薄沮洳囘策過講臺蒿萊沒行路丈室僅如斗虚空寳花雨上人除結習繽紛自飛去回睇祥峯閒曖曖隔烟霧于以紀兹行咿唔遂成句送彭從龍歸清江迎婦遊子駕言邁驅車楚山阿積雪明髙林落日照大河睠兹川涂長況值嵗暮何相送復相思看雲動悲歌朝陽有威鳳排雲九天來曉儀瀛海上暮落岐山隈覽徳時一下明良位三台還從嬴家女吹簫向層臺輕烟林際開素月川上起桂楫擊空明消揺汎容與美人隔秋水相望不得語臨流折芳馨所思在遺汝谿上桃始花溪流淨無沙偶得胡麻飯窮源路忘賒樓觀五色烟中有緑蕚華乞與續絃膠相期凌紫霞鶴巢為龍虎趙伯容賦伯容宋福王孫野鶴龍虎至故巢鳳凰顛故巢破勿理新巢小於拳修頸髙結喉𤣥裳何蹁躚曉栖三株樹夕餐五色烟左盼紫虛君右揖浮丘仙嘯歌空洞章覽景升上𤣥緬懐塵外蹤歸來是何年追賦玉蕋亭小集分韻得谿字華燈照髙宴方舟溯囘谿道里雖阻逺何期冠盖齊青陽動林莽積雪潤涂泥行酒玉蕋妥放歌碧雲低㑹合諒有定追賦慰離暌松林髙士圖層波蕩晴旭長松落清隂曳杖者誰子逍遥散冲襟野芳發幽香覽古動遐吟美人不可見相望楚江潯寄題袁仲傅緑筠軒吾宗有髙士種竹封禺顛交柯承寳露宻葉䕃璚泉消揺葛陂杖咏歌淇澳篇儻騎茅龍去為我謝辛鈃玉山草堂分韻得縁字草堂秋氣肅清唱送觥舩微風下髙樹華月麗中天雄辯酧支遁吟詩懐惠連驚烏栖擇木流螢低度川撫時情悒悒感舊意懸懸獨念玉山子冥心息衆縁賦得泰伯廟送鄭同夫歸豫章巍巍三讓廟廼在古城阿日月明衮裳殿陛列琱戈萬世尊至徳遺風亘不磨送君廟下路吴江秋水波谿西草堂旭日出谿東光照谿西屋屋中何所有牙籖縣玉軸門當五株栁窻立萬竿竹歸與絶奔競俛爾樂幽獨一笑歌濯纓谿水清可掬贈史君美為黄雲卿賦集藥名婁有史君子分甘草澤居昔曽青城遊袖秘玉函書質性既厚朴㓜懐鄉曲譽牽牛朝出耕蕭艾手自鉏野藿香可美籬鞠味堪菹吾友大黄君一病半夏餘維子多逺志從容駕軒車剖決明表裏調劑氣旋蘓媿乏明珠報長歌酒頻釃征鴻行當歸微陽起石渠相思子不見扳桂下庭除游鴛鴦湖分韻得落字寂寞虚齋靜汎覽方舟樂大隄横卧虹飛杠髙渡鵲川隂雲氣生水濶天光落荒苔積寳園壊壘鳴金橛余生感樗散撫景嗟離索行觴藉草飲斜陽下林薄壽寜菴夜宿偶成綽山游西風吹落日大田登禾黍髙林收棗栗仰羡松栢姿俯慙蒲柳質石縣王果崖花雨維摩室白雲浮茗甌縹囊散書帙撫事困誅求拯時之經術紛爭若螻螘相持如蚌鷸可憐鴟嚇䑕何異褌處蝨郊居便樵蘓野服忘巾櫛獨樂五畝園素封千樹橘被酒坐逃禪銘墓親操筆夢幻前後身道悟中邊蜜劇談更抵掌展席仍促膝煌煌斗廻杓耿耿月離畢水聲逺澎湃竹影互䝉宻清坐不知疲東方啓明出楚雲堂分韻得城字霜露悴百草風埃闇重城㝠鴻奮羽翰肅肅東南征感時増慨慷豈不懐友生美人忻㑹面開觴掇秋英燕坐適清賞髙梧含夕清厭厭樂未央明河漸西傾次韻張貞居明靜院蓮社東林白蓮社明靜今復建兩峯如五老秀色互爭獻外史淵明徒髙居樂貞遯入社眉雖攅許飲心所願西方九品華黙想不在問何當解塵纓趺坐聽髙論追賦芝雲堂小集窈窕玉山下樓觀何委蛇丹葩曜陽林金粟綴樛枝感兹節序遷四筵樂芳時桂酒傾鑿落蘭烟度罘罳雙歌聲嫋嫋屢舞影僛僛樂事古難并宿留阻深期何以慰所懐載歌停雲詩二月十日西園對雪艤舟東城阿張宴西園裏遥天黯同雲髙軒落䟽雨霏霏襍霰零冉冉微雪委先集長洲苑亂㸃脂塘水蹴絮翻新燕吹花起潛鯉初飛勢斜斜漸積光玼玼淒咽鸞笙澀徘徊翠袖靡人生貴適意流行隨所止底用銀燭燃清光照窻几芝雲堂夜集分韻得相字今夕復何夕張燕芝雲堂西風度江漢仰見征鴻翔坐中仙釋侣學道攻文章飄飄鸞鵠姿皎皎金玉相上客貌蒼古乃是李伯陽憶别昆丘顛十見木葉黄相逢玉山裏語舊熱中腸促席更秉燭深盃送瑶漿酒䦨登雪巢取琴弦清商一彈别鶴操再皷鳳求凰人生㑹合難引滿重舉觴與子各盡醉憂樂俱兩忘賦得佳人曉粧鳥啼瑣牕曙薄寒猶中人綵服龍香炙玉臺鸞鏡陳體輕腰束素歩細韈生塵洗粧初歛笑握髪半含嚬栁葉邀郎畫桃花倩妾匀蜂黄微㸃額猩血淺塗唇不畏秋孃妒那愁飛燕嗔淑姿豈長好貞心終不冺願為雙紫綬纒繞向渠身栁塘軒聽雨與謝子蘭同賦憶昔西游時揚颿楚江舩顛風俄送雨洪濤怒掀天飄揺蘆渚外滴瀝篷牕邊如馬齕枯萁澎湃驚晝眠北轅梁宋郊渡河上幽燕窮冬雨載道蹣跚行不前暝投野店宿土銼寒無烟卧聽耿不􅄰懐鄉思懸懸前年走亂離窮途屢回邅一月不見日誰能補天穿相對泣妻孥所憂溝壑捐間闗戎馬中幸獲窺田園窺園剪春韭桃李東風妍遥知江湖夜孤燈嗟十年有客毗陵來皁㡌霜盈顛奔逃患難餘與予同可憐豈無道里歸饑火方埀涎主人敬愛客開尊且留連幽軒落䟽雨秋水滿平川餘音散髙栁似聆清商絃剪燭對床話中心暢憂悁我還君未囘語極重悽然周漢終再昌恩澤沛八埏梯航四海通歸釣槎頭鯿呼兒帶經鋤白鶴溪之壖異時倘相覔毋忘聴雨篇耕學齋詩集巻三
