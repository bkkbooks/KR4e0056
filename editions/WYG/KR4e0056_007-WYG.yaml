body:
  text: 耕學齋詩集巻七明袁華撰古詩七言送朱道原歸京師君不見范蠡謀成吴社屋歸來扁舟五湖曲之齊之陶變姓名治産積居與時逐又不見子貢學成退仕衛廢舉鬻財齊魯地髙車結駟聘諸侯所至分庭咸抗禮馬醫洒削業雖微亦將封居埀後世胸蟠萬巻不療饑孰謂工商為末藝泉南有客陶朱孫大舶東望扶桑暾石塘萬里限弱水貝闕珠宫光吐吞直窮南海極西海生擒蠻冦龍牙門島衣卉服識名姓懋遷有無爭駿奔聖明文徳洽區夏詔遣移家居闕下親聆天語覲天言豈是尋常行賈者兹来婁上督諸商㑹看重譯貢殊方明珠撒殿獻琛賮天王端拱當明堂朱君朱君不易得務財逐利通絶域只今太史筆如椽汗簡殺青書貨殖趙仲穆幽禽圗水精宫中春己深雕鞍遊騎蹋湖隂金丸不打返哺烏彩筆自寫孤飛禽明牕棐几光相暎吮墨含毫清晝靜王孫不歸春草生鷗波萬頃兼天浄陪頋仲瑛祭張貞居回飲湖中分韻得竒字連朝風雨不出户今朝雨晴山色竒湧金門頭買畫舫黎明徑度湖之湄張公學仙靈石塢藏書瘞劔荒山陲丹成馭氣九天上長松落日風颸颸玉山草堂素有期死生契闊良可悲刲羊載酒拜祠下俯仰今古興遐思君不見附子岡頭師相墓只今惟有草離離錢塘錢思復匡廬于彦成㓜同筆研重㑹於頋玉山許思復賦詩邀予次韻㑹稽外史𤣥都客手校玉文坐瑶席一别中岳三十年谷媿林慙少顔色白水真人冰雪容曽訪盧鴻至寜極翩然而來動遐興飛適丹崖千丈壁相逢忽在玉山中不計人間嵗年易赤城霞外憶同遊石洞桃花幾回碧桑田變海海揚塵也知狡獪今非昔玉山八月秋正好銀潢西㵼星虚直紫簫吹月酒如淮露華洗天天影濕御風不作三山遊豢龍歸應西池役儻過金馬到玉堂為我問訊衆仙伯春暉樓牡丹春暉樓前牡丹樹喜見新花發舊槎深根培植雨露厚不待羯鼓花奴撾紫黄紅白緋與碧牙牌小篆蟠龍蛇玉環飛燕兩傾國國色暈酒凝朝霞就中一枝最傑出金鈴繡幄相籠遮前年作客浙水上去年避地苕谿涯千葩萬卉自開落媿我不見空咨嗟今年花發風日麗況無兵燹吹黄沙金尊美酒喚小妾起舞折花簮髻了酒酣樂極重太息故人南北音書賒虎頭學佛宗三車飲酒食肉談空華了知何必假外相始悟在家真出家洛陽園池信可誇只今無樹嗁栖鴉玉山山中稱樂土杳杳百里連桑麻詩成對花還大嚼一任白髪欹烏紗盧伯融秦文仲同集湖光山色樓分題得陽城湖海虞之南姑胥東陽城湖水清浮空瀰漫巨浸二百里勢與江漢同朝宗波濤掀簸日慘澹魚龍起伏天晦䝉隂淵雨昬火夜燭下有物恠潛幽宫度雉巴城乃其亞以城石湖湖不同度城雉城巴城皆湖名在崑山想當黄池㑹盟後夫差虎視中原雄東征諸夷耀威武湖隂閱戰觀成功陵遷谷變天地老按圗何地尋遺蹤我來弔古重太息空亭落日多悲風湖之隂有村白夷亭吴王征東駐兵于此故名見吴郡志虎頭結樓傍湖住牕開几席羅諸峰鳴雞吠犬境幽敻佳木良田青欝葱魚舟儼若問津者仙源有路人間通時維端陽天氣好故人乆别欣相逢頗黎萬頃放舟入俯覽一碧磨青銅恩賜終懐鑑曲客水嬉不數樊川翁蓴絲鱸膾冰縷碎菱葉荷花雲錦重酒酣狂歌發逸興白鷗驚起菰蒲中相國井堙烽火闇郎官水涸旌旗紅此中樂土可避世一舸欲逐陶朱公安得列缺鞭乘龍前驅飛亷後豐隆盡將湖水化霖雨淨洗甲兵歌嵗豐嵗寒圗為孫惟善陳彦亷賦九日山在泉州南安縣西唐秦系結廬其間注易老子有石茶竈碾具存時姜公輔以直諌忤德宗謫兹郡别駕始與系交過輙終日姜之卒也妻子在逺方為營塟兹山之麓秦年八十餘後不知所終宋初刺史陳洪進即其地為秦君亭因感其友義之䔍以處士而塟故相故及之泉南諸山何㩻䧢清原洞天仙所都赤明開刼風氣舒玉檢丹書閟神符重樓複閣山之隅鳥道百折非一涂雲旂晝下猩猨呼鈎輈格磔嗁鷓鴣松風謖謖吹笙竽芝蘭蓀蕙春芬敷巴且花黄荔子朱羽人飛行天為徒或􅘳白鹿騎於莵俠以鸞鵠從雙鳬東窮弱水窺方壺越有莆田列仙儒以鞭鞭石石受驅長橋横波龍脊痀下通舟航上軒車流木一􅄠雲外孤蠻蜑出沒乘舳艫南金大貝犀象珠川傾山積來委輸九日特立青蓮柎秦君屏跡賈不沽閉門著述與世踈有唐宰相陳諫書謫宦南遷鳥在笯室家既逺身乃瘉為卜兹山藏其軀感懐友義増欷戱尚存茶竈亭己蕪山川清淑氣欝紆維孫陳君生絶殊提孩嬉笑共里閭翩若丹穴雙鳳雛下覽徳輝瑞唐虞又若汗血天馬駒奮迅豈與駑駘俱南遊百越北燕都偲偲切切相友于志堅金石矢弗渝管鮑陳雷張范如寜競錐刀較錙銖朅來婁江住斯須城南新僦宅一區前槐後栁䕃屋廬草蔬同飯歩同趨嘅彼末俗肆覬覦附勢逐利情愉愉刎頸之交漢耳餘反面仇敵良可吁以栁易播忠誠孚髙風千載敦薄汙嵗寒松栢知後枯好事繪寫開新圖我作歌詩匪従諛願子善保慎厥初戊戌紀事次韻頋玉山君不見天馬來鳳之頸龍之頭五花聮娟雲凝膚朝燕暮越歴塊過奮迅豈畏川涂迂蹇予駑劣材結髪學讀書到今居無廬出無驢上不能遊說捭闔下不能懋遷有無窮櫩風雨四壁立簞瓢屢空恒晏如丙申春海虞山岳之榆況乃江左乏夷吾攜妻挾子苕谿居苕谿野老起荷戈豈識尺籍共伍符舳艫銜尾一旦潰彊梁脫走尫羸誅山川異故里焉敢嗟馳驅思欲南入杭之郛奈爾嚢空擔石儲浮雲蔽白日安得大風起飛揚為埽除漢家養士三百年豈無忠義者肝膽塗地捐身軀黎民流徙困征需班荆坐太息忽報兵入湖紅旗張空半天赤勇銳逺過馮子都所至撿刮無遺餘倉皇問歸路扁舟隨釣徒朝行暮泊畏呌呼三日喜扺婁西隅下榻借𤣥館蕭然罄儲須鄰翁走相覔慰勞生嗟吁時當春夏交纎月明金樞青鐙對兒女始得忘囏虞海東大舶驅萬夫歘然而來縱壑魚軍聲震地撼八區築城髙髙峙儲胥奔逃竄匿紛在涂裹飯朝出如趂虛冐雨荷蓑笠移舟繫槐榆我民日因兵日惰不分竒正啓與胠運籌決勝千里外斯人未必能枝梧漫道不如歸去好苦竹􅊐頭啼鷓鴣歸來惆悵百感集屋廬瓦礫田園蕪田園蕪縣官尚索租朘剥膏血向倉輸獨有東家米粟紅腐玉帛滿帑因能舞文肆貪汙明珠買小妾奉酒歌吴趨那知斬伐到木石千村萬落皆逃逋所以杜陵杜愚谿愚饑驅􅇡逐竟不偶安得從龍躍天衢去年八月下明詔力貧買醉眠酒罏減民田租半雨露蘓槁枯秪今隴畆中豈無昔時之鳳雛釋耕汲脩綆抱罋灌園蔬春初翩然上㑹稽歴覽俯仰同樵漁時歌短歌擊唾壺山橋野店隨意沽放曠不為禮所拘昔人金谷貯緑珠緑珠墮樓園己墟豪華銷歇逐流水落日空啼頭白烏淫佚古所戒靡不謹厥初緬彼先哲士希聖作範模歩武青雲中繡衣緣偏諸亂離洶洶惟尚武何人英雄起狗屠不聞漢中興天王鎮坤輿天馬來應瑞圖生民凋瘵喜再蘓嗚呼生民凋瘵喜再蘓願同田翁野老擊壤鼔腹歌伊嗚題姜養浩寄頋玉山詩後虎頭少年才且賢俠遊不減杜樊川善和牡丹天下白看花走馬春風前東家蝴蝶西家去雙雙髙飛向何處尊前一曲斷腸詞荒草寒烟暗平楚李嵩四迷圗四迷粉圗誰手冩乃是錢唐之李嵩嵩當三朝應奉日㸃染人物猶精工建炎己後和議定嵗聘襍㳫金源東自兹民不識戈甲江南花栁春融融寛衫大㡌脩眉翁低頭髙揖身鞠躬栁孃緩帶竟莫頋姓名却倩長須通阿鬟雙手向前起傾身送酒如當熊就中老奴増意氣鯨吸不覺金尊空平康巷中月皎皎温柔鄉裏花叢叢寳釵斜欹粉胸露如此良宵偏惱公蜀絲錦障仙凡隔微見凌波羅韈弓更呼博塞相娱樂靚粧夹座分青紅玉盆骰子呼五白百萬一擲逡廵中錦裾繡袂金條脫瑶環瑜珥珠玲瓏梟盧不成戰屢北袒跣抱膝心忡忡兩生格鬬氣勢雄手挾長劔星流虹白日衡行都市裏麄豪不數漢秦宫翠鈿委地花狼藉哀情己多樂未終古人圖史置左右善者可法惡可攻躭淫鬭博古所戒意匠彷彿箴䂓同小牕展卷増感慨蕭蕭暮雨鳴踈桐君不見周家帝業八百載太任遺澤何龎洪又不見孟光齊眉躬井臼釵荆裙布歸梁鴻嗚呼聖賢不復作幸有遺跡傳無窮要知稼穡慎厥本嵩兮嵩兮何不圖陳無逸兼􅃎風禱雨詩為陳應辰鍊師賦已酉季夏天亢陽木槁草悴黍稌黄黔黎蒲伏號穹蒼如瞽無相何倀倀有司駿奔走郡望女巫舞雩紛浩倡箕畢槱燎光載明閉陽崇隂禜門行精誠不格天夢夢共犧行空火雲揚安得天瓢酌天潢淨滌炎歊化清􅈵𤣥都中人衣朱裳服食太和日月芒赤子罹毒未渠央起叱風雷揜晹光紫鵞赤雞飛符章檄召皓靈三山宫深鈴擲火萬騎驤𤣥㝠前驅回禄藏豐隆屏翳翼兩相少女風來舞商羊隂雲四合大雨滂槁者浡然枯者生奚用暴巫及㷊尫至人無為道自充積精所致與天通故能弭菑敺厲陽我歌烏足為報貺願子長年身受慶蘓文忠公木石山谷題曰遺墨雖存萬事非白頭添我數莖絲晩來天柱倚空碧却似金門初見時崇寜乙酉五月卄八日皖口舟中作東坡先生白玉堂嬉笑怒罵皆文章南遷再謫過儋耳笠屐行歌烟瘴鄉平生莭義應自許皦若烈日當空明一朝騎龍居帝旁遺墨散落人間藏經營意匠入遐思掘筆風雨翻濤江金鏃飲羽猛獸伏銕網出海珊瑚長白頭門客太史黄掛席皖口南風凉仰瞻天柱嗟往事二十八字鏘琳琅兩公書法宗鍾王龍跳虎卧鸞回翔如何宣和不見録有媿京下名相望昔陪外史龍井陽壁間墨君兀老蒼祝融騎之上天去撫巻興懐憎慨慷文湖州墨竹蘓文忠公題其上清貧太守石室翁渭川千畆藏其中理閒䑛筆盤薄臝兎起鶻落無留蹤雨梢晴葉各殊態揮洒位置分纎穠鍾峰隠居撥鐙法氣韻生動將無同墨君一派來自東韈材當萃彭城公平生知已最親厚走書嘲戱言舂容陳州官舍示長舌談笑化去當元豐嗚呼二老不復作空瞻遺墨翻鸞龍送人之番禺秋風夕起鴻鴈翔金井露涼梧葉黄攬衣待旦不遑寐明月皎皎夜未央問君客遊向何方言徃百粤窮炎荒浪波沄沄一葦杭西溯彭蠡越章江輿轎踰嶺梯重岡僕夫下上如鳥䀪番禺在昔財賦疆尉佗稱王兵力彊百年五世巳陳迹荒臺草露霑衣裳野芳澗卉吹天香蠣房柱螙羅椰漿飛鳶跕跕海氣蒼覽古馮髙興慨慷蹇予局促馬在枊安能與子同徜徉羅浮勾漏令乞得丹砂煩寄將篆冡歌雲間善篆以所書草瘞之細林山中題曰篆冡爰來徴詩遂賦長句以寄庖犧卦畫龜龍出頡誦造書鬼夜泣俯觀鳥獸蹏迒跡依類象形文字立以迄三五咸東封改易殊體靡有同周官保氏教國子六書大義開羣䝉太史籀文古少異小篆雙省由秦始倉頡爰歴博學篇三家著述初傳世秦燔經籍獄訟熾乃尚𨽻書趨約易古文雖絶漢草行尉律學僮乃課試東閣祭酒太岳孫夙嘗受業賈氏門閔悼俗圖昧所向博采籀古加討論掲示上下明指事轉注假借形聲意立為一端亥畢終分别部居不襍厠亘千萬古知字源昭若列星麗躔次中興斯學曰陽冰入室操戈胡背戾二徐訓釋浩江河仲也袪妄言不頗徐楚金著袪妄辨李陽冰之誤吴興張有爾傑出復古正俗訂舛訛布衣道士錢唐住玩世端如郭忠恕三十六舉僅成編蟬蛻遺蹤不知處席中加帶惡安西鼓皮離禹良可吁漢家去古尚未逺成臯印文猶重摹雲間讀書苦嗜古手校科蟲辨魚魯明牕淨几風日佳臨摸一埽千畨楮商彛周鼓真吾師􅝻扁沈著沙畫錐鸞廻鳳翥龍夭矯長戈短劔相交馳書草日積充棟楣保愛何啻璧與珪細林山中一坏土緗笈緘縢重閉之於乎禊帖藏玉匣終致温韜舉菜鍤亦恐虹光夜燭天定有竊開窺筆法冡頭草鳴寒蛩薶文瘞筆同髙風後三千年見白日好事應營馬鬛封題黄侯子正盤松画壁高景山中十八公輪囷傴僂何龍鍾蒼髯貞操澟冰雪偃卧丘壑辭秦封糓城之老黄石翁左右馳突兩石弓短衣疋馬射猛虎解后一見傾深衷别來相思形夢寐素壁幻出支離容不材匠石雖見棄擇䕃麋鹿還相從社櫟固能齊上壽漢栁徒解瞑東風昔遇剡源為作傳今託妙墨埀無窮方當文軌四海同草木猶霑雨露濃他年奉詔冩王㑹圗形共進蓬萊宫題金人張珪蘆鴈圖金源画馬惟李早亦有張珪善花鳥冩生八鴈蘆渚邊眼中彷彿龍河道雙飛雙栖噰噰宛頸求其雌大澤雪深一丈許蹤有繒繳將奚施謝陳彦亷惠綿三吴蠶繅甲天下隂隂百里連桑柘鳴鳩拂羽戴勝飛曲箔爰施墐廬舍春陽煦嫗子漸肥摘花汲水奉浴時終朝内薄在懐抱宛若𤣥螘初生蚳弱翎輕拂籧筐内早涼風戾柔桑脆榾柮烟濃簾幙埀三俯三眠將委蛇簇上濈濈秋蓮房功立身廢繭如霜欄灰涗水實澤噐繰絲䌟纊寒冰光古者築宫臨水曲大昕之朝君乃卜繰三盃手布三宫黼黻文章成祭服又聞炎漢中興年蕭條千里無人烟羣兇掃蕩己滅跡野桑成繭櫓生田秪今風塵清海㝢五日一風十日雨深村何地不桑麻青鐙比屋聞機杼我耕且學居巖阿兩髩刁騷柰老何短布單衣才掩骭飯牛扣角病身多楚夷撫廵江上屯三軍皆如挾纊温古來壯士樹名節感慨能忘一飯恩題丘魯山小象魯山道人巢許倫目爛巖電氣吐雲瘦笻横策走逡逡長歌青天風動羣不燒凡鉛化黄銀不書符篆役鬼神亦不漱嚥𤣥和津東窮滄溟看揚塵西登維嶺踰峨岷歸來轟飲驚市人桃花一實三千春題茅澤民臨董北苑夏山圖羣山廻抱中絶谷萬木隂森嵐氣溽知有逃名隠者徒捫葛扳蘿結茅屋北苑風流去不還尚留遺墨在人寰含毫伸紙能摸寫優孟商歌抵掌閒題茅澤民蟠松圖為陳彦亷壽太丘仙人初度日髙景山前覽秋色才名不減鄭廣文百年纔過三之一時年三十三嵗長松卧地数百弓全生不與社櫟同蒼髯鮐背冰雪操根有虎魄燕支紅茅君欲駕茅龍去為貌蜿蟺入囊楮蟠桃再食河再清遲子披圖重延佇題張子政黄大癡松亭髙士圖大癡老人天下士結客侠遊非畵史酒酣潑墨寫荆闗咫尺微茫數千里筲箕泉頭鶴上仙空遺寳繪人間傳弟子顛張早入室重岡疊嶂開雲烟太山斗絶何由縁下有鳥道丹梯懸此中疑是避秦處仰見茅屋巖崖邊松亭蒿目者誰子耳譜流泉横緑綺不知㨗徑在終南每逢佳處輙留止我生亦有山水癖吴楚燕齊徧遊歴風塵澒洞難再往坐對此圖三太息題周原素臨趙文敏公十六馬宋諸王孫面如玉書法鍾張畵頋陸冩唐内廐十六馬筆精墨妙天機熟憶昔岐邠開八坊四十萬匹皆駿良平原牧放樂字育泉甘草肥筋力强豐水東注波湯湯栁花吹雪桐隂涼平頭奴子騎先出兩奚控勒臨隄傍騅駽駐駱驒驪黄徐驅儼若驂鴈行有驊却立不敢進畏前反蹴頭髙昻三馬欲復俯飯水一馬己渡將騰驤中流夭矯乃龍種兩耳批竹雙瞳方斯圖己歸羣玉秘夜夜長虹光燭地何人援筆解臨摸吴郡周生冨文藝中原板蕩徧荆榛千金駿骨化黄塵摩挱老眼明牕側展巻題詩一愴神送田起宗回泉南次倪雲林韻烟樹望中迷春流接斷隄束􅋔遲明發攬衣聽曉雞蘼蕪緑徧江南路蒲颿風輕雲外度香閣無人占鏡聽倚門應念來何暮花落野桃紅雨飛春鴻社燕故相違白頭慈母髙堂上綵服稱觴春日暉送孫惟善之廣東次倪雲林韻緑遍江上草遊子涉逺道雪消春澗花滿岡南越三吴俱異鄉桂林波生赤鯉肥涼風蕭蕭透絺綌華開黄菊行將歸謝伯誠所藏王叔明狼山圖憶昨鼓楫遡大江海門一㸃狼山碧安得振衣躡層顛東望扶桑初日赤忽見此圗心目明石壁銕削苔花青仙翁白狼不復見金銀佛宇開岩扃上方臺觀雲中起下瞰䲔濤千頃水平原宅相放舟過吮墨含毫柁樓裏江南有客頎而長夢覺池塘春草芳生平愛画久成癖題詩緘封遥寄將千古風流猶未弭翩翩王謝佳公子日暮相思江水深獨立汀洲折蘭芷題茅澤民壁上松石昔人画松妙入神畢宏韋偃及張藻宋三百年惟李成石磴烟林更深窈近世首推文敏公尚書雲山氣勢雄後來作者黄岩李脩篁古木岡巒重中吴江南佳麗地前軰風流猶未墜忽驚素壁走蛟螭乃是茅君醉遊戱大者昻霄梁棟材根穿石罅貫鐡鋂稚者新承雨露厚宻葉曽栖鸞鳳來是中亦有支離叟欲同杜櫟齊上壽不材固可全天年鐘鼎由來異畎畆軒中之人讀韋編坐對松石心悠然焚香寓目竟白日黙究未盡羲皇前送市舶官諸蕃之國南海隂島居卉服侏􅍣音雕題椎結金鑿齦獷鷙如獸那可馴稼穡萬斛檣林林夏秋之交來自南象犀翠羽珠貝金蘓合薫陸及水沈皇元率土罔有刑三邊擾攘興甲兵梯航梗阻民弗寜重臣分閫號令伸殊方慕義相附親訶叱鮫鱷驅鯤䲔海不揚波如􅀈平婁東太倉吴要津襟帶閩粤控蠻荆賈胡夷蜑貢賮琛闗譏互市什一征撫綏覆育徳澤深猶慮苛細失厥心夫君矯矯東南英温恭亷潔邁等倫承命監眎慎章程兩周星霜秋復春長涂蕭蕭征馬喧回轅不載薏苡行夫君夫君明且清自兹歩武趨王庭上陳民瘼攄忠誠願化愁歎為驩聲滄江月色圗水寒月明天蒼蒼欲落未落夜未央足扣兩舷歌滄浪金粟圖中見真跡中岳外史美冠裳江臯木落江月明坐擁錦袍調玉笙吹作昆丘雙鳳鳴順流東下莫蕩漿好逾弱水窺蓬瀛晚莭軒茅澤民画壁次韻倪雲林前軰風流嗟己矣看山畵裏跫然喜石脚下挿江水清烟嵐杳眇羣峰峙玩圖安得隨漁人桃花源上秦時民草木叢深蹊徑邃溪水春波花鳥新二塵隔斷那能往勝地雖逺神偏親清詩戞玉題壁畵森列琅玕共琪珣福地蕭森雖只尺側身東望嗟風塵魚牙異香尚留意得與不得寜須嗔澤民許惠羅斛魚牙未至何如晚莭老居士黙䆒不二心尤勤綵衣行酒列孫子髙軒窈窕當南闉人生會合良有數飄散倐忽如烟雲重來握手成大笑滄溟水淺三千春黄大癡雲山圗荆浩闗仝善山水大癡繼作非俗史技藝畢給世稱賢圖畫乃其餘事耳筲箕泉頭月蒼蒼蟬蛻穢濁凌風翔斯人九原不可作泚筆題詩増慨慷樵風軒為鄭生賦鄭生城居苦廹窄一軒下榻聲吾伊庭前書帶經雨潤堦下山礬含露滋吾聞白鶴山前削立青芙蕖絶頂中有仙人居金堂石室相縈紆樵翁采薪得遺箭笑授覔者心勤渠仙亦懐私施狡獪旦南暮北風徐徐我登樵風軒為歌樵風謡婁江東下何滔滔碧波鏡􅇽天宇髙願風捲水化甘雨淨洗海内無炎歊題任月山圉人調馬圖邠寜八坊全盛日牧馬四十餘萬匹玉闗沈橛野無塵奮鬛長鳴氣驕逸就中一馬如游龍兩目夾鏡磨青銅圉人騎入横門道霜蹏蹴雪生長風水衡昔閱羣玉秘摸得兹圖落人世海桑陵谷雖變遷猶是靈光巋然峙贈葛進善繄昔炎帝神農氏品嘗百草醫藥始軒轅代起征不附浮化草木及蟲豸乃延岐伯講至道推研疾病死亡理靈樞玉圅素問書剖析絲毫明要指維秦越人太倉令用之攻疾良有以下逮炎漢長沙張論辨傷寒分表裏魏晉徂唐不乏人脉經本草咸述紀金源卯金刀最良志復古學拯頹靡再傳戴人術亦神後來繼者東垣李用藥攻守勢雖殊異路同趨無逺邇遂令末學知所歸遡流尋源終及委緬彼䂓䂓守局方仿若刻舟求劍耳婁東有客稚川裔尚友前修敦素履白晳豐下頎而長蒿艾之中見蘭芷去年挾册觀光遊門外求醫日成市太史雄文特筆褒五色雲霞光墮地里人曾生客他郡觸暑長涂行不己黄塵眯目口生烟乖沴致疾幾不起朅來一視曰無虞投以囊中方寸匕煮而食之俄頃間外熱己弭内泄止舉家感徳何以報索我長詩當紈綺詩成寫贈媿不工願保貞名埀信史張䝉軒善製筆遂檃括毛頴傳以贈毛頴氏中山人其先明眎者佐禹治東方居卯地死為十二神神明之後吐生子孫八世有䨲當殷時得仙術匿光使物八月騎蟾蜍厥後不仕為隠淪狡而善走東郭㕙乃與韓盧互爭能盧共宋鵲謀醢其家及其身始皇伐楚思兼并䝉將軍恬將三軍軍次中山大畋獵筮以連山其兆得人與人文今日之獲不角不牙被褐倫八竅長須而缺脣取髦資簡牘天下同書咸祖秦遂圍毛氏族㧞毫載頴加束縳獻俘章臺宫上乃命恬賜之湯沐封管城寵任日見親彊記便敏工纂録近悉當代逺結繩上自始皇帝太子丞相下黔首無不愛重同討論曲直巧拙善隨意雖見廢棄黙弗呻惟不喜武士見請時一臨累拜中書令呼為中書君上親決事衡石程宫人不得立左右獨頴常侍至夜分陳𤣥陶泓禇先生出處則必偕友善相推稱後因進見任使令拂拭之頃謝免冠髪秃摹畫不稱㫖上頋嘻笑曰中書君今不中書不任吾用老且髠臣頴稽首再拜對斯所謂盡臣頴心遂歸封邑不復覲日老見踈秦少恩吴人張䝉氏尚交千載上憫頴後無聞搜羅得遺𦙍散處宣城之敬亭雄豪英銳肖厥祖秪今崇文偃兵革挺身自拔著作明光廷殺虎行安化縣廣文陶振作公號釣鼇叟停公射麋曲聽我殺虎行逐虎虎不去殺虎心始平縣官桑侯仁且明賢哉賢哉非寗誠髙風不在宋均下善政直與劉昆并如何此物不出境傷人害畜來縱横梅山之南梅山北大小人家爭辟易青天白日不敢行何況黄昬山月黒桑侯聞之怒且嘻此物敢爾强梁為為民父母不除害百里赤子將焉依遂令弓兵設䧟穽果見此物來投機長戈如雨㸃短鍜如電揮㦸尖不掉丈二尺袍花已脫斑斕衣隂風一陣過墻去但覺倀鬼嚶嚶啼桑侯亦好竒觸眼見未有急呼青衫史來喚釣鼇叟鼇叟走欲顛驚看立良乆雄姿猛勢尚依然酷似天狼與天狗想當長嘯下南山猨臂將軍亦驚走想當獨立向西風東海黄公方掣肘重為告曰虎兮虎兮汝嘗跳我墻傷我羊刮吾六畜為餱粮又曽穿我壁銜我鶂驚動老夫眠不得爾來胡為落䧟中百歩可再生威風桑侯爾嗔不汝容汝惡貫盈殱汝躬于戱猛虎不足言桑侯良可數前畨曽傳舒文虎絶似白門擒吕布今畨又殺錦於莵何異山嵎出馮婦城隍廟前簫鼓鳴紙灰飛雪梨花輕桑侯長得謝山靈山人把酒來相迎酒酣拔劔飡虎肉一方之民歌太平題龍頭畵疾雷破山風振海黒雲捲浪天㝠㝠海藏龍宫晝不閉飛出老蛟千嵗精兩瞳爛爛如秋月八十一鱗寒動雪倒翻海水散飛花直擁冰髯上寥泬想當盤礴欲畵時辟歴一聲轟硯池初疑延平寳劔化又似雷澤神梭飛畵師亦無數此本真妙手㸃晴不讓僧繇先落筆寜居所翁後江西胡公欣得之價重驪珠三百斗重為告曰龍兮龍兮汝之頭角何嶄然風雷變化在眼前願將天瓢靈物洒洒作甘霖百萬里淨洗海中清氣烟八荒稼穡秋滿田老農擊壤歌豐年耕學齋詩集卷七
