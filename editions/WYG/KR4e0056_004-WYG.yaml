body:
  text: 耕學齋詩集巻四明袁華撰古詩五言述懐贈鍾安期我游錢唐時始識種雲叟種雲江夏姿意氣傾牛斗小閣瞰重湖掩映栁州栁數過南陽君髙居宅其右長身美丰標清廟列樽卣堂前兩槐樹薿薿葉碩茂清言坐竟日炊黍剪春韭極稱安期生亹亹不絶口前年往京師同汎具區藪傳舍遂識君傾盖若舊友艤舟埀虹側返照在户牖鱠鯉烹鳬雁張燈夜置酒哀絃展清商撫節歌擊缶間别情何長愧乏報璚玖去年南陽歸往勞或恐後君至我適來良㑹亦非偶我留洪橋市君宿南屛阜相過半舍餘觴熱屢奔走廹暮即下榻𤓰果襍野蔌秉燭坐假寐欲睡還掣肘自言上有親龍鍾及黄耉下無應門兒内乏主饋婦干禄閩中郡風埃面多垢薄遂終養計奄焉失慈母履霜悲風木居廬嵗時乆今年來婁江訪我意彌厚睠兹春夏交新緑暗林藪别君殊作惡思君􅍦延首呼酒與君飲中懐與君剖昔如鷹脫韝今若魚在罶北南屢邅回齟齬動輒咎長歌送君行輾轉愈懐舊種雲已仙㳺空室泉瀏瀏南陽往泉南未省回轅否相逢倘問予為言安􅅵畝次韻雲扉講師游南山有懐張外史舊㳺昔陪張外史躡雲上崔嵬前登風篁􅊐酌泉蒼蘚堆後度麥岡重荒墳際蒿萊陵谷嗟變遷覽兹良悲哉維時莫春初鳥乳聲喧豗行循靈石澗坐覔繙經臺萬竹森玉立雲扉絶纎埃楊氏椒房親葬母此山隈想當全盛日軒盖如雲來至今清壑亭金鋪照莓苔行觴藉草飲蔬果襍櫻梅賴彼二三子促席相延陪醉題素壁間辭翰粲瓊瑰掩映房山詠光恠燭九垓騎鯨上天去化鶴何年囘二妙不可作撫卷心孔哀送張師允銓選江西豫章古名郡上應翼軫躔山川互聮絡直與荆蠻連帝憂南服逺何以寄蕃宣相臣躬秉鉞開府大江邊甲兵洗瘴雨戈舩清海烟黔黎含瘡痍守令頼才賢考績分殿最三載方起遷謁選詣闕下道里阻且綿廷議經濟臣銜命出典銓張君廟廊噐授節斧扆前軺車適楚越春花正芳妍奸貪宜屏黜亷慎屬陶甄憶昨識君初乃在婁之壖别來六載餘懐君思煩悁盜賊各已息徑上官河舩側聞江淮間斗米錢三千㸑骸易子食溝壑多棄捐遴選得循良庶可解倒懸黽勉王事畢綵衣舞蹁躚矧兹休明運獲見忠孝全離别不足惜載歌皇華篇次韻頋玉山感懐金粟老秃翁䘮女及二婦情鍾政我軰況爾中年後值兹世濁惡喧呶互紛揉逹觀了死生放浪無何有汎覽經律論一室僅如斗蒲團竹匡床趺坐各雙肘心如大圓鏡觸處靡不受榮辱既俱忘恒欲烹走狗獨憐孫與甥哀哀失慈母誰能斷嗔愛毗耶有無垢所談不二法究竟唯濡首宿業想未償驚心血屢嘔深秋天氣暄桑柘葉黝黝念子築杭城土石躬自負城髙石易盡鞭箠無所取書來知近況黧面龜兩手新榖幸登塲日夜操杵臼悉供役夫養老稚曷餬口安得海宇清闗塞忘戰守歸耕對兒女畜雞豢肥牡側聞王師出鐡馬渡河乆中軍霍嫖姚報國忠肝剖鼓行擣虎穴若拉枯共朽㨗書尚未至西風又衰栁思之轉欝陶澆愁唯有酒興亡信有數蛇斷秦鹿走荷鍤死使埋四郊多培塿匡山五詠看松閣匡山何崪峍如拳突中央萬松列巖岫天蟜蛟龍翔若人抱貞節眄柯日徜徉微吟息髙䕃燕坐絃清商茅屋三四楹蘿翠友嵐光謖謖靈籟響隂隂芳晝長采花釀秫米斸苓充餱糧何殊陶貞白結樓居華陽烟雲萬頃亭英英白雲飛瀰漫被巖谷儵若大瀛海洪濤互起伏好風來自東流膏潤山木攬之不可得卷舒一何速危亭俯松抄㝠􅊧入遐矚靈物既深潜隂淵寒氣肅有時出膚寸海宇溥霑沃終乗游帝鄉矯首謝塵俗在上亭衆山皆部婁小亭立孱顔仰觀逼霄漢俯視迷人寰一勺滄溟水數㸃甌閩山朝暾照澗谷紅紫何斕斑蘭荑茁石罅鞠叢冒谿灣芳林春夏交好鳥聲關關醉騎黄鵠去笑挾飛仙還朗吟萊公句髙風諒能扳清髙亭層巒壁亭北靈淵匯亭西野芳新綠合巖扉空翠迷林深不見日地迥惟聞雞草木氣膠葛六月流冰澌逹人逍遥遊散策凌丹梯澄懐適野性觀物和天倪易同醉侯講詩為應真題急流能勇退名與三髙齊環中亭崇岡積蒼雪羅立展屏幛巘崿犖确中芟夷得平曠四頋何巍然鑱雲開疊嶂山如衆星列環拱皆北向一亭據中央勢欲兩相抗天髙氛翳消春還淑氣暢激水流羽觴鳴琴發清唱俛仰宇宙間覽古興慨忼送友人之明州衛裔夷倭奴氏僻分帶方東頑嚚罔率化不與中國通椎結斑斕衣習俗相剽攻輕生蹈巨浸出沒如熛風爰止崇明里掠虜肆奸兇桓桓張將軍擐甲登䝉衝手中三尺劔紫電明霜鋒追北海門右殺戮無遺踪執俘仍獻馘錫爵酬厥功拜命赤墀下進秩佐元戎四明古句章海水青浮空山川既佳麗人物亦豪雄感别意惻惻懐古心忡忡南薫吹斾旌小隊羅刀弓長途驛馬疾逺浦渚蓮紅勉旃同前烈策勲銘景鍾拜劉龍洲墓歸飲清真觀以龍洲先生遺墨分韻得何字龍洲湖海士瘞玉崑丘阿山川邈如昨喬木拱烟蘿偉哉二三子覽古發歗歌披荆弔遺跡窆石臨嵯峨嘅嗟嵗月流奈此湮沒何立闕表墓道大刻盤蛟鼉維時春載陽好鳥鳴聲和麗牲拜墓下冠盖相駢羅山僧出遺墨保䕶百年多縱横廿八字恍若龍騰梭緬懐攜彘酒風雨渡江沱中原雖在望泪落如懸河安得起九泉執手野婆娑歸憩𤣥館夕涼風水微波詩成想丰采寤寐儻來過書畵舫小集送謝子蘭過江東分韻得雲字曲館衆芳歇方塘西日曛曲闌楊栁樹秋水白鵝羣謝公浮家隠囊盛惟典墳書畵舩自操子前中細君胡不歸故里故里闇楚氛玉人張離筵髙軒水沄沄翼若青翰舟汎彼江之濆扣舷歌少海問字客如雲紏罸觶載揚探題詩屢分君言適江東研田事耕耘蹔屈鴻鵠志組織雲錦文蹇予風塵表孤陋寡所聞何日往從游騷壇策竒勲自錢塘附漕舟汎海至石墩時至正乙亥嘉平廿三日平生逺㳺屐歴覽名山川北上齊魯境西泝荆襄舩承平百年久闗塞靜風烟道里不裹糧朝吴暮幽燕豈意戎馬生跬歩那可前朅來錢塘城雉堞雲山連帶甲三十萬兵革利且堅中軍霍嫖姚智勇開三邊井邑百戰餘白骨蒿萊纒粮道又梗阻故里難回邅漕侯萬人傑饟運來江壖倉皇問歸路黄色眉間鮮太守敬愛客江亭祖離筵臨行重贈詩詩句清且妍暝投海門泊嘽急鳴哀絃長星蚩尤旗光亘奎婁纒修徳弭天變聖主方求賢黎明衆船開張旗鼓闐闐推篷視海色雪滿羣峯顛龕赭天設險峽東崖倒懸英雄已陳迹濤浪猶掀天尚餘射潮箭錢笴大如椽揚颿出海口風靜波漣漣雪霽天宇髙眺逺意所便甬東山數㸃跕跕若墮鳶潮汐既有程往來誰使然昔人去己逺此理何由宣兹遊信竒絶豈獨坡翁專舟歸石墩浦微渦生頰顴戴星蹋沙尾借榻營中眠盤餐薦蠏蛤調鹹異肥羶匪私一飯恩幸獲能生還人生渉憂患所貴道自全聊以慰旅懐長哦遂成篇賀梅子玉州判陞同知崑山古婁縣肇自秦漢置沿革無靡常東西屢遷治張昭首錫爵習俗頗醇粹徂晉歴唐宋天挺生人瑞王李文武才范衛廊廟噐流風尚不泯比屋敦禮義偉哉教養功必藉循良吏皇元集大統經國逺埀制乃俾縣陞州秩眎古男衛牧守責匪輕考最􅊀五事州介江海交梯航四方至擊筑吹笙竽化居聮甲第邇年兵旅興連營舉烽燧征輸星火急慘慘民日瘁不有賢者出何以慰憔悴夫君列仙胄來作州佐貳炯然玉壺冰豈受纎芥翳忍窮如銕石蔬食不二味繡衣觀民風徒歩屏車騎察君能盡職務徳布恩惠上卿太尉府待君位不次區區貪墨徒朘剥崇貨利事露藉其家竄殛及輿𨽻嗟彼本無術視兹胡不媿蹇予濩落材佔畢守章句聊以紀之詩用告諸在位題畵禾梅雨暗澤國布縠鳴桑隂吴儂躬耒耜播種廼力任來牟既登塲出水秧森森立苖本欲䟽庶防稂莠侵嘉實秫埀田霑溉雨露深猗嗟周后稷萬世民所欽栢君天驕子游宦非素心吮墨抽秘思新圖重南金如何祐陵筆只解冩花禽送章元師之汴梁孟秋天氣肅樓船出東瀛微風吹五兩初日明雙旌曉踰料角險暮泊淮隂城木落原野㢠銜枚夜兼程大梁古魏地昔為宋東京吹臺尚硉兀艮岳猶峥嶸弱冠曽一游興懐動中情弩力保明節麒麟紀勲名送陳原夫還鄉游子念鄉里囏時未得歸心逐征鴻去目送孤雲飛海内同文軌買舟婁之水春還雪己消方塘麴塵起江傾東固山遺廟荒墟間重經舊閭里感慨淚潸潸兒童喜君至烹鮮擊肥彘親知喜君還扶老兼攜穉握手話綢繆同尋昔釣游始信還鄉樂猶勝萬里侯崑山五詠婁侯廟婁氓尚滛祀祠廟徧村墟疾病罔醫藥奔走訊羣巫椎牛釃酒醴婆娑樂神虞神不歆非類傳記言豈誣聖人制祭法有功則祀諸崑山漢婁縣舊邑禾與與婁縣名尚存今在城東隅張昭洎陸遜封婁􅒊自吴桓桓孫將軍仗鉞東南驅升堂拜昭母情好昆弟如策薨受頋命擁立運謀謨諫獵止酣飲禮下魏使車忠言不見聽託疾居里閭舉邦憚威嚴卒年八旬餘伯言雖後出智略雄萬夫權配以姪女數數詢良圖一從吕䝉舉乃修荆州書潛軍克公安徑進守宜都走蜀夷陵城蹙休夹石區相吴柄國命上䟽陳立儲赫矣兩侯功彌乆而弗渝太守念婁氓報本昧厥初滛祠既撤毁左道咸剪除改祠祀婁侯像設崇屋廬復覩漢威儀清風肅貪汙遂令此邦人車盖相填於雨暘及疾疫走禱來于于穹碑紀顛末大刻龍騰拏于以告來者并解婁氓愚麗牲歌送迎萬世奠厥居王御史墓有宋建王極汴京欝嵯峨仁化浹邇遐林林英傑多崑山雖僻左士風粹而和明經擢髙第踵接肩相摩御史鄉先生學術正不頗五傳究終始􅊀論訂舛訛粤在宣和間褎然中巍科初主麗水簿言事何委蛇說書輔春坊執法居諌坡從容荅時相直氣凌太阿范公在館下詰責加切磋卒為廊廟噐詞源浩江河髙弟沙隨程入室非操戈宋史書列傳耿耿名弗磨世變陵谷遷百年無幾何城南新漕里荆榛埋銅駞景行世仰止髙風激頹波門墻既有限樵牧安敢過再拜重興感臨風動悲歌荒苔封斷碣太息為摩娑李侍御墓散歩城南門始得圎明里宰上木己拱泉下者誰氏披榛踏宿草羡門半狐豸勛閥表阡石云是侍御史力行敦古學名衡其姓李世家本江都娶婦居婁涘射策明光殿看花長安市出宰施善教矧肯猛政理至今松陵月清光照江水拜命登霜臺白簡冠獬廌上言論奸佞手將逆鱗批勢障狂瀾回屹立中流􅀈五賢不一肖賦詠光傳紀掛冠歸落菴著述惜寸晷碩學邃易經集傳發微㫖豈唯淑後進千古埀範軌九原不可作清泪何漇漇鄉里衆富兒厚葬從奢侈黄腸題湊宻劵臺文繡被可憐土未乾荒烟横斷阯後世仰髙躅庶激俗靡靡復墓限樵牧何異子朱子劉龍洲祠劉君廬陵秀胷次隘九州倜儻負竒氣辛陳同侠㳺西登峴山首北望多景樓長謌過慟哭志在復國讐異材世間出髙揖輕王侯奈何攀桂手不能占鼇頭肆情詩酒間文熖射斗牛崑山非故里遂為潘宰留五十死無嗣埋骨東齋陬世代倐變易夷墓為平疇有司重封表立闕樹松楸何人奠麥飯淒涼土一坏建祠立神主買田供庶羞仁哉太守心祭祀亘千秋朱節婦墓節婦茅氏女嫁為朱虎妻主饋事尊嫜婉娩年方笄夫官水衡守舅長大農司饟饋轉渤澥功與鄼侯齊厮養紆青紫第宅切雲霓天道惡盈滿䜛言致勃谿舅既瘦囹圄夫亦為孤纍節婦沒入官詔賜提㸃師衣袂結兩兒晝夜呱呱啼義不負所天矢死心弗移抗志厲節操師亦興嗟咨漕侯卯金刀拙菴比丘尼仗義出金帛以贖節婦歸幸脱虎狼口寄食居招提仰望浮雲馳目送孤鴻飛俯視齠齡子良人渺何之百感集衷膓形與神俱疲為婦當死節為將當死綏一病竟不起孤魂遂無依槥櫝自京邑歸塟婁江涯孝哉猶子謙具詞陳有司移文上臺省進奏對丹墀譬比曹令女夫死家誅夷勇烈雖少異操行豈相違請錄付史館敦俗淑民彛制可出鴻恩甄表發潛輝荏苒三十年荒墳草離離落日下牛羊蕪沒少人知偰侯古循吏為善日孳孳大書刻堅石華表雙巍巍朽骨懐深恩豈獨邦人思感嘅成五詠紀實匪干私送郭安道陞憲椽太山何岩岩上與雲漢通流光洞相射照耀金芙蓉黄河水湯湯奔流去不已東下滄海深曽波渺無涘頋此河山美襟帶鄒魯疆扶輿孕神秀人物産賢良粤生我郭君秋水炯雙目清標頎而長碧梧峙鸞鵠結髪讀書史浩氣衝八虚嶄然見頭角頓與衆子殊周還丈室中左圖右文史父母有愉容隣里皆仰企布衣束韋帶簞瓢恒晏如㳺心羲皇上自許稷契俱出門天地寛飄飄逺㳺志便欲凌髙風赤手搏虎兕西逾秦隴地東泝大江濆為愛九華好結茅栖白雲奈此堂上親鶴髪被兩耳家無擔石儲何以奉甘㫖蹔捧毛義檄菽水聊怡顔緬懐逺大噐置身簿書間朝趨鴈鶩行暮歸問安否克孝復克勤天賦非矯揉耿介守貞潔剖決言便便俯仰洎十載東西郡屢遷冰霜操愈堅剛柔不茹吐黄堂飛薦章姓名逹烏府八月繡衣使持節江之東薅荆薙榛棘狐狸亦循蹤掄才惟若人修能獲舉援行看補舜裳胷有五色線黄梅雨初霽移文下桃州𨽻卒効奔走車騎擁道周班荆西郭門長途馬蹄疾遥望敬亭山草木似相識行行至蓮幙挺挺立霜臺平生多抱負今日良慰懐江左民力疲況乃苦傜役早夕被鞭笞征歛從何出貪汙挾勢權舞文肆兇奸朘剥民膏血那知稼穯難蒼生命如魚濈濈在網罟按行來何時問此民疾苦嗟予一介士幸獲望餘光春風佳麗地文酒日相羊方期朝暮間坐聽談亹亹愰若秋空蠅弗得附驥尾丈夫志四海慷慨輕别離願言樹勛業髙歩青雲梯陪陳彦博編脩游永壽寺積隂不成雨朝光散林丘郊原春意動薺麥青油油東岡直如矢隠見坼上州孤塔倚天外髙城枕江流江流去不返逝者如斯不所忻風日佳散歩行夷猶豈憚凍泥滑言往梓峯游梓封竹樹深好鳥鳴相酬梅蕊吹殘香飄雪霑衣裘嘅想吕王孫掉臂辭封侯建兹阿蘭若施以良田疇憶昨結搆初甲子方一周香鐙夜逹旦奉祀綿千秋志異蚩蚩氓泯滅同浮漚壽師禪門秀叅學踵前脩神駿憐支遁詞華擬湯休倒屐出迎客茗供相延留寒菘肥勝肉采掇薦新篘物豈有定味適口為珎羞語深俗慮釋水木生清幽元龍湖海士朅來客滄洲留題紀雅集佳句鏘琳球蹇予􅄠種種孤昧寡良儔願為蠅付驥來往結綢繆送崑山偰知州調嘉定鴨緑漲江水鵝黄上栁絲二月婁東道燕燕初來時婁有賢使君白晳美丰姿聮芳五枝桂不數竇家兒豈弟民父母古希今罕有使君不我留渉江采楊柳柳絲弱嫋嫋江水流瀰瀰柳衰江水涸邦人思未己賦得菊隠菊如隠君子豈逐桃李妍嚴霜萎衆草獨秀秋風前采擷充服食甘馨能引年夫君豐城劔光獨牛斗躔韜采不自獻與菊同貞堅孤標㢠髙潔豈隨寒暑遷决獄有隂徳勉旃企前賢耕讀軒集陶詩少無適俗韻貧居依稼穯農務各自歸耕種有時息道䘮向千載聖賢留遺跡游好在六經疑義相與析在昔余多師𤣥鬢早已白羲農去我久素抱深可惜種桑長江邊開荒南野際星紀奄將終風雨縱横至既耕亦已種及時當勉勵收歛不盈㕓冬日淒且厲時還讀我書竟此嵗月駛緬焉起深情懐役不遑寐守拙歸田園鵕䴊安足恃題趙希逺萬松金闕圖峥嶸閬風岑杳渺蘂珠宫紫皇中建極金闕凌萬松雲生金毋帳日射玉女窓鳳鳥鸞鶴儔歗歌聲􅗳􅗳劔佩百神集軒盖羣真從廣樂奏鈞天洞章吟飛空東華主校籍南昌司考功丹書石室閟瓊簡金泥封下眎屍行徒不啻糞壤蟲驌也富文藝䟽𣲖天潢中凝神入遐想含毫寄遺蹤粉墨落縑素樓閣間青紅安能往從游伏闕陳丹衷願乞愚與魯老為田舍翁露筋廟書謝瓊樹所藏米南宫帖後南踰召伯埭北望髙郵城舍舟陟平陸散策舒覊情蕭條原野迥寒日慘光晶行行止叢祠虚堂走鼯鼪不知誰氏子中坐莫與京父老告我言斯女志堅貞馳驅䘮亂餘與㛮同晨征廹暮不得還沮洳聚蟁蝱㛮居耕夫舍女宿野嬛嬛失節泰山重視死鴻毛輕黎明筋己露徧體膏血頳廟食崇象設春秋潔粢盛我聞父老言感慨淚如傾猗嗟五代時鼎沸紛戰争廣陵行宻㨿民饑日搶攘刲剔掛屠肆何異牷與牲孫儒入髙郵驅民以為兵貞女蕙蘭質肯同蕭艾榮緬惟丁斯時辟地故逺行寜甘野宿死不就有幃生白玉豈受汙殁身埀令名矯矯長樂老䘮亡亦屢更四姓歴十君靦然秉鈞衡所以米外史穹碑勒新銘謝君雅好古模搨比瑶瓊賦詩悼貞烈字字鏘金聲俛仰舊游時海内尚承平荏苒三十年䌓華變榛荆豈無青雲士狥國輸忠誠却憐偷生者犬豕加簮纓掩巻三太息青燈照孤檠愛日堂旭日曉蒼涼流暉照髙堂堂中何所有鶴髪明秋霜斑斕綵衣子眷戀延飛光養志奉甘膬介壽陳華觴曉景薄桑榆喜懼心皇皇願日不出沒長在天中央倪雲林天平山圖峩峩天平山秀色横具區龍門兩崖束壁立削銕如嵐深蘿磴滑岡回樵徑紆野禽鳴聲和岩樹清隂敷遐觀見夫椒一㸃烟中孤俯眎白雲泉慘澹在有無繄誰抽秘思歴覽摸新圖仿若楚米顛乃是吴倪迂斯人不可得安能相與娱笠澤春水生悵望正愁予題待渡圖停驂長林下送目大江表故園雖在望山徑尚深窈招招舟子來一葦横波小松菊倘猶存歸耕逺紛擾倪雲林竹木圖初陽被原隰微風度檐楹修竹弄晴色嘉禾敷春榮君隠笠澤上觀物以怡情寫生寄毫素持贈重瑶璚放鶴亭胎禽本仙驥駕馭同鸞皇渇飲金莖露饑餐珠樹霜雪蹊留篆蹟月夜候笙簧蹔别踰蓬海偶下息芝塘芝塘虞仲里奕葉何蕃昌窈窕小亭靜矍鑠阿㜷康朝迎板輿出暮導板輿翔引吭隨舞綵夗頸侍稱觴一舉衝霄漢重來感䘮亡道園遺翰墨銕史志文章俯仰人間世須㬰變海桑幽居圖混混幽澗泉欝欝嘉樹林水木互膠葛頗愜靜者心書繙白日靜鳥啼青嶂深兹地可佚老聊以投吾簮題米元暉雲山圗山横鑑湖曲水落剡谿濆岩扉撲蒼雪石林生白雲回轅謝逋客采芝招隠君安能馭風去結廬逺塵氛訪薛鶴齋真人不值英英三素雲璚樓出林莾中有仙者徒㝠栖在其下手握造化機足攝天地户我欲往從之凡骨未能羽唯見碧桃花循流出谿滸送權上人兼東諒虚白講師釋書經律論中分大小乗繇漢歴唐宋翻譯巻帙増微義浩河沙究竟諒未曽權師未識面聞譽如雲騰兹登雨花堂聞妙心源澄庭眠惠逺鵝臂駕支遁鷹天池九萬里扶揺自此升為言虚白翁歸休理寒鐙耕學齋集巻四
