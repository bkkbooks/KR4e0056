body:
  text: 耕學齋詩集巻一明袁華撰騷歸來堂辭有序歸來堂者相州别駕章侯之所作也侯年踰知命即解印綬歸奉母夫人張于兹堂此歸來所以名也侯今七十有五斑衣白髪稱觴獻壽此天壤人間之至樂也汝陽袁華乃作歸來堂辭以美之其辭曰翼翼兮新堂髙明兮孔揚睠青龍兮東下覽鳳凰兮南翔堂中美人兮金玉其相入直承明兮近日月之清光踰河湟兮度隴蜀歴井陘兮上太行瞻白雲兮孤飛悵萬里兮逰子羌弭節兮縣車升斯堂兮奉甘㫖斑衣兮被被列曽𤣥兮濟濟舞婆娑兮稱兕觥樂怡愉兮豈弟新堂兮翼翼旅楹有閑兮孔安且碩繄千秋兮萬年子子孫孫兮期永保而無斁招鶴辭有序玉山顧君仲瑛哭母於吴興之商谿歸葬綽墩先壠念母九泉不可復作乃築亭於神道之左遂仿蘓僊耽故實扁曰招鶴汝陽袁華為製招鶴辭三章俾歌以招之庶㡬化鶴一歸少慰終天之戚云其辭曰胎仙翺翔兮蘂珠之宫薄雲漢兮溘埃風乗火精兮自養抱貞素兮氣内充朝扶揺兮丹丘夕裵徊兮𤣥圃繄故國兮丘墟冡纍纍兮下土蘂珠之宫兮胎仙翺翔美嬋媛兮𤣥衣縞裳遲夫君兮未來擥青田兮璚芳長夜漫漫兮窅不見日子哀鳴兮血化為碧蕙帳空兮猿驚心旁皇兮反側新亭兮桓桓􅉱鬱佳城兮松栢丸丸疏玉泉兮交流樹琅玕兮為樊山川綢繆兮道里阻脩陸有虎豹兮江有潛虬胎仙翺翔兮歸休𤣥間窈㝠兮不可以乆㽞哀宋姬有序宋姬者肅王樞女也㓜於水濱得玉印文曰金妃之印靖康之變金主納焉或云符印之䜟夫父讎不共戴天當國亡家滅之餘猶委質以求全者君子不取也姬眎死特易事欲求其死以不死耳故屈身以侍巾櫛儻一言以覬主聽庶二帝生還雖蹈鼎鑊不憾也主復徙二帝於五國城姬諫而主怒以匕首殺之予哀姬之志不克信而嘉姬之死得其所夫處變而不失常道者其惟宋姬乎其辭曰膏吾車以北征兮邅黄龍之故城山川蚴蟉以鬱盤兮維完顔氏之所京繫二世之䧺特兮日從事乎兵革何靖康之䝉塵兮身降庶而竄謫粤王樞之有女兮亦俘纍而在行符玉文之印䜟兮充下陳兮椒房甘委命而盡節兮羌隕身而奚益俟事機之可乘兮雖九死而不惜胡宋祚之中衰兮徙二帝于窮山之隂昧大義而共戴天兮荃不媿于中心陳讜言之謇謇兮矢弗從而繼以死也何彼蒼之不鑒其忠誠兮竟損生於匕首也噫吁戱天乎不仁兮俾獨攖其荼毒父為虜兮國隨覆身既死兮讎不能復謀弗克兮為大僇哀幽憤兮不平河流湯湯兮征鴻肅肅金源兮走鹿祐陵兮拱木陳吾辭兮弔貞淑魂其歸來兮故國古詩四言費侯興學詩并序崑山州廟學唐縣令王綱所建記之者安定梁肅也五季之末廢于兵宋知縣邊倣始克復脩記之者太原王禹偁也政和迄宋季重脩者屢矣國朝元貞元年陞縣為州置博士弟子員延祐初遷治太倉而廟學亦廢越四十有三載張氏入吴以州治瀕海江無以盛民而固圉也復歸舊邑今守東平費侯某下車首謁廟學憮然而歎曰學校者教化之本也盖不可一日忽踰年政成民信乃出其廪稍之贏新作㦸門及講堂撤禮殿之舊而加崇廣焉作齋廡以居學徒則又民之輸材而為助者嗚呼若費侯者其可謂知所本矣詩曰維桑與梓必恭敬止況學校乎華也叅職郡庠沐賢侯之教養覩兹輪奐實重依歸乃歴考廟學之廢興為詩一章以美之詩曰肇昔婁校王令綱作五季披攘鞠為叢薄火德阜隆芟除苛虐乆鬱而信聖道孔昭蕞爾吴越既入王略繄邊倣氏聿來主學庀材僝工不日而落歴宋祀三百執事有恪扵赫皇元龍飛朔漠詔陞縣為州建官錫爵置博士員以訓以飭治遷於東民實新邑廟隨所在兹實榛棘嵗在實沈海氛梗逆復歸舊治邑廬如昨明明費侯英傑卓犖既牧我婁民復繕我城郭漸摩煦嫗民瘉無瘼舍菜在泮考藝問業眷兹頽圮心焉怵惕相方眎阯爰䆒爰度采石于山斬木于壑工師子來乃礱乃斵乃表脩桓重門有覺外象靈星内列畵㦸中嚴禮殿既崇且碩鳳麗于甍龍攫其角言言齋廡左右翼若横經有堂釋奠有樂多士逰歌有館有榖費侯戾止在泮獻酌冠弁俅俅不吴不謔頋瞻基搆昔庳今擴不有君子其何能益嗟吁諸生夙䝉啓廸爰止其所涵泳朝夕服我聖訓伊侯之德願侯壽考如金如石懋繼前脩永永無斁送秦文仲歸崇明拜祠墓詩有序淮海秦君徳卿教授鄉里埀四十年歿而門人私諡曰孝友先生其行述見鉄崖楊先生所為墓銘崇明桑梓里也至正庚子髙郵張君某同知州事始白於有司列祀校官之先賢祀祠以天賜堂主李君配焉明年春正月其子約將歸拜祠下并展三世松楸汝陽袁華追餞于婁之上而贈君詩詩曰維秦氏先裔本顓帝𤣥鳥誕祥爰洎大費湯湯洪水佐禹平治賜姓曰嬴是為栢翳下逮非子主馬汧渭厥馬蕃息賞延于世助之土田錫以爵位自岐徂酆奄有其地以國命氏子孫蹶蹶冉相非商從學洙泗卒業聖門身通六藝三輔萬石漢稱循吏曰綿曰族曰舉曰系或栖巖穴或推孝義文鳴淮海肇自觀始䟽派鹽城丁宋之季南遷海隅相宅天賜懿自山父威儀棣棣玉立長身清廟茂噐授經於方力求源委朝斯夕斯黽勉弗替貢于通州詩冠多士粤有仲子才徳粹羙肥遯居貞行端學邃蔚彼鳳麟為邦家瑞講道鄉里埀四十載一裘一葛不事華靡髙爵榮名視若敝屣沈潜理域仁經義緯性命道徳經史傳記孜孜討論由内及外立言埀憲先正是嗣後生小子為所矜式歿有門人孝友表溢崇川之陽木栱墓隧掲示素履有隆斯碣偉哉張君恂恂豈弟以仁教養以徳撫字下車省俗振舉淹滯表里旌賢風化所繫嗚呼先生匪爵而貴上陳道統乃白有司翼翼新祠翬映泮水約承家學繼志述事兢兢業業罔敢荒肆春雨既濡勾萌叢萃頋瞻桑梓油然孝思駕言遄歸乘桴海澨䲔波砥平雲颿宵濟展墓拜祠聿脩厥祭何以將之㫖酒肥彘言言髙門列㦸周衛七貴五侯充車結駟不學亡術崇殖貨利未及百年子孫皂𨽻聞先生之風胡不少媿滄溟滔滔奔流東駛有如秦氏世澤罔既於千萬年祀事不墜我作歌詩昭示來裔武陵小隠武陵者何婁市之梁也小隠者何史君仲先之所居也居市而曰小隠者何謙辭也賦詩者何美之也詩曰小隠山林大隠㕓市奚論小大惟適所止貞哉仲先如金如玉隠居行義不志於糓武陵之南婁水之隂有宅一區嚴邃靖深其中何有有琴有瑟亦有圖史積之秩秩井冽寒泉林實嘉橘芬敷沃若清隂滿室匪樹之茂乃徳之殖其心孔仁其門多疾既隠于市又隠于醫施不責報維先哲是師我作歌詩以詠以吟願堅素履永播徽音趙氏一瓢春軒齋居如壺逈非人間傲睨太虛心超古先霽月光風湛然天真維趙顔子一瓢之春顧仲瑛栖禪小象猗與若人青年偉才鬭雞長樂走馬章䑓歸來丘園髙風絶塵㝠栖逺蹈唯務光是倫矯矯虎龍風雲翕從陳情退避于北山中中嵗慕道閲經律論員顱方袍指心見性有田一成有宅一區壺觴圖史足以自娱雲山蒼蒼松籟謖謖雲䑓炯然不假模貌耕學齋詩集巻一
