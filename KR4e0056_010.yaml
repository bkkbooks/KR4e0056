body:
  text: 耕學齊詩集卷十明袁華撰律詩七言寄張師允御史兼柬髙則誠省郎中臺御史國元儒清廟雍雍列六瑚暫奉旗常司禮樂又峩獬豸費謀謨河歸故道朝東海日麗中天照八區遙想此時髙録事定陪􅍡馬步雲衢送季景福鍊師遊武當武當之山天與齊子往訪道窮扳躋石乳春流飛肉鼠日輪夜轉聞天雞身試水崖松下石手援鐵絙雲中梯歸途儻遇白騾叟為我問訊君毋稽次韻瀞天鏡見招奉東雲扉講師兼懷張外史曽陪外史清涼室二老風流老更狂海上留衣無吏部僧中愛馬獨支郎近傳蓮社開龍井更約蘭亭泛羽觴己辦青鞋仍載酒舉杯同吸鑑湖光小梅軒舟名浮家一舸逐鴟夷瀛海微茫渺所思直欲星槎天上去何如雪艇月中移窗開山木聼溪放簾捲江花看水嬉獨倚飛軒瞰歸鳥楚雲湘雨念深期次韻陳敬初陪貢泰甫待制降香婁上使節煌煌照海濵錦袍光被寵恩新馬班父子昭前史蘇宋文章繼故人甲帳泠風神欲語斗杓埀野月如輪禮成歸踏南州雪猶得延陪笑語頻久懷簮盍話深期又阻江亭把酒巵詞客暫為遷客去德星還傍使星移放情自愛閒兼靜違世真非懶與癡待理闔閭城下棹共談京洛慰遐思送趙季文湖州知事昔日參軍今幕府水精宫裏又重來近除牧守皆清選況復參謀得大材山色滿簾雙燕入溪光照雪一舟回管公樓下花如霧應擬登臨送酒杯錢塘秋興木落江空鴻鴈橫髙秋倦客不勝情中原父老憂河决南徼黔黎望賊平漢武宣房歌瓠子魯連遼海却秦兵西風獨倚層樓上把酒無言對月明慈雲嶺下拜郊臺遺老曽看鹵簿來自昔祊田供黍稷于今輦道沒蒿萊金河鴈過沈寒日銀海鳬飛化劫灰更上髙丘表忠觀殘碑剝落重興哀秋江釣艇圗我昔繫纜桑落洲好山無數當船頭大孤絶立小孤險江水逺兼湖水流扁舟老叟釣斜日斷崖古木含清秋草堂撫卷重感慨滿眼風塵懷舊游次韻答于彥成賀監東歸謾自憐思迷芳草緑芊芊閒乘野鶴如騎馬醉著宫袍不上船晞髮定從天姥頂餐霞應在㑹稽巔荔漿百斛山中熟肯向蘇家覔酒錢次韻顧玉山寄草堂東郭帶烟蘿門外髙軒客屢過鄭國上卿知叔向新豐逆旅薦常何栁迷官道鶯遷木花映春江水動波已許芝雲分半席嘉時行樂醉時歌送强彥栗募農赴都燕趙開田千里餘募民南國課耕鉏豳風舊詠農官政大有重看太史書麥秀郊原將乳燕花飛野水欲生魚耕莘釣渭皆王佐行見承恩侍屬車答顧周道司户謾憐稱畫絶都官翻訝坐詩窮也知困頓塵埃裏何似栖遲草澤中江日荒荒連野白楓林槭槭帶霜紅春來擬約錢湖上聮轡看山踏曉風寄湖南經歷富珠哩子升洞庭湖南木葉黃桓桓憲府肅秋霜弭節還臨楚王澤觀風定到屈原鄉澧蘭沅芷思公子郢曲巴歌唱女郎好把音書寄千里冥鴻今己過衡陽送友人赴都闔閭城下送君初十月征途雪載車宣室蒼生應有問新豐逆旅豈無書天開析木瞻辰極山合燕然抱帝居倚馬定看書露布王門何必曳長裾北固眺望大江東下渺滄溟目盡淮山一髮青三國英雄終割據六朝文物己凋零寄奴故宅今為寺瘞鶴空墳尚有銘漁笛數聲天外落客懷無賴倚闌聽金山寺妙髙峰下龍游寺小艇能為半日留靈物上隨雷電化大江中抱石崖流濤頭鐘鼓黿鼉伏鼇背樓臺日月浮欲汲三泠泉煮茗誰將長綆取深湫送友人授館崇明中州人物舊家聲皎皎風姿玉雪明過海綵舟無百里傳經絳帳有諸生夜瞻北極天如蓋曉望東瀛水似城椒子花開春又暮好將書札慰離情寄于彥成莊北莊南雨乍零繁花如雪照空冥玉壺美酒拈重碧石室藏文翻殺青倏忽無煩鑿渾沌春秋有待問冥靈松顛騏驥飛行處定約麻姑訪蔡經答繆叔正見寄兼東琦元璞闔閭城裏連朝住秋雨秋風過客稀且泛徵君彭澤菊誰歌義士首陽薇清霜滿野羣烏下逺水兼天一雁飛憶共孤蓬婁水曲行觴聮句月中歸空城落月噪饑鴉殷地秋風動鼓笳洗甲天河無壯士馳車原隰有皇華人生擾擾投林鳥嵗事匆匆赴壑蛇只許龍門看泉者笑揮談麈落空花寄嶽季堅詩客計籌山杜丹丘洪碧海牀頭有酒未為貧汗漫山林一散人巳過丹丘期洗髓還從碧海看揚塵樓開千嶂雲霞曙泉落雙溪草樹春何日相從問真訣緑隂深處岸烏巾送湯子誠帥掾掾郎匹馬南關去木落江空送鴈羣不但鄼侯能給餉也知韓愈解從軍連營笳鼓花邉合小隊旌旗栁下分況是大藩財賦地哦詩橫槊屬夫君次韻錢思復五山留題蘭舟東下泛滄浪路入仙源草木長綵筆題詩情自適白頭傾蓋意難忘坐深河漢星流屋語久芙蓉露濕裳别後相思對明月吳江楓落有清霜丙申正月十七日避地商墓溪閣春明雨乍停游絲百尺墮窗櫺燕歸故國蘼蕪緑戰退空原燐血青未見王師除叛逆謾將詞賦慰飄零囏時㑹合須謀醉笑指丹泉㵼玉瓶今朝雨晴天氣好黃栁葉深含夕曛髙閣下臨平野濶青山中斷大溪分樹嗟江夏桓司馬詩憶天台鄭廣文海內風塵猶未息書生亦欲學從軍次韻王叔正陪李廷璧郭希仲同集玉山草堂亂離又見臘嘉平訪舊仍同上客行報國終慙結襪子出關應慕棄繻生濤江水發船如馬雪浦春回栁似城懷人索句草堂裏南望孤雲多逺情草堂夜集花落銀盤蠟炬紅杯行小閣夜無風應須通籍金閨裏且要埋頭麯蘖中石室書紬司馬史草堂吟絶杜陵翁酒酣莫笑踈狂甚我欲相從蓋次公丙申嘉平二十四日鐙下偶成嵗晏蕭蕭風雨生交年節近月書正杯盤羅列昏祠竈鼓角悲淒夜扞城未獻椒觴陳雅頌且分豆粥泛膏餳乞將得酒年逢酉㑹見承平息戰爭陪趙仲光顧仲瑛遊崑山林壑秋髙絶㸃埃畫船載酒對山開霜明逺浦蒹葭老木落空江鴻雁來魏國王孫多麗藻華陽真逸有仙才翠微閣下經行處重為題詩拂紫苔病中次韻答諸葛用中見寄連朝寒熱相攻戰帕首伸吟擁被眠頭但岑岑如砭骨身常兀兀似乘船謾憐方朔饑求米誰似蘇卿凍嚙氈料得故人同寂寞客窗泚筆寫詩篇避地移舟江水濵風塵愁殺未歸人夷亭城下空懷土甫里湖邊又見春日落長林烏亂呌雪晴大澤鴈飛頻題詩寄逺還相憶坐對梅花月色新玉山對雪玉山山中嵗未暮斗柄先回八日春水邊楊栁開青眼窗外梅花似玉人得子須當探虎穴上書誰解逆龍鱗草堂對雪栖禪夜定有驚呼祈孔賔送張天爵奉賀正旦表航海赴都相臣奉表天邊去使者乘槎海上行旌旗影拂波濤靜宫殿春開日月明中原未必無王猛前席須當問賈生風景不殊民物異江南遺老望休兵帆檣跋浪駛如鴻縹眇神京在眼中天地未明先見日九天直上更凌風蓬萊水弱流清淺龍虎臺髙氣鬱葱咫尺鳳城春似海五雲端拱帝王宫耽耽雙闕起中央繚繞紅雲黼扆傍麟史己書王正月鳳函初上帝封章殿頭楊栁黃於鵠海子鴐鵝白似霜拜賜君恩歸佐郡錦衣光彩照髙堂憶得長淮汗漫時樓臺歌吹錦城圍吕梁水落河魴美芒碭霜寒野雉肥道路久無人北上關河空有鴈南飛可憐風物非疇昔蒿棘如林蔽夕暉青松白石軒髙人種玉玉山中上有支離之怪松絶壑雲根蹲虎豹隂崖雪幹攫蛟龍青精飯受神仙訣金粉花浮虎魄醲為折長枝當麈尾何妨踞石語從容嶽季堅王叔明梧竹堂同集時季堅將歸黃鶴山長日園池水竹隂臨深展席酒同斟花開薝蔔五月雪果熟枇杷萬樹金未覺山王稱曠逹更逢顧陸寫蕭森獨憐黃鶴歸耕者詩酒何時再盍簮顧國衡海上歸㑹于可詩齊分韻得從字出處能全孝與忠寧辭大海駕䝉衝祗將禮義為干櫓豈但韜鈐閟虎龍烽火頻年成逺别酒尊今夕復相從金符紫綬居重慶勳業當期上景鐘夜坐聽雨偶成哦詩聽雨向西窗猶勝銜枚夜渡江赤壁焚舟驚破魏馬陵斫木善收龎身經喪亂家何在老去情懷酒易降清坐不知更漏永拋書假寐對殘缸寄于彥成欲采蘋花遺所思玉山山中秋日遲遙天孤鳥沒蒼靄急雨大魚飛碧池握手過溪當此夕攢眉入社定何時獨憐滿地干戈起對酒毋煩重賦詩方塘如鑑淨無波花氣生香雨乍過河漢露涼星斗濕江湖水落鴈鴻多不辭歸隱在松菊莫遣移文裂芰荷安得手招笙鶴侣㑹稽山裏聽笙歌留題長慶寺呈天鏡淨公長慶寺普竹園寺西則㑹稽縣學黃竹園境頗幽寂余將南歸題以志别隂隂雙梓晝當門問訊毗耶丈室尊謫仙時過青蓮宇異道或來黃竹園山近蓬萊深雨露地鄰泮水薦蘋蘩會稽自昔多竒跡奈此南歸駕短轅芝雲堂小集池館風微白晝長芭焦葉大午隂涼蜻蜻㸃水髙低見燕燕衝花下上忙酪粉蔗漿銀碗凍蓴羔鱸膾玉醪香醉騎黃鵠雲中去豈為暌離慘别腸送嶽季堅歸黃鶴山草堂新築臯亭下雞犬相隨問去程牧犢謾傳琴上操伯倫真得酒中情荷鉏曲澗霜初下晞髮陽阿日始生莫向囏時嗟不遇龎公猶隱鹿門耕登綽墩白雲屏上倚危闌陡覺梅風四月寒雲接姑蘇山莽蒼春生澤國水瀰漫粳稻再聞輸貢賦王師誰報渡桑乾道人築就栖禪窟好似香山八節灘次韻酬鮑仲孚出郭偶成春波門頭春己深曖曖逺村樹隂隂故人江海三年别老鶴雲霄萬里心暇日何妨隨步屧清時未許擲朝簮竹橋東畔齊居好尚記持杯對月吟顧玉山新成釣月磯軒荷蓧行歌與世違鶴歸城郭是耶非種桃道士𤣥都觀泛月仙人采石磯大野龍蛇方起陸青冥鴻鵠自髙飛軒前一架薔薇樹猶放踈花向落暉寄陸原祥幽人抱道不出户水竹蕭然繞舊居清坐自臨修禊帖感時閒擬絶交書烟銷艾納薰金鴨酒㵼松肪膾鯉魚日日題詩慰牢落未應與世頓相踈送梅節判兼寄謝湖州次韻白舫青帘海上回賦詩莫訝雨頻催阮瞻作掾惟三語王粲傷時詠七哀閶闔風生銷酷暑攙搶星墮淨氛埃吳淞東接婁江水乘興毋煩數往來明公持節洞庭丘文采風流禮數優朱幡皂蓋干城日青雀黃龍大閲秋漢室興圖恢鄧禹唐家諫疏屬韓休水西開士時相見爛熳新詩共倡酬萬姓流離荷厚恩依然桃李滿深村謝安已起居廊廟梅福何緣隱市門喜見淳龐如魯俗不聞暴虜似羌渾政成奏對長揚殿賜酒應霑白獸樽初適嘉興次韻答鮑仲孚先生於越敗吳於㰎李兵交豈意古今同傷心遺老風塵際舉目河山草莾中白骨似霜秋滿野大星如月晝行空獨憐鮑叔偏如我對客揮毫目送鴻七月五日送葛天民歸湖州傾蓋相逢英妙年靜依禪客興蕭然叩閽未上平戎策佩犢歸耕負郭田水落烏程溪似帶星明牛女月將弦飛樓結傍長松樹最愛青山墮几前武林即事不到錢塘己五年故交零落倍􅏰然何人拔劔歌𤣥武有客題詩拜杜鵑錦繡湖山多虎跡鶯花巷陌斷人烟傷情獨有中天月依舊清光照冷泉切雲雉堞鬱崔嵬氣壓江山勢壯哉萬騎貔貅金作甲九關虎豹玉為臺棄繻獨羡終軍志保鄣唯稱尹鐸才天運循環真有數腐儒白首重興哀次韻寄謝錢塘新開别墅對西山燕坐凝香日閉關鶗鴂先鳴農事動兜鍪不舉羽書閒花前五馬春遊樂月下雙鞬夜邏還上番梅花曽有約舊題重拂石苔斑施克讓大監以效忠輸貢南來㑹于錢塘祕監風流鬢未絲為詢忠義向南陲黔黎思漢中興日繡斧還鄉奉使時金匱紬藏書灝灝木天儤直漏遲遲好期勳業書麟史行贊謀謨入鳳池海內紛紛亂若絲乘桴直泝浙江陲中原將帥休兵日南國稊航入貢時賈誼感時多太息馮唐投老尚栖遲客窗獨坐無聊賴靜數飛花落研池還歸鳳閣掌綸絲況爾風烟靜四陲海上乘槎無博望關中置驛有雷時羽書己報荆襄復餉運休嗟蜀漢遲聖代祕書皆宰輔扶搖九萬起天池送唐本初之茅山唐君本出公房裔寄跡黃冠鬢己華欲訪洞經參玉訣不求句漏覔丹砂弟兄得道惟茅氏父子登仙有許家老我平生逺遊履塵緣未斷獨興嗟九老仙都印未刓華陽宫闕聳髙寒隱君書著登真訣長史碑題舊觀壇望拜竹宫流爟火步虛菌閣侯神官姓名己在龜臺籍鶴背風清聚鶡冠闕中孚豫同年也至正丙午五十一嵗中孚上有慈母下有曽孫一門五世十月草又四日適逢初度賦此以慶之同生延祐丙辰年惟子斑衣舞膝前上壽百齡尊齒德一門五世見曽𤣥筍輿春侍花間去竹馬朝迎栁下還有子有孫皆孝敬山南崔氏世稱賢野航軒軒開花栁照波明嘯傲篷窗悅野情恍載春流天上坐翻疑晚飯越中行攜家未遂鴟夷隱泛宅甘從甫里耕不問主人當往造樵青還解笑相迎梅花泛酒姑射仙人挾麯生醉鄉寄跡類浮萍影沈若水驚橫玉香散黎雲夢吸鯨止渴屢呼仙掌送和羔錯訝素娥擎傾杯片片沿流去應誤漁郎放棹行挽張子英别駕瀟灑丰姿冰雪如甘泉閒止有齊居囊中祕訣神人授墓上雄文太史書曳杖軍門曾獻策歸耕田里欲縣車雙鈎晉帖皆希世洗玉池空月影虛送人歸京師秦淮水落大江奔西溯蘭舟海上村栁色曉濃鳷鵲觀棣花春韡脊令原紫髯上將初分閫白髮慈親政倚門歸向髙堂躬定省對床風雨擬重論送錢虛白鍊師還茅山青山卵色起中天馬領良常紫翠連雙璧己薶秦相篆五鍾猶記地皇年黃連乳爇神初下紫术膏成骨易仙安得同騎大鶴去華陽南便覔真詮雙舄凌空去莫扳惟聞飛佩玉珊珊故家遺老俱凋謝采藥名山自往還鳯尾蓋隨雲影動鹿皮冠映雪痕斑海桑陵谷雖遷變獨有壺中日月閒寄錢淮南風清淮海水無波緩帶輕裘自雅歌玉壘金城嚴虎豹丹書鐵劵誓山河也知韓范懷經濟不數儀秦用揣摩況是玉堂揮翰手紀功銘向石崖磨全吳分閫鎮殊方坐擁貔貅十萬强蓄穀廣田推鄧艾運籌決勝屬張良儲胥蔽日清江浦䆉稏連雲白水塘時憶壯游興感慨相思目送鴈南翔送閔鍊師省兄還茅山兼柬錢虛白伯兄兵隔海之隅仲也東尋軼兩鳬閔氏聖門稱孝子道家句曲號仙都塤箎迭奏宫商合風雨連床語笑俱此去定逢錢逸士為詢芝术寄來無耕學齊詩集卷十
