body:
  text: 耕學齋詩集卷九明袁華撰排律送殷孝伯之咸易教諭三十六韻聖代崇文化賢良起草萊鳳鳴暘谷日魚躍禹門雷匠石無遺棄洪纎在剸裁咸陽秦赤縣博士楚宏材話别嗟吾老橫經羡子才渡江淮浦迥泝潁蔡河開紅樹迎官舫黃華映酒杯紀行應俊逸覽古定徘徊遵陸由梁苑馮虛自吹臺汲京城屹屹艮嶽石巍巍踏月車鳴鐸嘶風騎卷埃吳音傖父訝儒服虜人猜應為青山住知懸白日隤解鞍依近郭縱馬齕枯荄風急狐狸嘯天髙鴻鴈哀詩情秋共淡鄉夢曉同催喜見烽煙息愁聽驛鼓槌虎牢悲戰骨緱嶺覔仙胎嶽仰嵩髙峙河看砥柱裁山川猶鞏固風物亦竒賅雞唱函關啓龍飛太華來碑亭矜漢好浴殿弔唐災望極吳天末行窮渭水隈别家傾菊釀到縣動葭灰多士爭先迓諸生獲後陪獻菹芹實豆舍菜酒崇罍五傳遺經在三餘萬卷該尊王明大義抑伯黜渠魁寒榻臯比設朝槃苜蓿堆樹萱思奉母援柱念提孩有弟能調膳何郵不寄梅五陵還突兀八水自縈回選勝笻扶手遐觀笏拄頦壞基留宿草斷礎長荒苔異域多佳處兹遊實壯哉丈夫四海志肯使寸心摧次韻諸葛用中歸真觀三秀亭紀興舟次蒙城驛名山未暇登歸真聞有觀覽古豈無朋小徑松間入危闌竹外憑亭標三秀異境勝萬人稱玉氣朝凝潤霞光曉散澄雲房通曲密蘂殿肅嚴凝濟勝資佳具扶顛藉老藤未能忘臬兀豈敢肆驕矜長嘯孫登解躬耕諸葛能華林散鹿迹斷港聚漁罾九醖浮鸚鵡三花覆毾㲪潭清容可鑑谷響語還譍石上便清坐松根稱曲肱愧豫才潦倒羡子思川騰擾擾磨旋蟻營營棘止蠅四三狙賦芋九萬海摶鵬獨客仍踈懶頑仙絶愛憎行歌采芝曲歸理讀書鐙空谷懷佳士孤雲愧野僧賦詩慙繆拙聊以紀吾曽陳李子發解歸席上分韻得三字明詔初登士賢良起朔南太丘雖楚士厥貢逐吳柑昆玉連城重驪珠赤手探桂扳仙窟一浪擊禹門三突陳神初王衝圍戰始酣摛文陳禮樂射策黜姦貪歸日逢重九髙朋喜盍簮黃花映朱實紫蟹間銀蚶酒㵼杯中緑風生席上談明年京國路春水染袍藍送李同知授節明光裏分符淮海潯家傳三禮學夜絶四知金蜀郡流芳逺鄱陽種德深熬波輸國賦剔蠧慰民心海王夷吾策徒謳子産黔政成還治所撫事動遐吟送葛進善逰金陵抱朴諸孫負異材丹成直欲訪蓬萊髙堂霜鬢雙親老逺浦征帆一舸開山入金陵雲鬱勃江環鐡甕水縈洄鵝黃色上宫牆栁鄂緑香飄禁籞梅獻賦定趨鳷鵲觀題詩擬在鳳凰臺少微光動三台近重譯音翻九域來正旦迎春仙仗集端門待漏曙鐘催公車獨數嚴徐學戰國猶稱范蔡才直節事君真不忝髙懷絶俗又何猜拾遺杜曲詩千首逆旅新豐酒一杯威鳳己巢阿閣日神魚終化禹門雷他時駟馬歸鄉里錦繡宫袍次苐裁鄭德明李廷璧同集顧仲瑛書畫舫分韻得天字我愛山中屋似船曲闌倒影水行天畫推鄭顧同三絶書至鍾王可並傳把􅊦俄驚天欲雪鈎簾恰見月初絃黃浮鞠蘂鵝兒酒紅芼椒花玉鬛鯿北苑風流猶謾仕南宫放曠任稱顛栖烏驚柝翻叢竹潛鯉聽琴出九淵山擁雪巢吟木客樓居雲海宴神仙囏時會合須強飲莫惜狂歌醉扣舷徐種雲撿校湖光山色軒湧金門裏春如海虛閣亭亭瞰水涯畫棟留雲髙縹眇雕闌轉月淡交加杜陵萬里橋頭酒賀監千秋觀裏花樹樹芙蓉圍别港雙雙鸂鶒聚員沙遊絲趂雨縈紅樹香霧隨風度碧紗隨水荒涼安足數郎官空濶未容誇窗含嶺雪通三島塵逺壺天貯九華所藏靈碧石號壺中九華歸去漁舟聞欸乃坐來櫪馬絶喧譁自緣丹扆曾投策應用青門學種瓜始信登瀛元不逺銀潢從此泛仙槎耕學齋詩集卷九
