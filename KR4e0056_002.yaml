body:
  text: 耕學齊詩集卷二明袁華撰古樂府塞下曲積雪深沒脛銜枚夜出關竒兵分三道已奪紇干山雜言君心如皎日妾心似眀月永願承清光繄須嘆圎缺采菱曲蘭舟蕩湖隂采菱湖水深願持花作鑒為照阿儂心涼夜曲玉枕木犀牀桃笙截翠方鳥啼驚夢覺涼月下回廊木有蟲木有蟲聲簌簌嚙木為糧穴木為屋風雨不漂搖淫淫飽淹育獸罹網羅魚毒食餌木中之樂那可擬爾蟲慎勿使穴穿穴穿身露集螻蟻啄木飛來不貰汝黃鵠曲送朱某之膠州乃祖清開海漕黃鵠兮黃鵠金衣兮鞠裳銜粟渡海致帝鄉有雛有雛羽翼長曾隨鳳凰集明堂曉栖上林樹暮下建章宫俯視燕雀槍榆枋髙飛逺舉天門翔天門翔羽肅肅吁嗟乎黃鵠春夜樂次韻鐡崖先生蟠螭噴熖蘭釭紅神仙小女乘青龍鳳麟膠絲光瑩蠟㕍泣驪珠落銀甲鸞刀截肪五鼎烹紫微露㵼玻瓈罌雙蓮飛觴左右行感君恩重甘結纓紅玉花房玳瑁柱錦帷屏暖春為主天雞喔喔鳩喚婦梨雲散作巫陽雨鶯啼曲麯塵波㸃楊花雪紅褪薔薇衆芳歇曉風寒透越羅裳離鸞孤舞瑶臺月窗外一聲黃栗留緑隂如海樹樓樓嫁得蕭郎輕逺别千金結客帝王州前年郎去鶯出谷去年書來客巴蜀鶯啼花落又今年鴈柱愁調合歡曲黃蜂蜜滿鶯哺兒鶯鶯隨母遷髙枝願郎作官向京兆歸聽鶯聲親畫眉遊仙詞壽鐵崖先生鐡崖啓靈秀紫虛植仙宗嘯詠登太霞八鸞韻雍雍東華命考籍玉檢芝泥封飛行帝青上雲車扶蒼龍楊君金庭彥按部昆侖丘左攬鳳凰轡前驅龍虎輈轟雷噴小鐡河傾漢西流下視臭腐輩尸行不知休九華有真妃乃是安鬱嬪學真龜臺館擢秀牛河津丹章閟神虎餐霞啜日根飇輪宴七景雲轡躡三辰下邁楊君家冥分締良姻既欣對景好夙契心所親奚必輕中接塵勞穢七神西池蟠桃子一實三千年翠羽銜璚花雙飛凌紫烟阿母啓玉齒笑顧老鐡仙鐡仙青藜精主司文昌權不比狡獪兒滑稽稱世賢楊栁枝送蘇彥剛奉母入汴楊栁枝春江曲千縷萬縷搖新緑柔條不解繫蘭橈相逐遊絲向天北兒郎去未歸數遍江頭樹憂心如搖旌縣縣逐飛絮絮飛葉成隂猶能庇本根嗟彼逺行子胡為不思親枝上靈禽噪晴晝鶴髮倚門屢搔首綵衣南歸拜堂下持觴起舞歌楊栁母樂泄泄子樂融融不比楊栁枝零落同秋蓬母子歡樂情無終嗚呼母子歡樂情無終搗衣曲涼風被疏桐一葉下井幹夜氣徹虛宇露華凝微寒耿耿修月光流暉入重闌中宵抱孤影晤昧發永嘆良人逺行邁守邊向三韓眷兹秋冬交感時不遑安含嚬理篋笥紉補在茍完層波展東絹積雪明齊紈霜砧迭逸響餘音徹雲端粉題流素汗鴈足焚膏蘭摼針秉刀尺剪裁心悽酸縣知肥瘠何想像縫中單制成逺寄將緘封涕汍瀾願酬報國心努力勤加餐河之水河之水流瀰瀰出昆崙導熊耳踰龍門激吕梁吾不知其幾千里但見濁浪溷淈東馳入海日夜去不已奔湍水瀺灂斷岸石崎礒北風揚沙雙目眯一夫操舟衆夫檥長年百丈上急洪十步趨前九步止蒲伏力爭磨旋蟻戲馬臺傾進履橋圯芒碭雲飛大風起漢楚英雄俱已矣吾聞千年一清聖人生聖人臨御河當清河之清萬方寧萬方寧歌升平驅車篇送瞿惠夫鎮江學録驅車聲轔轔駕言適朱方揚旌羽旗翠櫜弓菆在房褰帷覽河山飛蓋度康莊行矣闡文化天子正當陽西北有髙樓西北有髙樓飛甍與雲浮曉寅暘谷日暮挹崑崙秋仙子下黃鵠美人行玉舟紫鸞雙度曲涼月在簾鈎門有車馬行門有車馬客繡轂夾朱輪玉鞍光照路翠蓋影搖春髙堂翼翼雲承宇燕蹴飛花落紅雨升堂酌酒壽翁媼吳娃歌歈楚女舞願翁多子仁且武執㦸明光奉明主明珠白璧安足數驄馬驅公子驅驄馬趨朝非冶盤金裝鹿盧劍玉刻鏤衢鞍曉刷滄溟上暮秣燕雲端萬里起跬步那知行路難清秋曲次許彥溫都司韻風雨滿城生薄寒瑣窗烏啼夜將闌深閨驚秋思寄逺金刀玉尺裁中單烽埃漲天白日暗坐使緑鬢成凋殘良人戍邊歸未得長林蕭蕭楓葉乾金屏曲次顧玉山韻蜀絲步障圍雀屏銅槃膩蠟光晶熒雲旗翻月招湘靈蘭芽玉茁春娉婷寶叉翠滑欹雙燕鵠别鸞離訴恩怨璚巵血漬燕支片牽挽飛光為花勸青蛇電掣星流虹鯨呿鼇擲趨羣龍冶郎斷纓滅銀燭肉臺碎觸連枝玉海塵愁吹桃李容洗粧並入華清宫羅衣蟬翼繡芙蓉粉汗紅香飄蕙風珍珠撒地誰先拾露寒銅掌金人泣芳卿寄謝無蹤跡東方煌煌太白出小栁詞為鐡崖先生賦小栁十三餘臨池解學書扇描金孔雀水滴玉蟾蜍右一半臂蘆花白中單杏子紅惱公何限思春水畫橋東右二解製烏紗帽能唱白銅鞮飛花雖作雪密葉自成蹊右三度得嬉春曲金籠語雪衣不同雙燕子去逐野鶯飛右四洞庭三萬頃君山一㸃青道人橫笛過獨許栁枝聽右五獨酌謡晉王敦宋王安石不飲人以奸邪目之淮海秦約作獨酌謡邀豫同賦故及之獨酌一壺酒獨酌樂天真又何須撞鍾擊鼓秦謳趙舞列鼎坐重茵天地作蘧廬日月為户牖隂陽作朋造化為友不願白玉縣腰間不願黃金繫肘後但願年豐四海清日月沉醉無何有獨酌有真趣可惜少知音清風明月蛙鼓吹仰天浮白嗚嗚吟獨酌誠可樂撫事愁彌深長歌拔劍舞渾脫壯氣激越秋隂隂君不見東家積錢與斗齊美人如花白玉題一朝禍起口仰藥紅顔散作他人妻悔不日日獨酌三千巵又不見王敦不飲愷殺婢安石固辭司馬醉萬古埀名在簡編酒邊已蓄奸邪意花遊曲次韻鐡崖先生招張貞居遊石湖暖雲霏霧搖空濛遊絲弱絮縈柔風木蘭載春石湖裏呼弄璚英掬春水鐡龍飛霜招羡門鸞旌小隊青霓裙凌波雙飛動塵步冶情漫憶鴛鴦墓踏春撾鼓能幾來便須一飲三千杯血色蒲桃凝冰碗鬱輪袍催紫檀板雲旗縹眇青鳥西口銜紅巾緘舊題璚林宴中探花使骰子逡巡賜緋四醉攜紅袖寫銀箋不數公子花遊篇龍王嫁女詞海霞蒸紅電光紫洞庭女嫁涇陽子帝將鱗車三百兩阿香驅雷投雙鯉冷光青熒紫貝闕玉綃淚染鮫珠血天瓢翻鬛白馬嘶合歡杯吸鯨波竭兒郎燒尾負山走神龜持書報髯叟魚鱗屋深人未知珊瑚鈎繫湖邊栁織錦曲繡帳錦流蘇畫閣金琅璫短機未成匹愁隨秋夜長綵鳳銜梭動纎體萬葉干花勞素指海枯石爛此心存比翼相栖木連理雞嗚篇素魄欲墜地啓明初上天攬衣出門望雞鳴髙樹顛一聲海色動載啼朱斗旋三唱車既牽征途何渺綿喈喈復膠膠去騎何聮翩車中者誰子東吳美少年讀書碧窗夜起舞淡幽𤣥豈效五陵俠金距鬭東阡行行向何許言往鍾山壖金馬雲中聳蒼龍闕角懸雞人起呼旦待漏禁門前矯首思君子長哦風雨篇吳儂謡四座且勿喧聽我歌吳儂二月春淡沱桃杏連村紅壺酒操豚蹄太守出勸農所欣風雨時擊壤歌屢豐榆火發新燧栁烟散輕風條儂墻下桑浸儂水中穜穀雨儂播種盈疇緑葺葺四月五月交移秧向田中手龜指流血壁立環堵空野菜雜糠籺饑腸豈能充八月官倉開新穀不得舂晚禾穗離離大風來自東搖落滿區畝太息心忡忡收穫將上場伍長追呼忙荷鋤㩦畚臿何暇别耶娘言開白茅港兼程冒嚴霜州官㸃儂名里正與儂糧夜投草中宿重趼腳成瘡昧爽起負土夜繼燈燭光千夫百夫長程度施鞭榜里胥至儂家催糧入官倉況無弟與兄有米不得將吞聲語哽咽獨立野倣徨朝行河隄上暮宿河隄傍隄傍泥漸髙所積如山岡儂力日已疲河水日可航古者兵出農耕戰固其常屯成種黍稌實作儂保鄣儂來敢生怨儂謡遂成章儂願干戈息四海為邊疆銷兵作錢鎛老作太平氓端陽曲次許彥溫都司韻蘭湯試浴銅龍吐美人䰀􅀢叉懸虎竹粉吹香撲燕泥猩紅血㸃流花雨絳紗籠肉蟬翼輕木難絡臂如珠櫻赤靈符佩練囊小宛轉中鎖相思情鎮東大閲臨細栁甲光照曜狻猊口金僕姑穿楊葉飛帳下酣呼急傳酒鑾輿北狩龍沙長槖它鼓鳴白日涼侍臣萬壽獻天子紫霞玉醴浮昌陽瑞蓮曲為海虞趙實甫昆仲賦芙蓉花並蒂芳皎若嬴氏女雙騎紫鳯凌風翔趙家好兄弟顔色似花美惻惻同袍念肯逐秋霜委露葉淨如拭照映羅衫色雙花衰榮自有時白頭弟兄難再得小遊仙青旄節衛翠雲軿按部東行過赤城龍女遺珠雞卵大結為雙佩賜方平發軔朝從麟鳳洲五城弭節宿昆丘蕭郎吹得參差玉更約飛璚十二樓鸞胎麟脯侑璚巵五色雲旗阿母期樹上蟠桃如斗大休令狡獪小兒知樓觀岧嶤白玉京雲房中有董雙成璚漿百斛那解飲要學叢簫作鳳鳴帝京篇金陵佳麗地神京鬱巍峨帝車環紫極閣道近銀河日上觚稜迥雲生象魏多五侯車接轊七貴騎鳴珂栁濕烏衣雨花明太液波曲臺新講禮祕監舊書戈蜀郡王褒起梁園枚乘過得賢陳雅頌平虜進鐃歌太史金為匱司儀翠飾犧禮成䝉顧問簮筆立鸞坡泛舟橫大江之子逺行邁泛舟橫大江日華動蘭槳山色上篷窗遐覽意有在壯遊心未降手揮如意一腰佩玉環雙臨流莫嗟逝錦衣還故鄉搗衣篇送史仲先逰淮東碧梧葉落黃鞠開邊風蕭蕭鴻鴈來夫君結客向淮楚無衣禦寒良可哀强將垢敝和灰浣湖澥臨流呼女伴雙杵搗砧空外鳴寧憚手龜筋力愞火然金斗尉帖平紉針補綴對短檠歸期遲速未易卜緁長縎短勞經營明年四月蠶上薄繅絲盈車手親絡香羅斷機白雪明裁作春衣寄郎著郎無厭故惟尚新新衣故衣皆妾紉笑看墻角砧杵棄郎衣錦袍歸拜親郎衣錦袍歸拜親有金不戲桑間人遊仙詞次韻金色烏啼若木東弱流沉羽直疑空飇輪不用青鸞御萬里飛行一瞬中貝闕瑶臺護絳雲玉階露氣曉絪緼真妃去校東華籍縫絡明珠火浣裙一塵隔斷聖凡分飛步何煩倩鐵君雍伯俗緣猶未絶尚㩦王子去耕雲西池燕罷玉桃春新製龍綃穩稱身欲借胎仙三百騎衆中誰是衛夫人曾從子晉客金庭洞室巖居已遍經授得餐霞輕舉術清齊底用覓芝苓長爪靈姝身姓麻飯炊巨勝酌松花蓬萊三見波清淺盡詫芳年始破瓜齊房夜降九華仙異域香嬰一縷然寫竟丹章題錦軸玉清神虎內真篇坐騎赤鯉挾琴髙璊玉新治小並桃笑指積金峯下路醉吹尺八聽松濤神仙鼇負過西瀛萬里洪波頃刻清使物主方咸不驗却憐漢武事文成冥緣夙契接佳期慚愧西成是我師碧奈花開青鳥語洞房相對坐彈棋紫荆曲有序豫友費君舜臣其曾大父榮敏公大父江夏侯父宣城君皆著名當代宣城君宦遊西江舜臣嘗學禮於余復卿先生之門遂脫去狗馬紈褲之習名聲藉甚薦紳聞生二子子壯各有室一旦分財異居君歎曰不能教以義方者我之責也呼三子立堂下而詔之曰夫木由萌蘖以干雲霄本之固也水由㳙流以匯湖海源之深也然本撥則枝枯源涸則流竭此理勢之必然若不聞田氏之紫荆樹乎三子乃幡然悔過復同居以事君如初汝陽袁華為製紫荆曲三章以為費君壽云紫荆樹花離離光榮何芬敷雨露之所滋百年蘢葱翠羽蓋費家子孫培植之紫荆樹葉翳翳根既撥葉乃悴費家兄弟復同居華鄂相輝似唐棣紫荆樹枯復榮華開韡韡當中庭折華起舞壽雙親懿哉費家之弟兄春草詞泉南陳彥亷氏少孤作堂奉其母莊以居名之曰春草為賦春草詞六解堂上綵衣斑戲舞娛親顔俯看堂下草生意待春還右一春還芳草碧子長賴母力草色有枯榮母恩無終極右二嚴霜催老幹弱蔓緣孤根春至清隂滿難酬雨露恩右三薰風被荃葛兒衣袗絺綌一縷與一絲咸自母手績右四既無池塘夢肯作王孫遊願身化為草根葉鎮相繆右五主婦能調膳升堂具㫖甘草蔬郎自飯舉案對宜男右六踏踘篇冶家兒女髻偏梳教坊出入不受呼蹙金小襪飛雙鳬飛雙鳬曳雙袂玉圍腰珠絡臂栁風吹雲衮香綿六銀繡花明月圓湘波盈盈動金蓮動金蓮汗霑粟展鮫綃釧鳴玉女郎娟娟栁腰肢錦文嬌束金芙蕖玉纎團雲傾紫絲傾紫絲軃羅袖蹴花心為郎壽香輪小鞹戎葵丈官場踏起齊青雲綵結門縣月為門月為門􅑷身過五花團天上墮湖州竹枝詞月子灣灣照船頭阿儂聽我唱湖州儂心不似雙溪水才出城東各自流荷葉浦北菱湖東清溪曲曲與天通莫將鐡笛弄小海大風倒捲馮夷宫黃姑浣花織錦衣留郎不住送郎歸一色銀河三萬里手攜石子是支機漚波春漲膩如油坐看青山船倒流桃花欲開杏花落打鼓吹笛上杭州西湖竹枝詞儂家少長住西泠門對裏湖蓮葉青妾心如藕絲不斷郎意忽作隨波萍山上有山未還家日日望斷金犢車湖隂剩種宜男草直待郎歸始著花南山起雲北山隂暮暮朝朝晴未深公荷拳似小兒手雖不成蓮已有心昨夜憶郎開綺窗平湖月白水如江妾似兩峯日相望縱有飛來不作雙耕學齊詩集卷二
