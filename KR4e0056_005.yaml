body:
  text: 耕學齊詩集卷五明袁華撰古詩七言李左轄菖蒲花扶輿磅礴鍾草木粵有靈苗根踪䠞下嵌崖竇嗽飛瀑澤沐沆瀣喣初旭寸十二節色縝緑厥石昌陽葉上矗凌傲霜雪氣芳郁審能食之面如玉嵩丘之人衣朱襮翩然而來輸國粟挾以盤杅湛清淑雲根堅固嵗不刋花如車輪光皎然素榮英英秀而妍內秉貞白外嬋媛見之者昌壽綿延飛行八極生羽翰豈但明目能引年世人不信空自捐吁嗟相國仁且賢再拜上供紫皇前為霖為雨蘇煩捐長平戈長平戈頭土花碧長平城下坑降卒將軍戰骨化黃埃此物尚隨鉏钁出識銘漫滅蛟龍形猶帶征人燐血青也知在德不在險四海承平安用兵送郯九成泛海北上兼東秦希魯萬斛龍驤舟輸粟轉遼海若不浮日華五色散霞彩滄波奫渟如鏡明張帆打鼓春潮平南風十日踰萬里髙卧讀書船自行掾郎兹游冠平生飄飄逸氣凌蓬瀛之罘縹眇海津近北瞻龍虎環神京張家莊頭酒初熟長城城下埀楊緑當罏燕姬二八餘手戞銀筝唱新曲舊游十載一茫然落日相思夢寐牽寄謝橋門秦貢士何時風雨對牀眠毗陵許左司中秋對月席上次韻毗陵中秋月色好清光散落千林表烏臺御史紫微郎一笑相逄即傾倒璚樓玉宇淨無塵金粟吹香爽氣新靚粧行酒誰家女恐是天上乘鸞人蹇豫山林性踈散不堪政比稽康懶學書學劍一無成豈解奔趨事生産誰能褰旗夜斬關斫賊手持龍爵鐶歸來獻馘長楊殿奪取金印懸腰間德潤堂為袁仲博賦封禺之山仙所京石室金堂祕璚封當塗丈人居其中乘彼白雲朝帝鄉上陳唐虞登俊良浹以厚澤覃遐荒善實斯積流斯滂諸孫濟濟承餘慶構堂崇岡修中黃服食太和飲天漿靈臺虛明道日充日華曜英徹八窗誰其主之曰汝陽佩蒼龍精冠芙蓉天君泰然體凱康稽首山立歌洞章嶽祗川后翼兩旁千秋萬年鎮兹堂題顔恱堂孝禪圖堂背諼華黃鵠觜堂下江波流瀰瀰白頭阿母在庭闈寸草春暉感游子顔師僧中學禪解談空憶得離家時屋頭霜葉繞紅紫白雲英英度婁水迎母南來奉甘㫖金縷賜衣光纚纚獻壽稱觴母心喜越州剃髮睦州屨千載髙風差可擬初日照青桐啞啞語慈烏念母不復見粉墨間新圖君不見東家甲第連朱樓千金買妾樓上頭筝笛琵琶間箜篌俾夜作晝肆盤游婦姑勃蹊兄弟仇讐不顧父母養而令父母憂顔師顔師曽閔儔烏乎顔師顔師曽閔儔孝禪之書魯春秋完顔巾歌完顔巾金粟道人所製寄鐵崖先生先生賦長歌以謝率豫同作混同江流長白東完顔虎踞金源雄身如長松馬如阜蹾踏黃龍城闕空鴛鴦濼上鴐鵝雪春水秋山事游獵黃河清後聖人生一代衣冠烟霧滅璊玉龍環四帝巾柘袍吐鶻􅋔麒麟錦房芍藥大於斗驊騮坐擁真天人傳自中原文獻家全勝白㲲小烏紗金粟道人鬢己秃挾以雙環歸鐵崖鐵崖先生面如玉繡縷盤花簇朱襮鷓鴣小管沸筝琶春流銀罋蒲萄緑日日倒載髙陽池落花漂搖風滿衣九峰女兒拍手笑月中踏歌歌大隄先生醉筆蛟龍走報以長歌意殊厚脫巾花底一掀髯笑倩栁枝來漉酒趙仲穆遊騎挾彈圖代作開元少年意氣雄任俠不數陳孟公文犀帶束鵠袍小驕馬颯㳫如游龍側身仰望日麗麗為有流鶯在髙樹兩騎聮翩未敢前看送金丸落飛羽白頭烏啄延秋門漁陽塵起天地昏珊瑚寶玦散原野空令野客哀王孫平原公子五色筆俗吏庸工俱辟易寫成圖畫鑒興衰未必奢淫不亡國白頭母歌次韻徐孟嶽白頭母少為倡家女老作種花婦短布單衣才掩股猶記青年學歌舞櫻桃花發當窗樹藝成北上鳳皇城不與長川教坊伍耶娘輕義重金珠㛰娶論財漫相許失身為妾權豪門背立銀釭泣無語主家三入相中書萬騎雲趨當要路馬前鷹犬亦遭時門下桃李自成蹊共工一觸天柱折舞衫歌扇都分擕放還仍飲鄰嫗茶弟妹凋零無一家嫁得湧金門外壻不解耕田能種花錢唐大家羅撿刮救死奚暇誇驕奢秋風荆棘迷花塢充募新軍𨽻分府别時血淚萬行啼信州城下出征西前夫後壻何翕忽貴賤同為道旁骨閉門花落清明雨夢尋舊譜移筝柱覺來無地覔夫骸悔不身先木蘭去至正己亥冬客杭有客持毛襪去久不見還因戲賦以自解領軍家有一屋鞋東郭先生雙破履我家舊物值偷兒赤腳端如玉川婢革鞾骨立寒無藉風霜凍皴皮肉死線材寸短無所長浮世榮名輕弊屣鵝毛縫罽將奚施龜背刮毛徒爾為係帶難令釋之結嚙雪可憐蘇武饑松窗朴渥久不至禇衾暖瓶空自隨北來氈根如瓠肥氄毛䝉茸光陸離金刀細剪雪花落成氈足可供驅馳人生能著幾兩屐畏涂巉巖半榛棘何似山東李謫仙酒酣雲卧游八極來龜軒歌為顧仲瑛賦昔日辟地商溪頭長涂風雪同放舟登樓見月思鄉淚坐石觀雲憶弟愁落花芳草青春暮歸時喜踏來時路入門梧竹兩青青園池樹石還如故中庭有物狀若能贔屭踞石􅀈生苔相驚左顧一笑粲乃是河伯使者清江來重門扃鐍嚴且密曳尾泥涂何處入固知異物神所登却勝余且網中得吾聞靈龜壽綿綿搘牀一息三千年從游鳯麟郊藪外㑹合龍虎風雲前舉目烽烟遍區宇巷陌銅駝委榛莾玉山佳處屋鱗鱗鶯花春滿辛夷塢道人當軒寫來龜邀我為作來龜詩蹇豫材薄不能賦願爾子孫金印懸纍纍射魚行東海大魚鬐鬛赤首昻洪濤數千尺鋸牙鑿齒鏡夾眸噓氣雲蒸天地窄惡蛟毒鱷埀饞涎射工黃能相后先環以鱉甲鳴鼉鼓白日出沒清泠淵前年吞巨艦哆口大江裏今年取渴虎掉尾南山址任公投犗不敢釣刺史移文詎能徙伏波將軍虎豹姿先驅陽侯后馮夷三千强弩水犀手海鰌龍驤銜尾來天吳罔象俱辟易黃間機張聲霹靂箭迸流星一㸃飛暴額推腮肝膽瀝皇仁如天被海宇蠢爾恣睢自貽戚將軍奏凱登瀛洲取封䲔鯢髙若丘燭龍飛出天下白滄溟洶湧今安流君不見枯魚過河泣肉棄泥沙螻蟻食寄謝平頭黃帽郎慎勿操兵取誅殛栁風蓉月亭次鐵崖先生韻緑烟紅霧搖蘭塘嬋娟泣露啼秋芳金蟲朴帳花風熱花底雙歌踏明月畫闌十二懸晴虹美人香骨燕支紅滿眼春嬌小蠻舞雲錦書傅青鳥語亭中主者江左客春草夢回天下白鄭明德先生賣壽器以贅壻玉山道人復贈一棺賦詩以謝邀豫次韻山人右臂枯有棱日耕研田耘剡藤秪今年己六十五感時念舊身凌兢文章海內鳴當日老病窮愁如蝟集子亡女長當贅壻無錢賣棺情豈恤江空木落西風髙短衣破屋驚􅊧牢相逢玉山淚流霰老我太平難再遭玉山重義急水火為製柟木棺若蠶得纒裹便呼老僕荷鍤隨醉死何妨即埋我君不見北邙山荒墳纍纍白草間積金何如積隂德黃鳥能致三公環北山寓興北山之中春載陽膏雨霡霂草木長溪蔬野蔌青戴土老叨採擷充枯腸枸杞黃凝鞠菹熟蔞蒿青㸃芹羮香步尋木雞竹風冷手拾菌釘松露瀼蕨拳敷腴竹萌嫩韭木豐肥同芼薑鱉裙鵝掌俱退舍牛炙豚蹄難擅場春光爛熳過三月靜愛幽香生野芳寒具藤花甘勝肉涼餅蓼芽圎截肪槐葉光浮素碗凍含桃花映清尊涼石芥鼻觸氣辛烈金虀齒嚼聲宫商不䝉朱門貴介録獨許白屋幽人嘗物無定味貴適口冰壺先生真欲狂萊公萬羊數己定庾郎三韭貧何妨分羮不均御者怒染指未食天倫戕驕奢淫佚古所戒口腹纍人良可傷山中之樂樂無央秋風又到蓴鱸鄉菊黃橘緑茰蟹紫桂酒新篘香滿觴菜園不愁羊踏破便當爛醉眠糟床雖然此腹久負我結交嵗暮母相忘再用韻懷錢塘舊游憶昔南游浙水陽越山青映吳山長青鞋皂帽紫笻竹躋跋鳥道登羊腸葛翁嶺下丹井冷西子湖邊花草香螭頭畫舫載歌舞醉歸零露何瀼瀼幻仙時居靈石塢清齊逺致霜前薑酒闌嘻笑即揮灑筆陳酣鏖文藝場騎䲔上天雖不返潛德百世猶流芳栁洲數過拾遺宅繞屋清泉甘若肪湖南憲幕官不調一别四見秋風涼顧瞻停雲動遐思落落端如參與商欲謀斗酒恣歡謔感念死生安忍當山隂狂客老更狂舟楫欲來道里妨黃塵暗天尚格鬭島夷峒蠻相奪戕可憐殺戮到雞狗今我不樂心孔傷興亡治亂固有數流毒海內誰遺殃眼中之人美無度安得放浪來江鄉時維清和白日永溪毛采掇供壺觴並游英俊屢入夢夢覺明月流空牀但當痛飲醒復醉歡樂悲哀俱兩忘題美人汲井養花圗茝石鶯啼瑣􅖠靜御栁條長拂金井美人初試薄羅裳翠袖雙擎玉壺冷璚樹花開璧月圓一枝折得浸紅泉莫教野鹿偷銜去狼籍香囊蜀道邊紀行歌送陳士惟新喻教授陳廣文短而精悍才且㒞投老逺之新喻任中流揚舲張大帆烏帽霜華㸃秋鬢憶别楚鄉今十年夢想江山動游興憶昨經覽初看山數去程放舟婁江口挂席南風輕長年三老椎大鼓釃酒割牲祈降靈開頭捩柁入揚子東望淮沙海門紫鯨魚吹浪波冥冥不覺狼山去如駛舟行三日數百里忽見金焦屹相峙鐡甕城頺壁壘荒百戰英雄嗟己矣曉行朱金沙暮泊石頭城不聞商女歌玉樹黃蘆苦竹生秋聲復泝彭郎磯還經敷淺源落帆官亭湖遙見香罏烟却憶儀真不數日行盡長江十三驛大孤雨晴冰鑑開白石青林映行色始離墟落見城市髙閣魏魏對山起摩鐡柱弔旌陽俯仰清風懷孺子三洲橘熟秋雨霜楓林㸃染兼丹黃烟華萬井照金碧石城百雉圍清江范太史清江生視草登紫閣看花游玉京子今往彼我歌紀行范公雖仙典刑在山川草木皆知名醉歌擊唾壺君毋憂問涂安得成寬輩寫作長江圗遊惠山寺蒼山蜿蟺蟠九龍石泉混混流其中下灌吳田數千頃澤物豈止煎茶功支分餘潤及草木松杉枯柏青䝉茸只今無錫天下濟煆冶不復炎烟紅鼪鼯羣嘯叢祠空遺像者誰桑苧翁波泉酹地薦蘋藻俯仰千古懷清風靜安堂為婁下徐氏賦婁江東下經昆丘上有新堂河渠渠軒榮窈窕通綺緑挾以槐桞羅前廬堂中之人美而修集芙蓉裳紫霞裾心不妄動安無虞誰其主之曰姓徐女紅麻枲子治書豐年多黍仍多稌視彼利欲爭紛拿噂㳫權門足次且何如靜安安厥居汝陽作詩置座隅勗爾朝夕勤劬劬母縱逸樂荒于嬉審能行之寧爾軀耕學齊詩集卷五
