body:
  text: 耕學齋詩集卷八明袁華撰律詩五言夜泊澱山湖有懷鐡崖先生鼓楫淞上遊輕帆度泖洲對月耿不寐懷人殊未休征鴻唳沙磧微風生柁樓澱山青一點龍氣落船頭杏林圗董君遁世士髙居廬阜山神方傳肘後丹杏滿林間采藥猿持钁看書虎抱關畫圗留好事遺韻邈難扳送于彥成歸越中楓橋明積雪曉發剡溪舟獨鶴橫江去三山接海流緑尊傾乳酒白髮映霜鷗天姥雲門路曽同上客遊見山樓窈窕飛樓上天然圗畫開雲從桐井起水向柳塘回素月流書幌青山落酒杯何時同逺眺與子一徘徊甲午嵗丹陽道中即事覽古丹陽郡興亡幾戰爭山橫季札墓江轉呂蒙城壞壘烽埃赤荒墟磷血明賣刀仍買犢何日事春耕昔年梁武帝葬父在平岡皇業寺猶在蕭陵名未亡石麟薶碧草玉鴈錮黃腸觸事多興感悲風起白楊元戎擁貔虎開閫鎮朱方勇鋭知無敵驍騰孰可當隂謀周吕望決勝漢張良坐使風塵息論功宴未央天設長江險悠悠萬古情煙光連北固雲氣渺東瀛夜泛金山寺花遊鐡甕城也知狂李白乘月醉騎鯨聞道黃連破吳儂喜欲狂渠魁竟授首遐裔盡來王洗甲潯陽水銘功赤壁岡總戎英且武疑是郭汾陽平糴吳東粟委輸江上遊泛舟雍繼絳給餉馬連牛堅壁雖皆破陳師尚未休將軍身許國不解蝨兜鍪遊俠誰家子操戈復父讐剽金當白晝被酒宿青樓意氣傾京兆豪華擬列侯儻逢強項令梟首在竿頭水軍新建節遴選盡英雄粳稻千艘發梯航四海通斬鯨朝拂劔聞鴈夜張弓獨有玉山客參謀在幕中婁港蒙衝發開帆駕海濤揮戈當落日殺賊竟清宵刀剸犀為甲鞭驅石作橋何人投筆研自擬漢班超馳驅思欲迷惻惻重悽悽去國悲遊子懷鄉夢故妻斷溝科蚪聚灌木郭公啼獨有平安字緘封手自題丙申上己夜見月思家三月初三夜溪樓見月生雲連銀漢白星拱紫垣明野寺鐘才動荒村雞亂鳴弟兄俱異縣有淚似須傾丙申嵗有懷南北師友鐵崖先生第二橋邊路問竒那厭頻文章司馬氏詩酒謫仙人笛弄莫邪鐵尊開太古春梅邊草堂好矯首隔風塵張師允憲僉奉使趨庭日嚴霜委紫荆孝誠天地格忠義日星明未弭江東節俄羅海上兵潛身向何地天末暮雲橫富珠哩子升經歷問訊湖南暮囏危無使來兵戈何日息舟楫幾時回雲夢惟空澤錢塘又劫灰相思對明月獨立意徘徊蕭元泰先生一從騎鶴去滄海變桑田遁世陶貞白移家葛稚川灌園朝抱甕煮石夜分泉縮地應無術尋真或有緣髙則誠録事永嘉山水郡燕服帝王州獻賦長楊內從君滄海頭阿戎終放曠小杜最風流花滿西泠路煙波渺白鷗錢成夫編修憶昔錢塘别于今十載餘扶搖鵬鷃異相失燕鴻如代祀臨南鎮移家賦卜居髙林疏雨霽南望正愁豫于彥成鍊師前朝將家子學道越山中賣杏虎收穀吹笙鳳集桐鴟夷能貨殖處士本英雄禹穴藏書處璚文玉檢重學性海講師雲扉景氣清曽聽話無生丈室文殊座雙林舍衛城龍泓循故道寶殿麗新甍聞説胥江口袈渡晚晴秋夜中庭坐深夜詩思與秋清零露沾衣濕流螢度竹明酒杯嗟量減烽火喚愁生斷送凄涼好西風鼓角聲種玉亭種玉新亭下移來嶰谷中幽根留宿土醉日動微風杖化龍飛雨笙吹鳳下空道人參玉板避世隱牆東挽鐵崖先生昔客錢塘日曽陪杖履行授經終卒業問字屢稱觥南國衣冠逺東維砥柱傾平生三史辨大義日星明瞿允同夢侍其考野逸翁有烏飛集其肘遂名其堂曰夢烏憶弟春吟草思親夜夢烏栖冠旌子孝集肘慰兒孤失喜承顔色含哀詠畢逋升堂觀返哺感慕重長吁題倪雲林山居圗地僻無轍迹知為靜者居山泉激石駛巖樹覆窗虛洗藥坐濯澗負苓行讀書兹丘儻可老吾欲樂耕鋤夢草池為謝伯誠賦幽居絶蕭爽新緑冒芳池南浦春還日西堂睡起時弱鱗依密藻莩甲罥遊絲矯首思公子扳援玉樹枝渡吳松江三江東海入渺渺際天浮魚蟹松陵市珠犀滬瀆舟季鷹終託興魯望舊追遊自愧猶馳逐臨流羡白鷗次韻塤大章梧竹軒聮句會合維摩室微風滿榻秋雲龍韓孟句冰雪徹休流洗􅊦桐隂落鈎簾竹影浮干戈雖在眼慎勿賦登樓聽雨舟枕書篷屋􅔄卧聽雨聲秋蕭瑟芙蓉渚凄涼杜若洲何人遊赤壁無夢過黃樓欲覔鴟夷子江湖渺白鷗賦得金錫送文起周開士金為錫飛行向日邊穿林鳴落葉卓石湧清泉天末龍同往雲間鶴共還始知木上座曽悟夾山禪題倪雲林所寄陳彥亷春草軒圗彼美陳徵士幽居愜素心字臨張旭帖彥亷所藏張旭帖詩詠孟郊吟老圃秋花瘦間庭春草深寫圗并琢句持寄自雲林倪雲林同集雲林遁世士詩酒日陶情灑墨寫蟲篆放歌揮兕觥庭下幽花吐階前疏雨晴不愁江路永扶醉出重城耕學齋詩集卷八
