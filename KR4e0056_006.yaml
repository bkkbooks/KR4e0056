body:
  text: 耕學齋詩集卷六明袁華撰古詩七言復鄒忠公墓為謝子蘭賦有宋開國三百年聖君哲后登才賢內無吕賈武韋祻昭憲流裕逺且綿宣仁埀簾輔哲廟初政倣佛元豐前奈何權姦枋國命黨籍忠良俱左遷紫宫正位儼宸極豈假巫祝循私偏非言搆獄獄詞具奉詔廢作瑶華仙謀之者誰郝內侍卯金刀氏相夤緣元符授册立為后姦臣揣摩機已先維時忠公居諌省從容奏對言便便屬比祥符永平事春秋大義星日懸孟后既廢不可復劉豈得擅中宫權遂良還笏為斥武好禮上書因諌玄忠言逆耳竟逺謫徒步獨上新州船貞哉賢母成子志身落瘴鄉甘棄捐端王嗣位肆大眚放逐兩載蒙生還尋復正言轉司諌三守劇郡親蕃宣俄承天語詢諫草云付烈熖飛炎煙偽書一出那可辨再由衡嶽移漓川淡山寺中啼怪鳥仙宫嶺下流清泉精誠端能動天地神物衛護非偽傳豺狼載路尚猖獗脫身虎口仍顛連放還未幾瘴癘作一病不起寧非天僅存餘息見故友言以國事猶拳拳公也程門弟子列存心慎獨功彌專思陵贈諡發潛德己死姦諛應凛然常州城北十里許髙墳纍纍官道邊政和迄今二百載子孫散落犁為田牛羊暮下蒿棘滿淚落行路興哀憐謝君慷慨當世士獻書天府言數千建祠復墓限樵牧新松稚竹清隂圎嗚呼章蔡終貶竄同惡豈能謀自全青山門外一壞土尚有諸生加豆籩忠邪猶來難並立不信請視思賢編匡山歌送恢復初上人有美人兮思匡山嵗云暮兮道險囏江空積雪濤波若山立駭慘栗兮凋朱顔邀芙蓉於五老兮悵飛瀑之潺湲顛崖絶谷以暗靄方翼層霄而髙舉如翥鳳而騫鸞長松幽蘭芊綿野芳鳥道百折上捫翼軫不得窮躋攀鶴夜怨而寡似遲夫君而未還山川搖落兮老冉冉而懷土歌匡山兮將歸望孤雲於極浦嗟昔人兮既逺訪遺蹤而覽古社結蓮以植花林賣杏而守虎驅飛錫兮踰險阻雲為扉兮月為户攜匡山兮招應真飯松花兮飲石乳展丹屏之九疊泝銀河之三梁閲瓊經於户室採金芝於珠房霞氣朝潤天光夜明養貞素於恬淡兮聊消搖以徜徉慨鳴鳳之不至胡衆鳥之髙翔騶虞弗仁駑駘以良樹樗析桂用狼牧羊彼方以跖蹻之為潔亷兮又奚慕乎夷齊採薇於首陽賦歸來兮彭澤懷髙士於南昌清風至節照今古吾將尚友于斯人兮歌濯纓於滄浪瞻白雲兮思君何山髙而水長野老移家圖為謝子蘭題野老移家向何許乃在吳松之甫里治生擬學陶朱公釣竿欲覔玄真子小兒讀書坐船頭大兒擊楫歌中流細君斫膾婦炊黍老子醉卧蘆花秋人生真樂不易得兒女團欒居澤國避秦何必問桃源朝泊江南暮江北分題得雪夜擊蔡蔡州城中盜弄兵蔡州城外皆行營洮河將軍猛如虎竒材盡選山南英夜龍張瓜天雨雪大風偃旗膚欲裂銜枚發刃彀弓行洄曲朗山道俱絶懸瓠城多鵝鶩池擊之使鳴敵弗疑健卒前驅坎墉入假柝傳夜聲遲遲黎明雪霽城己墮尚詫兒郎求禇衣白袍單騎降帳下渠魁檻送來京師受俘獻廟歸飲至文章千古平淮西雪巢雪映梅花白玉碗香醪凝琥珀英雄豪傑無時無莫笑出門天地窄只今汝蔡起風塵千里荆榛犬食人安得將軍提寶劔剪平大憝慰生民白雲樓歌次韻文學古白雲樓居深復深道人燕坐雲為心未逐神龍澤天下時從倦鶴栖巖隂玉氣虹光射虛牖天逼闌干挂牛斗始信桃源隔一塵世人只許聞雞狗君不見茂苑長洲荒草裏豪傑銷沉呼不起功成身退去者誰一棹鴟夷渺煙水又不見秦川公子走干戈龍顛虎倒奈渠何落日憑髙望鄉國愁懷借酒生春和世事興亡等飛絮難挽黃河水西注御風八極恣遊遨歸去還依白雲住靈壁石魚磬歌靈壁石魚磬房山髙公所遺杜南谷真人者後歸開元王溪月逮溪月殁南谷之孫丹丘復得之鐵崖楊先生志其事汝陽袁華為作歌曰鯶公潛迹淮泗淵禹門燒尾凌風煙未隨磬襄蹈東海先從琴髙遊九天天家披腹星磊磈帝遣下主芙蓉仙賜恩三品甲之上黃金寶帶腰間懸俄逢穀城文人怒遷謫乃居靈壁顛補天不值女媧氏支機徒傳博望騫蒼顔緑髮嗟老矣時同樵牧雲根眠故交相國牛與李後之繼者惟米顛相逢傾蓋即下拜握手話别經千年塊處山林返初服窮探理窟加研房山胸次有丘壑萍水儷結三生緣間厠笙鏞列堂下五音繁會聲相宣嵗暮栖遲南谷口日與琴劔相周還飛鳬葉縣覽溪月一往不復寧無愆通玄真人素有約招之歸老丹丘田具區澤中訪范蠡計籌峰頂尋辛鈃延平劔去亦異事合浦珠還非偶然千秋翁仲荒草裏萬嵗艮嶽寒蕪邊感今慨古重太息人亡器存良可憐君不見贊皇平泉醒酒石子孫世寶稱其賢映雪軒朔風捲地地欲裂黃雲漲空江水竭素娥驂駕萬娉婷紛舞霓裳下瑶闕華屋酣春暖圍肉泛蟻浮羔呌橫玉錦帳流蘇犀辟塵胡蝶交飛夢魂熟老康懸鶉肌起粟竹素園窺鬼夜哭青藜無煙沉燭龍萬壑清冰眩雙目方諸露吸孤蟾精冷光倒射玻璃明碧紗籠煙照藝葉鈞天九奏簫韶鳴蟬聮簮組桐城族堂下珊瑚森列竹軒開虛白境閴寥夾座粉香飄萼緑玉碗龍團捧纎指狐裘蒙茸據烏几醉援毛頴傳冰壺笑殺清狂回剡水寄題吳興任孟暉溪山春曉畫壁我家苕溪山水窟流寓婁東歸未得前年避地到鄉閭親戚歡迎慰岑寂長橋崒峍勢如龍下飲大溪埀渴虹先人舊業桑梓在石田數畝松亭東南望羣峰奔萬馬渺渺鷗波連若下桃花夾岸放漁舟疑是仙源問津者謝家客兒有髮僧俊爽捷若秋空鷹有時清唱醉花月有時趺坐談三乘結樓髙倚雲松杪門對溪山春日曉誰人粉壁寫成圖索我題詩故相惱謾歌溪山春曉歌安得杖屨同婆娑為詢舊業在溪滸稚松叢桂今如何送繆生之錢唐省親繆家郎目爛巖電光金線衣蟠桞色黃紫荷囊佩玉鈎長暮朝讀書不下堂宛若丹山雛鳳凰吳城一夜兵戈入老幼蒼黃計安出􅊧牢幸得此身存翁媪信音何處覔青天蕩蕩日重光太行可梯滄溟可航不愁水有蛟鱷道有虎狼舟遙遙指錢唐舞斑衣稱壽觴和樂泄泄氣洋洋君不見東鄰老翁金滿埒骨肉凋零子孫絶人生貴在親目前萬里封侯奚足言拜石壇歌顧君仲瑛所藏湖石上有蘇文忠公題名後復獲公快哉亭帖逮一時物也乃命朱圭摹刻于石因丹丘柯博士嘗拜之白野監憲公題曰拜石壇仲瑛邀豫作歌紀之眉山三蘇宋儒宗長公矯矯人中龍南遷儋耳西赤壁文章光熖超鴻濛快哉之亭雪初霽領客登覽山川雄自言平生不解飲胡乃一舉觥船空和詩寬限見真率鑿崖題石磨蒼穹功名富貴等丘土斷碑殘素埀無窮吁嗟異物神所衛玉山合壁俄相逢奎章博士丹丘翁江南放逐驚秋風見之即下米芾拜二顛癡絶將無同築壇山中加愛護樹以松桂連椅桐雨窗雲户濕寒翠朝闌暮檻開晴紅白野御史龍頭客青年獻賦蓬萊宫戲將秃頴寫􅝻扁斷叉折股星流虹秪今烽煙暗河嶽王侯第宅皆蒿蓬牙籖玉軸映竹素好事獨傳吳顧雍婁東朱圭鐵作畫字字玉屈盤蝌蟲嗟哉昔人今己矣慘淡故國風煙中如何二子復嗜古策勳翰墨收竒功我來再拜重太息蒼蒼古雪吹長松登壇絶呌浮大白酒酣目送孤飛鴻戲簡強彥栗錢唐湖邊春日暉鄧家蠻娘金縷衣向人凝笑語嬌澀陌上花歌緩緩歸伯勞東飛燕西去惱公無限相思意有約荷花莊上來紫鸞笙裏留春住美人剖瓜圖蛺蝶雙栖萱草花輕衫新試方空紗髻斜䰀􅀢不復理小鬟初進青門瓜昆刀未截璊玉璧手奉瑛槃倦無力嚼破紅冰如蜜甘誰解黃臺語悽惻玄門草暗歌吳淞江北丘虛南壤土沃衍泉水甘宅幽據勝得佳處乃是玄門之草暗暗中主者貌竒古昔曽騎從將軍府錦繡樓臺劫火餘豪傑銷沈化黃土一葛兼一裘歸從赤松遊采芝行引鶴賣藥或乘牛得錢沽酒澆牢愁挽之那止輒掉頭霸陵醉尉不訶問煙波釣徒相倡酬草暗足佳致當窗崑玉峙流雲度松顛飛泉鳴竹裏可以燒凡鉛鼓素琴屏三彭戲五禽漁樵或爭席利祿豈關心斯時斯境不易得按圖便欲窮幽尋登真隱訣儻相與遲汝鸞笙縣圃岑劉孝子行豐城孝子身姓劉年始十三復父讐天子臨軒親顧問再拜階陛重叩頭臣父出宰海上州奉宣德化紓民憂民有大猾曰蔡某作官鄉里仍行賕交私寮佐搆間隙妄陳大府誣罪訧使者巧詆遂致法逺謫煮海為羇囚臣甘解衣伏斧鑕願白父秩寃之由詔下執法復慮問主謀梟首餘皆僇嗚呼孝子罕匹儔太倉少女差可侔更請長纓係強虜策勳萬里歸封侯夢綵堂為余士平提學賦綵服染緇塵遊子逺辭親遊子綵服敝恩賜朱衣新曉衝燕山雪問程揚子津西望不見匡廬雲江南己老鶯花春食寄吳下旅旅館燈昏夜身逐一篷飛心隨孤蝶化阿㜷倚門遲子歸奉觴拜舞趨慈闈堂隂萱花大如斗堂下玉樹森成圍子歸何草草母樂亦融融俯視兒身衣猶是母手縫慈烏擇木思返哺啞啞悲啼近堂樹空梁月落夢回時此身有愧南飛羽送印月潭歸穹窿山春草遍南陌春潮流落紅美人婁水上一舸逐東風一舸向何處言歸故山去雉鳴苦竹岡離情黯煙樹故山穹窿髙插空重湖倒浸金芙蓉縹眇寶樓林壑中晴嵐暖靄霏簾櫳三年不踏虎溪路夢禮大士青蓮宫風景既不殊山川宛如昨為問鴟夷舟何似支硎鶴安得相從訪二公醉躡丹梯倚寥廓山崖乳蘭芷芳臨溪采擷煩寄將相思引領天一方載歌招隱為報章重來握手成大笑楊栁花飛春筍長雲西老人春山平逺圖雲西老人富文藝博聞好古無仕志我雖不識嘗夢之矯矯丰姿髯磔蝟馭風騎氣上鈞天斷縑尺楮人間傳點染倣佛營丘李重岡復嶂孤雲邊溪頭春還雨新足灌木蒼蒼栁將緑漫郎刺船何處去待向前村借書讀人生富貴如秋煙草木同腐良可憐老成典刑不復見展卷題詩心惘然分題得南武城送顧仲瑛之濠梁南武城在婁水闔閭昔築候越兵檇李兵交竟傷指夫差一戰雖復讐嘗膽毋忘會稽耻大夫種至請行成屬鏤卒賜忠臣死爭長黃池盟寧知甬東徙南武城城己墮我來覽古仍賦詩棠梨花落雨絲絲遊子西行何日歸悵望不見令人悲髙房山雲山圗尚書髙公寫山水神妙深造董與米想當解衣盤礴初雲氣淋漓落生紙憶昔故都全盛時大藩冠蓋羅熊羆春明幕府文字簡緩帶輕裘信馬歸湖上青山龍鳳飛五雲特立何巍巍隂晴朝暮多變態點染粉墨歸毛錐嗟豫生晚徒企慕不獲從容陪杖屨小窗展卷記曽遊倣佛初陽臺下路溪回略彴號驚湍松山漠漠生晝寒仙翁丹成己長往空留館宇瓊林瑞三邊烽火埋黃霧夢墮湖山未能去雞犬相隨欲問津避地桃源在何處贈李擴蒼頡史籀世既逺斯冰徐張猶善書國朝傑出吳與趙俗工紛紛訛魯魚如錐畫沙叉折股會稽嶧山化黃土尚幸新泉丹井存更有吳興能復古鴻都石經劫火焚蓬萊翻刻亦飛塵二碑屹立潁昌里字畫猶為人所珍青城山樵虞閣老書法中郎名譽早蕭吳楊杜號升堂昆吾金刀刻剛卯華亭李擴心好竒凡將尉律幼所師商盤周鼓秦漢石臨摸掃秃千毛錐朅來相見婁江沚鐡崖鐡限親曽履富兒金多招不行門外求書日成市慈親倚閭思告歸歸去匆匆仍索詩嗟豫潦倒丘壑裏遲子銘功書鼎彛張師夔關山行旅圖青山盤盤樹簇簇岡巒縈紆路詰曲長橋如虹橫絶谷崩崖中斷噴雪瀑客子出門霜滿屋石磴犖確驢觳觫溪頭待渡人立鵠煙水微茫漾初旭東窮滄海西岷峨梯扳鳥道航鯨波重樓復閣岩之阿安得稅駕同婆娑夔翁八十雙鬢皤飲少輒醉醉輒歌泉南漫仕草載過不歸奈此溪山何怡雲閣甲申嵗閏張貞居先生過豫婁江之書樓偕行則句曲周本原也二君先後蛻去今己草載矣周之仲曰致和以豫與其伯兄有一日之雅遣姪虛白來徵怡雲閣詩雖未及識而義不可辭敬賦一解併致懷思二君之意云句曲凋仙館兹山多白鵠積雲蕩胸起層霄紛郁郁卷舒本無心成蓋復輪囷五色散晴采三素墮寒影朝隨白鵠積金峰暮逐神蝙福鄉井山中宰相挂冠歸身似間雲豈受羇不堪持贈賦詩寄變化靜觀聊自怡商之孫子清廟器靈笈琅章發玄祕飛閣馮虛杪萬松隂合窗扉凝玉氣貞居先生楊許儔曽過婁江江上樓論詩秉燭坐清夜傾蓋始識髯翁周我亦華陽洞中吏不歸已是三千嵗西訪髯周弟與孫為覔怡雲當少愒送友人興化衛幕六月入閩關榕隂夾道涼鷓鴣飛鳴苦竹岡一重一崦山蒼蒼雲山蒼蒼馬前起南往莆田尚千里乾魚望祭武夷君考亭肅謁朱夫子九仙委蛇海上來挾以鳥石何巍哉黔黎久沐常衮化野花自發閩王臺候吏立江滸小隊前負弩髙城屹屹擁儲胥太府潭潭列貔虎稅駕趨蓮幕考籍閲我師時平簡書靜覽古還哦詩端明古遺直夾漈富著述子孫雖為庶遺迹猶可覔亦有護法之善神竊弄威柄痛生民忠邪同歸一壞土耿耿信史書姦臣送君莆田去興懷歌短歌登髙儻有賦馳寄莫蹉跎蘇小小像錢唐江中濤似雪錢唐湖頭好花月錢唐女兒蘇小小艷質清歌兩竒絶紗窗夢回春己深黃梅雨潤越羅衾䰀􅀢結偏倦梳掠袖擕檀板愁縈心冶容誨淫古所鄙千載尚猶傳畫史却憶當年桓少君鹿車共挽歸鄉里送吳敬德之濟寧黃河冰泮春水生張帆泝流三日程買魚酤酒入閘去栁岸桑畦啼早鶯歌風臺前塵眯目道路征車聲轆轆秪今邊徼靜烽煙百丈縴船隨處宿濟州城下舊曽逰少年歷覽今白頭秦碑漢碣尚壁立大書深刻蟠蛟虬太白酒樓髙百尺東望青山是鄒嶧市井雖經劫火餘風景不殊還似昔送君婁曲栁色濃大船撾鼓聲隆隆歸塗擬踏梅黃雨莫待霜林棗子紅張溪雲耕讀圗雨過青山麓溪流漲新緑麥熟雉將雛桑老蠶上簇荷鍤朝出耕釋耕還讀書行行負薪誦咄咄帶經鋤門無石壕吏戶有畢卓甕客至輒傾嘗嬉笑雜嘲諷此非桃花源乃是朱陳村兒女畢婚嫁含飴弄諸孫于戲髯張非畫史才比中郎亦無子空留遺墨在人間竹屋荒涼月如水贈劉宗永曹魏製墨推韋氏後來獨數南唐李李家父子藝絶倫徙居歙嶺由易水膠煮鹿角松花煙劔脊小餅雙龍騫堅能削木黑點漆好事寶藏今尚傳蒲潘郭葉宋諸子姓名班班書墨史近代西江朱萬初龍香上貢奎章裏嗟豫老病卧山林時磨破硯臨來禽清晨有客叩户入手抱豹囊操楚音自言家本廬陵住金粟岡頭釣遊處南窮五嶺北燕然澒洞風塵未能去少年結客輕公侯五陵豪俠同追遊黃金散盡黑貂敝空餘老氣橫髙秋却掃煙煤開甕牖梣汁和膠審時候丹砂紫沈腦麝金萬杵春雷鳴鐵臼一螺玄玉瑩無瑕時時抱送文章家得錢酤酒開小口醉踏明月欹烏紗我聞此語重感慨兵後髙門幾家在繡衣紈袴走亂離無術終填溝壑內只今車馬四海同大船撾鼓揚輕篷西泝宫亭過章水投老還鄉誰似公鶴瓢山房圖鶴瓢山房大隱所居乃在泰伯三讓里雖道迫㕓市山林如鶴瓢仙者玉為質紫髯蝟磔目點漆小謫人間甲子初那計緱桃幾偷喫丹成不肯獨長生時施狡獪蘇罷民金針幻作黍珠境跛痾積逮皆能行既識鶴瓢勝按圖入冥想倣佛得要領長藤古木路迂回飛泉落澗聲喧豗不放落紅隨水去恐引辟地秦人來鶴可騎瓢可酌酌罷縣瓢身上鶴世人仰望不可親謖謖松風號萬壑玉山草堂為沈南叔賦東老草堂在何許崑玉峰前婁水陽怪石當門猛獸伏長松繞屋神蜦翔藝窗展卷聲琅琅若出金石諧宫商嵩髙山中隱者所浣花溪上詩人莊小亭野芳發幽香鷗波渺渺涵天光南鄰老翁覔酒伴短笻緩策行相羊草堂之樂樂無央豺虎遁迹罔兩藏何人寫圖落塵世乃是四明狂客老更狂烏乎四明狂客老更狂生紙潑墨兀老蒼杏花金羽圗盈盈繁杏花團雪穠艷飄香春正月繡幕低埀護曉寒金羽枝頭巧調舌風流詞客太多情花中吹笛到天明援毫不草江南賦粉墨經營為寫生太真睡起圗博山煙銷沉水香昭陽殿中清晝長桃笙翠滑睡初熟嫣然秋水芙蓉芳緒龍爪痕殷不滅寶鈿尚掩酥胸雪漁陽鼙鼓驚夢還化作馬嵬坡底血耕學齋詩集卷六
