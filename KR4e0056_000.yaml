body:
  text: 耕學齋詩集别集類五明提要臣等謹案耕學齋詩集十二卷明袁華撰華字子英崑山人生於元季洪武初為蘇州府學訓導後坐纍逮繫死於京師此集凡古體詩七卷近體詩五卷不知何人所編明史藝文志不著録考楊維楨為作可傳集序稱華自二十嵗後三十年所積無慮千餘首吾選之得如午首云云疑即所謂千餘首者後人裒輯以傳也明之初年作者林立華為諸家盛名所掩故人與詩皆不甚著實則銜華佩實具有典型非後來偽體所能及固未可以流傳未廣輕之華贈閔中孚初度詩有同生延祐丙辰年句以干支推之下至明太祖洪武元年已五十三嵗故集中詩句元代所作為多如甲午丙申巳亥庚子乙巳丙午丁未諸紀年皆在順帝至正中惟癸丑正月風雨中偶成一首作於洪武六年頗露悲涼感慨之語蓋欲自附於元之遺民然已食明祿不必作是語矣乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:dd96066d86f0236ab3cab0c2580df7e2133845845ac055be8b810ee619068167
