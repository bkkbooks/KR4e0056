body:
  text: 耕學齋詩集卷四明袁華撰古詩五言述懷贈鍾安期我遊錢唐時始識種雲叟種雲江夏姿意氣傾牛斗小閣瞰重湖掩映栁州栁數過南陽君髙居宅其右長身美丰標清廟列樽卣堂前兩槐樹薿薿葉碩茂清言坐竟日炊黍剪春韭極稱安期生亹亹不絶口前年往京師同泛具區藪傳舍遂識君傾蓋若舊友艤舟埀虹側返照在户牖鱠鯉烹鳬雁張燈夜置酒哀絃展清商撫節歌擊缶間别情何長愧乏報璚玖去年南陽歸往勞或恐後君至我適來良會亦非偶我留洪橋市君宿南屛阜相過半舍餘觴熱屢奔走迫暮即下榻瓜果雜野蔌秉燭坐假寐欲睡還掣肘自言上有親龍鍾及黃耉下無應門兒內乏主饋婦干祿閩中郡風埃面多垢薄遂終養計奄焉失慈母履霜悲風木居廬嵗時久今年來婁江訪我意彌厚眷兹春夏交新緑暗林藪别君殊作惡思君􅍦延首呼酒與君飲中懷與君剖昔如鷹脫韝今若魚在罶北南屢邅回齟齬動輒咎長歌送君行輾轉愈懷舊種雲已仙遊空室泉瀏瀏南陽往泉南未省回轅否相逢倘問豫為言安畎畝次韻雲扉講師遊南山有懷張外史舊遊昔陪張外史躡雲上崔嵬前登風篁嶺酌泉蒼蘚堆後度麥岡重荒墳際蒿萊陵谷嗟變遷覽兹良悲哉維時莫春初鳥乳聲喧豗行循靈石澗坐覔翻經臺萬竹森玉立雲扉絶纎埃楊氏椒房親葬母此山隈想當全盛日軒蓋如雲來至今清壑亭金鋪照莓苔行觴藉草飲蔬果雜櫻梅賴彼二三子促席相延陪醉題素壁間辭翰粲瓊瑰掩映房山詠光怪燭九垓騎鯨上天去化鶴何年回二妙不可作撫卷心孔哀送張師允銓選江西豫章古名郡上應翼軫躔山川互聮絡直與荆蠻連帝憂南服逺何以寄蕃宣相臣躬秉鉞開府大江邊甲兵洗瘴雨戈船清海煙黔黎含瘡痍守令賴才賢考績分殿最三載方起遷謁選詣闕下道里阻且綿廷議經濟臣銜命出典銓張君廟廊器授節斧扆前軺車適楚越春花正芳妍姦貪宜屏黜亷慎屬陶甄憶昨識君初乃在婁之壖别來六載餘懷君思煩悁盜賊各已息徑上官河船側聞江淮間斗米錢三千㸑骸易子食溝壑多棄捐遴選得循良庶可解倒懸黽勉王事畢綵衣舞蹁躚矧兹休明運獲見忠孝全離别不足惜載歌皇華篇次韻顧玉山感懷金粟老秃翁喪女及二婦情鍾政我輩況爾中年後值兹世濁惡喧呶互紛揉逹觀了死生放浪無何有泛覽經律論一室僅如斗蒲團竹匡床趺坐各雙肘心如大圓鏡觸處靡不受榮辱既俱忘恆欲烹走狗獨憐孫與甥哀哀失慈母誰能斷嗔愛毗耶有無垢所談不二法究竟唯濡首宿業想未償驚心血屢嘔深秋天氣暄桑柘葉黝黝念子築杭城土石躬自負城髙石易盡鞭箠無所取書來知近況黧面龜兩手新榖幸登場日夜操杵臼悉供役夫養老稚曷糊口安得海宇清關塞忘戰守歸耕對兒女畜雞豢肥牡側聞王師出鐡馬渡河久中軍霍嫖姚報國忠肝剖鼓行搗虎穴若拉枯共朽捷書尚未至西風又衰栁思之轉鬱陶澆愁唯有酒興亡信有數蛇斷秦鹿走荷鍤死使埋四郊多培塿匡山五詠看松閣匡山何崒峍如拳突中央萬松列巖岫天蟜蛟龍翔若人抱貞節眄柯日徜徉微吟息髙蔭燕坐絃清商茅屋三四楹蘿翠友嵐光謖謖靈籟響隂隂芳晝長采花釀秫米斸苓充餱糧何殊陶貞白結樓居華陽煙雲萬頃亭英英白雲飛瀰漫被巖谷倏若大瀛海洪濤互起伏好風來自東流膏潤山木攬之不可得卷舒一何速危亭俯松抄冥􅊧入遐矚靈物既深潛隂淵寒氣肅有時出膚寸海宇溥霑沃終乘遊帝鄉矯首謝塵俗在上亭衆山皆部婁小亭立孱顔仰觀逼霄漢俯視迷人寰一勺滄溟水數點甌閩山朝暾照澗谷紅紫何斕斑蘭荑茁石罅鞠叢冒溪灣芳林春夏交好鳥聲關關醉騎黃鵠去笑挾飛仙還朗吟萊公句髙風諒能扳清髙亭層巒壁亭北靈淵匯亭西野芳新緑合巖扉空翠迷林深不見日地迥惟聞雞草木氣膠葛六月流冰澌逹人逍遙遊散策凌丹梯澄懷適野性觀物和天倪易同醉侯講詩為應真題急流能勇退名與三髙齊環中亭崇岡積蒼雪羅立展屏幛巘崿犖確中芟夷得平曠四顧何巍然鑱雲開疊嶂山如衆星列環拱皆北向一亭據中央勢欲兩相抗天髙氛翳消春還淑氣暢激水流羽觴鳴琴發清唱俯仰宇宙間覽古興慨慷送友人之明州衛裔夷倭奴氏僻分帶方東頑嚚罔率化不與中國通椎結斑斕衣習俗相剽攻輕生蹈巨浸出沒如熛風爰止崇明里掠虜肆姦凶桓桓張將軍擐甲登蒙衝手中三尺劔紫電明霜鋒追北海門右殺戮無遺蹤執俘仍獻馘錫爵酬厥功拜命赤墀下進秩佐元戎四明古句章海水青浮空山川既佳麗人物亦豪雄感别意惻惻懷古心忡忡南薰吹斾旌小隊羅刀弓長途驛馬疾逺浦渚蓮紅勉旃同前烈策勳銘景鍾拜劉龍洲墓歸飲清真觀以龍洲先生遺墨分韻得何字龍洲湖海士瘞玉崑丘阿山川邈如昨喬木拱煙蘿偉哉二三子覽古發嘯歌披荆弔遺迹窆石臨嵯峨慨嗟嵗月流奈此湮沒何立闕表墓道大刻盤蛟鼉維時春載陽好鳥鳴聲和麗牲拜墓下冠蓋相駢羅山僧出遺墨保護百年多縱橫草八字恍若龍騰梭緬懷攜彘酒風雨渡江沱中原雖在望泪落如懸河安得起九泉執手野婆娑歸憩玄館夕涼風水微波詩成想丰采寤寐儻來過書畫舫小集送謝子蘭過江東分韻得雲字曲館衆芳歇方塘西日曛曲闌楊栁樹秋水白鵝羣謝公浮家隱囊盛惟典墳書畫船自操子前中細君胡不歸故里故里暗楚氛玉人張離筵髙軒水沄沄翼若青翰舟泛彼江之濆扣舷歌少海問字客如雲紏罰觶載揚探題詩屢分君言適江東研田事耕耘暫屈鴻鵠志組織雲錦文蹇豫風塵表孤陋寡所聞何日往從遊騷壇策竒勳自錢塘附漕舟泛海至石墩時至正乙亥嘉平草三日平生逺遊屐歷覽名山川北上齊魯境西泝荆襄船承平百年久關塞靜風煙道里不裹糧朝吳暮幽燕豈意戎馬生跬步那可前朅來錢塘城雉堞雲山連帶甲三十萬兵革利且堅中軍霍嫖姚智勇開三邊井邑百戰餘白骨蒿萊纒糧道又梗阻故里難回邅漕侯萬人傑餉運來江壖倉皇問歸路黃色眉間鮮太守敬愛客江亭祖離筵臨行重贈詩詩句清且妍暝投海門泊嘽急鳴哀絃長星蚩尤旗光亘奎婁纒修德弭天變聖主方求賢黎明衆船開張旗鼓闐闐推篷視海色雪滿羣峯顛龕赭天設險峽東崖倒懸英雄已陳迹濤浪猶掀天尚餘射潮箭錢笴大如椽揚帆出海口風靜波漣漣雪霽天宇髙眺逺意所便甬東山數點跕跕若墮鳶潮汐既有程往來誰使然昔人去己逺此理何由宣兹遊信竒絶豈獨坡翁專舟歸石墩浦微渦生頰顴戴星踏沙尾借榻營中眠盤餐薦蟹蛤調鹹異肥羶匪私一飯恩幸獲能生還人生涉憂患所貴道自全聊以慰旅懷長哦遂成篇賀梅子玉州判升同知崑山古婁縣肇自秦漢置沿革無靡常東西屢遷治張昭首錫爵習俗頗醇粹徂晉歷唐宋天挺生人瑞王李文武才范衛廊廟器流風尚不泯比屋敦禮義偉哉教養功必藉循良吏皇元集大統經國逺埀制乃俾縣升州秩視古男衛牧守責匪輕考最􅊀五事州介江海交梯航四方至擊築吹笙竽化居聮甲第邇年兵旅興連營舉烽燧征輸星火急慘慘民日瘁不有賢者出何以慰憔悴夫君列仙胄來作州佐二炯然玉壺冰豈受纎芥翳忍窮如鐵石蔬食不二味繡衣觀民風徒步屏車騎察君能盡職務德布恩惠上卿太尉府待君位不次區區貪墨徒朘剝崇貨利事露藉其家竄殛及輿𨽻嗟彼本無術視兹胡不愧蹇豫濩落材占畢守章句聊以紀之詩用告諸在位題畫禾梅雨暗澤國布縠鳴桑隂吳儂躬耒耜播種乃力任來牟既登場出水秧森森立苖本欲疏庶防稂莠侵嘉實秫埀田霑溉雨露深猗嗟周后稷萬世民所欽柏君天驕子遊宦非素心吮墨抽祕思新圖重南金如何祐陵筆只解寫花禽送章元師之汴梁孟秋天氣肅樓船出東瀛微風吹五兩初日明雙旌曉踰料角險暮泊淮隂城木落原野迥銜枚夜兼程大梁古魏地昔為宋東京吹臺尚硉兀艮嶽猶峥嶸弱冠曽一遊興懷動中情弩力保明節麒麟紀勳名送陳原夫還鄉遊子念鄉里囏時未得歸心逐征鴻去目送孤雲飛海內同文軌買舟婁之水春還雪己消方塘麴塵起江傾東固山遺廟荒墟間重經舊閭里感慨淚潸潸兒童喜君至烹鮮擊肥彘親知喜君還扶老兼攜稚握手話綢繆同尋昔釣遊始信還鄉樂猶勝萬里侯崑山五詠婁侯廟婁氓尚淫祀祠廟遍村墟疾病罔醫藥奔走訊羣巫椎牛釃酒醴婆娑樂神虞神不歆非類傳記言豈誣聖人制祭法有功則祀諸崑山漢婁縣舊邑禾與與婁縣名尚存今在城東隅張昭洎陸遜封婁肇自吳桓桓孫將軍仗鉞東南驅升堂拜昭母情好昆弟如策薨受顧命擁立運謀謨諫獵止酣飲禮下魏使車忠言不見聽託疾居里閭舉邦憚威嚴卒年八旬餘伯言雖後出智略雄萬夫權配以姪女數數詢良圖一從吕蒙舉乃修荆州書潛軍克公安徑進守宜都走蜀夷陵城蹙休夾石區相吳柄國命上疏陳立儲赫矣兩侯功彌久而弗渝太守念婁氓報本昧厥初淫祠既撤毁左道咸剪除改祠祀婁侯像設崇屋廬復覩漢威儀清風肅貪汙遂令此邦人車蓋相填於雨暘及疾疫走禱來于于穹碑紀顛末大刻龍騰拏于以告來者并解婁氓愚麗牲歌送迎萬世奠厥居王御史墓有宋建王極汴京鬱嵯峨仁化浹邇遐林林英傑多崑山雖僻左士風粹而和明經擢髙第踵接肩相摩御史鄉先生學術正不頗五傳究終始􅊀論訂舛訛粵在宣和間褎然中巍科初主麗水簿言事何委蛇説書輔春坊執法居諌坡從容答時相直氣凌太阿范公在館下詰責加切磋卒為廊廟器詞源浩江河髙弟沙隨程入室非操戈宋史書列傳耿耿名弗磨世變陵谷遷百年無幾何城南新漕里荆榛埋銅駝景行世仰止髙風激頽波門墻既有限樵牧安敢過再拜重興感臨風動悲歌荒苔封斷碣太息為摩娑李侍御墓散步城南門始得圎明里宰上木己拱泉下者誰氏披榛踏宿草羡門半狐豸勛閥表阡石云是侍御史力行敦古學名衡其姓李世家本江都娶婦居婁涘射策明光殿看花長安市出宰施善教矧肯猛政理至今松陵月清光照江水拜命登霜臺白簡冠獬豸上言論姦佞手將逆鱗批勢障狂瀾回屹立中流􅀈五賢不一肖賦詠光傳紀挂冠歸落菴著述惜寸晷碩學邃易經集傳發微旨豈唯淑後進千古埀範軌九原不可作清泪何漇漇鄉里衆富兒厚葬從奢侈黃腸題湊密劵臺文繡被可憐土未乾荒煙橫斷址後世仰髙躅庶激俗靡靡復墓限樵牧何異子朱子劉龍洲祠劉君廬陵秀胸次隘九州倜儻負竒氣辛陳同俠遊西登峴山首北望多景樓長歌過慟哭志在復國讐異材世間出髙揖輕王侯奈何攀桂手不能占鼇頭肆情詩酒間文熖射斗牛崑山非故里遂為潘宰留五十死無嗣埋骨東齋陬世代倐變易夷墓為平疇有司重封表立闕樹松楸何人奠麥飯淒涼土一壞建祠立神主買田供庶羞仁哉太守心祭祀亘千秋朱節婦墓節婦茅氏女嫁為朱虎妻主饋事尊嫜婉娩年方笄夫官水衡守舅長大農司餉饋轉渤澥功與鄼侯齊厮養紆青紫第宅切雲霓天道惡盈滿讒言致勃溪舅既瘦囹圄夫亦為孤纍節婦沒入官詔賜提點師衣袂結兩兒晝夜呱呱啼義不負所天矢死心弗移抗志厲節操師亦興嗟咨漕侯卯金刀拙菴比丘尼仗義出金帛以贖節婦歸幸脫虎狼口寄食居招提仰望浮雲馳目送孤鴻飛俯視齠齡子良人渺何之百感集衷腸形與神俱疲為婦當死節為將當死綏一病竟不起孤魂遂無依槥櫝自京邑歸葬婁江涯孝哉猶子謙具詞陳有司移文上臺省進奏對丹墀譬比曹令女夫死家誅夷勇烈雖少異操行豈相違請録付史館敦俗淑民彛制可出鴻恩甄表發潛輝荏苒三十年荒墳草離離落日下牛羊蕪沒少人知偰侯古循吏為善日孳孳大書刻堅石華表雙巍巍朽骨懷深恩豈獨邦人思感慨成五詠紀實匪干私送郭安道升憲椽太山何岩岩上與雲漢通流光洞相射照耀金芙蓉黃河水湯湯奔流去不已東下滄海深曽波渺無涘顧此河山美襟帶鄒魯疆扶輿孕神秀人物産賢良粵生我郭君秋水炯雙目清標頎而長碧梧峙鸞鵠結髮讀書史浩氣衝八虛嶄然見頭角頓與衆子殊周還丈室中左圖右文史父母有愈容鄰里皆仰企布衣束韋帶簞瓢恆晏如遊心羲皇上自許稷契俱出門天地寬飄飄逺遊志便欲凌髙風赤手搏虎兕西逾秦隴地東泝大江濆為愛九華好結茅栖白雲奈此堂上親鶴髮被兩耳家無擔石儲何以奉甘旨暫捧毛義檄菽水聊怡顔緬懷逺大器置身簿書間朝趨鴈鶩行暮歸問安否克孝復克勤天賦非矯揉耿介守貞潔剖決言便便俯仰洎十載東西郡屢遷冰霜操愈堅剛柔不茹吐黃堂飛薦章姓名逹烏府八月繡衣使持節江之東薅荆剃榛棘狐狸亦循蹤掄才惟若人修能獲舉援行看補舜裳胸有五色線黃梅雨初霽移文下桃州𨽻卒效奔走車騎擁道周班荆西郭門長途馬蹄疾遙望敬亭山草木似相識行行至蓮幕挺挺立霜臺平生多抱負今日良慰懷江左民力疲況乃苦徭役早夕被鞭笞征斂從何出貪汙挾勢權舞文肆凶姦朘剝民膏血那知稼穯難蒼生命如魚濈濈在網罟按行來何時問此民疾苦嗟豫一介士幸獲望餘光春風佳麗地文酒日相羊方期朝暮間坐聽談亹亹愰若秋空蠅弗得附驥尾丈夫志四海慷慨輕别離願言樹勛業髙步青雲梯陪陳彥博編修遊永壽寺積隂不成雨朝光散林丘郊原春意動薺麥青油油東岡直如矢隱見坼上州孤塔倚天外髙城枕江流江流去不返逝者如斯不所欣風日佳散步行夷猶豈憚凍泥滑言往梓峯遊梓封竹樹深好鳥鳴相酬梅蕊吹殘香飄雪霑衣裘慨想吕王孫掉臂辭封侯建兹阿蘭若施以良田疇憶昨結搆初甲子方一周香鐙夜逹旦奉祀綿千秋志異蚩蚩氓泯滅同浮漚壽師禪門秀參學踵前修神駿憐支遁詞華擬湯休倒屐出迎客茗供相延留寒菘肥勝肉采掇薦新篘物豈有定味適口為珍羞語深俗慮釋水木生清幽元龍湖海士朅來客滄洲留題紀雅集佳句鏘琳球蹇豫髮種種孤昧寡良儔願為蠅付驥來往結綢繆送崑山偰知州調嘉定鴨緑漲江水鵝黃上栁絲二月婁東道燕燕初來時婁有賢使君白晳美丰姿聮芳五枝桂不數竇家兒豈弟民父母古希今罕有使君不我留涉江采楊柳柳絲弱嫋嫋江水流瀰瀰柳衰江水涸邦人思未己賦得菊隱菊如隱君子豈逐桃李妍嚴霜萎衆草獨秀秋風前采擷充服食甘馨能引年夫君豐城劔光獨牛斗躔韜采不自獻與菊同貞堅孤標迥髙潔豈隨寒暑遷決獄有隂德勉旃企前賢耕讀軒集陶詩少無適俗韻貧居依稼穯農務各自歸耕種有時息道喪向千載聖賢留遺迹遊好在六經疑義相與析在昔余多師玄鬢早已白羲農去我久素抱深可惜種桑長江邊開荒南野際星紀奄將終風雨縱橫至既耕亦已種及時當勉勵收斂不盈㕓冬日淒且厲時還讀我書竟此嵗月駛緬焉起深情懷役不遑寐守拙歸田園鵕鸃安足恃題趙希逺萬松金闕圖峥嶸閬風岑杳渺蘂珠宫紫皇中建極金闕凌萬松雲生金毋帳日射玉女窗鳳鳥鸞鶴儔嘯歌聲􅗳􅗳劔佩百神集軒蓋羣真從廣樂奏鈞天洞章吟飛空東華主校籍南昌司考功丹書石室閟瓊簡金泥封下視尸行徒不啻糞壤蟲驌也富文藝疏𣲖天潢中凝神入遐想含毫寄遺蹤粉墨落縑素樓閣間青紅安能往從遊伏闕陳丹衷願乞愚與魯老為田舍翁露筋廟書謝瓊樹所藏米南宫帖後南踰召伯埭北望髙郵城舍舟陟平陸散策舒羈情蕭條原野迥寒日慘光晶行行止叢祠虛堂走鼯鼪不知誰氏子中坐莫與京父老告我言斯女志堅貞馳驅喪亂餘與嫂同晨征迫暮不得還沮洳聚蚊虻嫂居耕夫舍女宿野嬛嬛失節泰山重視死鴻毛輕黎明筋己露遍體膏血頳廟食崇象設春秋潔粢盛我聞父老言感慨淚如傾猗嗟五代時鼎沸紛戰爭廣陵行密據民飢日搶攘刲剔挂屠肆何異牷與牲孫儒入髙郵驅民以為兵貞女蕙蘭質肯同蕭艾榮緬惟丁斯時辟地故逺行寧甘野宿死不就有幃生白玉豈受汙殁身埀令名矯矯長樂老喪亡亦屢更四姓歷十君靦然秉鈞衡所以米外史穹碑勒新銘謝君雅好古模拓比瑶瓊賦詩悼貞烈字字鏘金聲俯仰舊遊時海內尚承平荏苒三十年繁華變榛荆豈無青雲士徇國輸忠誠却憐偷生者犬豕加簮纓掩卷三太息青燈照孤檠愛日堂旭日曉蒼涼流暉照髙堂堂中何所有鶴髮明秋霜斑斕綵衣子眷戀延飛光養志奉甘膬介壽陳華觴曉景薄桑榆喜懼心皇皇願日不出沒長在天中央倪雲林天平山圖峩峩天平山秀色橫具區龍門兩崖束壁立削鐵如嵐深蘿磴滑岡回樵徑紆野禽鳴聲和岩樹清隂敷遐觀見夫椒一點煙中孤俯視白雲泉慘淡在有無繄誰抽祕思歷覽摸新圖仿若楚米顛乃是吳倪迂斯人不可得安能相與娛笠澤春水生悵望正愁豫題待渡圖停驂長林下送目大江表故園雖在望山徑尚深窈招招舟子來一葦橫波小松菊倘猶存歸耕逺紛擾倪雲林竹木圖初陽被原隰微風度簷楹修竹弄晴色嘉禾敷春榮君隱笠澤上觀物以怡情寫生寄毫素持贈重瑶璚放鶴亭胎禽本仙驥駕馭同鸞皇渴飲金莖露飢餐珠樹霜雪蹊留篆迹月夜候笙簧暫别踰蓬海偶下息芝塘芝塘虞仲里奕葉何蕃昌窈窕小亭靜矍鑠阿㜷康朝迎板輿出暮導板輿翔引吭隨舞綵卯頸侍稱觴一舉衝霄漢重來感喪亡道園遺翰墨鐵史志文章俯仰人間世須臾變海桑幽居圖混混幽澗泉鬱鬱嘉樹林水木互膠葛頗愜靜者心書翻白日靜鳥啼青嶂深兹地可佚老聊以投吾簮題米元暉雲山圗山橫鑑湖曲水落剡溪濆岩扉撲蒼雪石林生白雲回轅謝逋客采芝招隱君安能馭風去結廬逺塵氛訪薛鶴齋真人不值英英三素雲璚樓出林莾中有仙者徒冥栖在其下手握造化機足攝天地户我欲往從之凡骨未能羽唯見碧桃花循流出溪滸送權上人兼東諒虛白講師釋書經律論中分大小乘繇漢歷唐宋翻譯卷帙增微義浩河沙究竟諒未曽權師未識面聞譽如雲騰兹登雨花堂聞妙心源澄庭眠惠逺鵝臂駕支遁鷹天池九萬里扶搖自此升為言虛白翁歸休理寒鐙耕學齋集卷四
