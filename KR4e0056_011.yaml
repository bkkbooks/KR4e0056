body:
  text: 耕學齊詩集卷十一明袁華撰律詩七言題吳景諒草堂疏後太息神州巳陸沉歸營别墅擲朝簮閒居自得安仁趣樂志仍存長統心架竹依垣開鶴慶鑿池引水置魚罧誰云海內無知己周魯髙風重可尋送洪宰相使還髙麗回望三韓雲海間趨朝竣事又東還乘槎夜渡魚龍國持節朝辭虎豹關帶礪山河稱漢輔疏封爵土擬周班來承王命勤修貢棣棣威儀重可攀次韻奉答張雲門應召北上開遍南枝鄂緑房虛齊坐對挹清香春浮髯頰杯中物寒澀笙匏腹內簧諸子客梁文最盛兩生在魯學尤長軺車趣召趨天祿賜食從容得屢嘗送秦仲方崇明儒學訓導明詔春頒出紫宸黨庠遂序法成均運籌廊廟皆熊虎奮跡丘園盡鳳麟七步詞章年更少一門孝義老彌醇清朝偃武崇文化始信儒冠不誤身海雪軒海天漠漠雪紛綸橫槊馮軒欲問津蓬嶠有山皆削玉桑田無地不揚塵絮穿蜃窟樓臺曉花壓鮫宫觀闕春待泛仙槎凌汗漫絶勝放棹剡溪濵送陸原祥還江隂十年為客昆丘下把酒臨風語笑同南越稱臣歸陸賈東吳辟地識梁鴻異鄉第宅蒿萊外新國河山雨露中錦服晝還春政好河豚魚上杏花紅送劉鍊師還龍虎兼簡祝洞天周白士海上東還獨杖藜栁花飛雪亂鶯啼琅函寶籙皇人筆玉檢丹經外史題聖井山開龍起蟄璚林臺逈鳳來栖洞天白士今何許猶憶西湖手共攜次韻答秦仲文校文東觀繼前賢歸隱蕭齊日草𤣥汲冡周書讎螙簡穀城黃石授韋編怒撞玉斗鴻門宴淚落金銅漢苑仙覽古懷今莫惆悵還聽稷下衍談天偶成不能捭闔與從衡嘯傲丘園養性情燕雀安知鴻鵠志麒麟終異犬羊生茅櫩雪霽書聲逺楮帳風微夢寐清但願太平身健在一犂春雨課兒耕寄石仲濂市舶野雉朝飛麥滿田春明澤國靜風烟魚蝦蟹蛤三江市象貝珠犀百粵船暫把檳榔盤內薦肯將薏苡槖中還酒杯逺寄承相憶遲子歸來對月傳寄印月潭講師梓樹峰頭日色冥杖藜徐步過巖扃道腴已味中邊蜜心定能馴大小青隂合竹窗雲散漫聲來草閣雨淋泠也知丘壑因人勝未必山川自有靈次韻酬張左司墓田丙舍郭西頭霜露凄然又暮秋千里故園歸夢覺五更殘月向窗流蓼莪詩廢門生誦風木情牽孝子憂少展經綸佐戎幕碧瀾堂下放船游寄興聖琦原璞每懷宴坐月當庭石室堂頭老寧馨家廟至今傳邑子平湖無復墜天星猊牀花妥揮談麈龍鉢珠明護賜經不叩禪關己三載新松應長過檐青素華軒素封家開素華室乃在練祁之水旁千樹梅花渾是雪一庭月色只疑霜神遊空洞生虛白潛心內景修中黃未饒剡曲多清思乘興須當泛野航過南翔寺簡勝仲殊齊公昔建阿蘭若唐刻今存窣堵坡井邑人非雙鶴去江鄉日落一舟過夜壇暖足無𤣥兔曉室聽經有白鵝問訊東林蜜殊老中邊之味近如何寄金西白次韻秦文仲金爵觚稜臺殿重隂隂寶樹瑞烟濃龍章上揭文奎麗象教東傳大國宗特進禪林開士首絶勝侯爵太中封遙思對榻南莊夜杖錫何時得再從送偰公文出使髙麗還京師煌煌龍節海東還不易冠裳立筍班惟用一言通絶域何須三箭定天山陪臣奉表梯航至異姓封王誥印頒陸賈當年成底事寶刀游騎未吾慳西雨軒拄笏朝看爽氣生捲簾晚見濕雲橫漏天未補媧皇石噀酒俄傾蜀客觥閶闔風來先拂奧桑榆日薄又開晴載歌暮捲西山雨始信王郎負盛名送盧公武應召北上前朝圖史己全收詔起丘園重纂修治定功成遵禮樂大書特筆法春秋金壺墨㵼朝揮灑銀燭花銷夜校讐進卷內廷承顧問鵠袍端立殿西頭書聲齊為錢生賦幽人讀書茅屋底況是前朝忠孝家宛若商歌出金石又如長嘯隔烟霞風傳清漏音相答雪灑虛窗韻更嘉洛下諸生應效詠却憐司馬聽琵琶直沽即事鸞輿北狩神京日車騎回屯海浦秋草地霜寒散駝馬旃廬日夕下羊牛革囊桐酒醺人醉蘆葉吹笳動客愁可見太平忘武偹踏歌頓足擁貂裘沙門宛在海東邊白浪漫空霧漲天屯衛逺分貔虎隊島夷潛匿蛋蠻船蓬萊清淺髙秋見碣石蒼茫落照連應笑嬴秦那解事虛勞徐市訪神仙送盧拙暗遊茅山盧郎抱琴别我去駕言往采茅山薇三峯月下木客嘯丹陽湖中姑惡飛筍輿問程溪店逺芒鞋躡雲林徑微歸來袖有長生藥乞取刀圭意莫違無題玉樹參差障羽幢舊愁如水漫春江葳蕤鎖合收銀鑰窈窕樓空閉綺窗軃鳳橫叉終作對舞鸞窺鏡强成雙繡屏倦倚看紅豆滿眼相思意未降環珮珊珊下漢臯璚樓風度鬱輪袍琴心寄興傳孤鳳華意留情屬小桃金粟柱移筝上雁玉蓮杯舉掌中醪乘鸞一去無消息腸斷神仙夢寐勞燕語銅樓淑景移鏡臺香冷玉盤螭書傳王母三青鳥針度天孫五綵絲江浦見蓮難覔藕石枰尋子未圍棋獨憐鸚鵡知人意飛傍琵琶索荔枝裙曵湘羅漾麴塵雀叉小佩玉麒麟紫簫偷按雲中曲彩筆慵傳鏡裏真蝶粉膩花金作縷鴈沙回雪翠為茵若蘭錦字多華麗不減風流賦洛神題張外史登善精舍隂森水石林堂幽六月倣佛如三秋髙遁何慚孔車騎舊逰還憶董糟丘鶴臺夜禮紫虛象鳬舄朝回黃篾樓願乞引年餐玉法頡頏飛佩閬風頭送唐希顔入京師挂席清江勝駕車栁黃梅白雨晴初不師鬼谷從衡術獨善庖羲卜筮書繞郭烟花春日麗對床風雨夜窗虛便郵頻把音書寄莫待慈親暮倚閭瑞上人逺碧亭亭子新開片玉東馮虛舉目送飛鴻水窮鼇背三山小雲淡蛾眉兩黛濃詩詠墨華懷貫老記存竒字憶揚雄知君覽勝多佳趣盡在秋風落照中寄天衣淨天鏡長老㑹稽名郡素多賢翼舉髙風更凛然金縷賜衣梁代日紫檀遺象義熙年千峯秀色層檐外雙澗清流絶磴邊遙想升堂談法罷匡牀鐙火理殘編竹園寺裏昔曽逰彈指流光十六秋諸剎每傳新學起一簞猶為故山留文詞雅正推裴栁詩句清妍屬徹休湖海老成凋謝盡杖藜何日浙江頭用韻奉答徵懴原憶得相逢春未深别來紅雨遍園林江湖契濶勞清夢田野栖遲愜素心萬壑千巖應眺覽五時八教重披尋天親無著難兄弟剪燭何時對榻吟江山如畫軒楊子為郎鬢未皤旋開小室枕巖阿江如赤壁英雄少山似新亭感慨多林末濤波來一線雲邊龕赭淡雙蛾衰年不減登臨興擬待清秋著屐過林泉民為張某賦鹿豕同遊說野情一㕓願受作編氓窮幽擬草愚溪記養拙甘從甫里耕春澗蕨拳和露采秋林木耳帶霜烹淮南有客歌招隱莫遣兒童識姓名癸丑正月風雨中偶成入春彌月雨霏微驚蟄無雷雪又飛撫節不愁花蘂晚感時惟恐麥苖稀當歌對酒愁難遣問舍求田志己違只尺相望不相見空吟逼側思依依嵗除風雨浹新正二月將終未放晴殘雪不消猶待泮輕雷欲震又收聲樵蘇後爨愁童稚故舊凋零失老成推枕無眠清夜永淋淋簷􅘇百憂生西爽軒層軒新築澗之濆日射丹書草木薰天末火流秋沆碭岡頭玉潤曉絪緼清寒恍對晴山雪散漫如瞻華嶽雲不似滕王髙閣上珠簾捲雨又斜曛寄倪雲林先生人日才過春未深滿城風雨晝隂隂又逢元夜傳柑燕恰似重陽泛菊吟字寫硬黃當几畔硯分淺碧到溪潯從它狂客時推罵笑對青山酒自斟過廣陵十年不到廣陵城依舊璚芳弄晚晴繡被土甎于闐寺寶􅋔刀劔鎮南營樓飄簫鼓雲中起地接烟花日外明小杜風流今寂寞誰攜紅袖按新聲參軍吹作鳯凰鳴草四橋頭璧月明欲把璚芳祠后土還持彩筆賦蕪城小樓窈窕低金縷别館蒲蔔下玉罌醉寫烏絲遺所愛風流髣佛記三生郭晞仲新莊抱郭春流帶草堂四檐桐梓曉蒼蒼百花潭上詩人宅五渡溪頭處士莊且喜比鄰連伯娣不愁行酒少兒郎西郊從此頻相過剪燭論詩夜未央珠金沙將軍為國仗安危勢弱兵孤謾出師江左望風如破竹沙邊背水尚張旗可憐吳楚三軍潰始信襄樊一木支揚子秋髙波渺渺木綿春盡草離離登桐川郡樓桐川郡樓一登覽好風東來吹酒醒數里已分吳楚地百年如寄短長亭鳳凰逺舉梧桐老燕雀生成桑柘青虛名得失何足論更盡沙頭雙玉瓶酒酣倚闌西日暮青山當户如髙人銀杏樹隂不受暑薔薇花開猶是春目送雲霄瞻羽翮手捫河漢近星辰莫欺老子才情减還據胡牀岸角巾寄子明兄我兄三月適上國賤子定省臨髙堂慈親病已勿湯藥弱女手解縫衣裳五雲樓觀烟花麗萬里河山日月光司馬多才年更少擬將詞賦獻長楊次韻奉答盧伯融見寄東老書多未是貧瘦生誰念苦吟身雲橫馬首山如㦸月過階前鵠似人蘇武流離終仕漢揚雄寂寞却歸新冥鴻肅肅清霜重獨倚髙秋落木津送雷太守赴武寧前席親承大府開武寧政迓使君來也知劉項爭雄地須得龔黃治郡才芒碭嵌空當野斷黃河如帶抱城回理閒引客登髙賦應在重瞳戲馬臺寄休寧宰唐子華盡說休寧邑宰賢清詩多與畫俱傳彈琴埀簾白日靜種花滿郭青山連葉縣歸來候鳬舄漚波浩蕩放漁船公餘鎮日渾無事好寫新詩寄一篇次韻鄭明德喜雪水曹東閣靜無塵㘴閲飛霙若似人簡授兔園曾作賦律吹燕谷欲回春緗枝梅放花無賴白戰詩成筆有神遙憶龍沙三萬里望中馳道爛如銀朔風吹雪遍原野誰卧衡茅若凍蠅玉署寒生催賜酒金槃光動憶分冰絮穿閣道粘珠箔花重旃房壓綵繩田野何由稱賀表五雲髙御六龍升次韻秦文仲暮春見寄三月江南暖尚微雨餘草色故菲菲野棠自發真娘墓烽火猶連道士磯謾說尚方封事少未聞南國羽書稀何人得似秦文學小閣褰簾看燕飛江南春盡子規啼愁裏看花思轉迷乳燕定巢當户語斷虹截雨傍江低斬鯨政欲提三尺簮筆何由侍兩閨滿眼干戈連海岱置身安得月中梯寄于彥成嶽季堅雪霽平蕪帶曲村思君白髮照清尊嬌鶯恰恰花連屋稚栁青青水到門江閣遙山來逺碧草堂新月見纎痕風流二子居丘壑賦就停雲一斷魂夜宿東閣夢中燕逰甚適覺而梅影上窗橫斜可愛口占一詩以紀梅花千樹草堂南花氣浮空若霧嵐姑射山中春自好羅浮天上夢初酣蟠桃謾說瑶池晏仙桂徒誇月窟探萬里仙遊才一瞬不知雙鬢雪鬖鬖綵燕剪開雙尾出烏衣便逐叉梁小鳳歸曉倩嬋娟紅縷繫春迎倭墮翠蛾飛香銷金屋花無語影落粧樓月有暉慚愧年年一相見秋娘老去鬢雲稀寄虞子賢虞仲園池芝水濆華林曲館逺人羣一編豈為窮愁著萬石猶能孝謹聞玉躞金題書滿架錦衣珠履客如雲悠然坐挹西山翠寶鴨焚香到夕熏清明日偶成舍南舍北栁如城故著離黃燕子鳴莫向鏡中嗟種種且於槽下聽棖棖清童解誦髙軒過好客應須倒屣迎坐對梨花浮大白人生看得幾清明丁未紀事二月春城桃杏妍黃花離落景蕭然表忠曾護錢鏐墓至德惟稱太伯賢千古英雄徒有録一時讒佞己無權早知鞭背東城路悔不歸耕負郭田列壘連營日戰攻脫身虎落自從容但知蜀國專王建尚記虬髯擬太宗冠服未遵唐制度河山己入漢提封一時佞幸空遺臭拜賜黃金口齰癰入參帷幄運竒謀翼贊功成禮數優華蓋醉樵周尚父軍營借箸漢留侯有身暴露家千里無骨歸埋土一壞多少門生并故吏不知還有孔車不登臺入省總權綱坐擁全軍勢力强檇李未聞丞相死㑹稽先報大夫亡提孩感動猶埀淚行路興憐亦斷腸借問誰能為此計斯人今己葬江鄉熏天富貴復何求又欲飛行駕鶴遊董卓臍燃郿塢日嵇康兵解洛陽秋誰人浙黨攻閩黨此輩清流投濁流栖老園中荆棘遍圍棋墅裏鹿麋游敵國兵連地數侵壽藏髙築遍山林嫖姚破虜辭營第太傅還鄉散賜金隴卧牛羊春短草穴穿狐兔夜堂深清明麥飯無人灑日落風顛呌怪禽馬公著見山樓徙倚霜林萬木秋好山都在馬家樓大江西上經秦望巨壑東傾見沃洲半夜書聲天外落四檐雲氣座間浮登髙作賦休懷土擬泛星槎問斗牛送嘉興經歷茅某之松江府判桞塘水漫曉揚舲離思亂逐花冥冥芙蓉舊種參軍幕芍藥新開判府㕔三江龍蟠走海白九山鳳舞入雲青理閒覔句坐長日芳草芊眠春滿庭巢雲軒三素雲中結一椽致身蕭爽思悠然自怡逺效陶貞白覽秀重懷李謫仙氣合虎龍交鼎內影隨鶯鵠宿檐前肯輸艮嶽為朝貢擬化商霖潤旱田寄盧伯融乘桴東下避風烟矯首淮雲思惘然漲海塗泥皆樹藝授經子弟總才賢青鳩紫蛤嘗登饌金橘紅椒不論錢白髮滿頭俱老大冶遊花底憶當年浮家南北久離羣知爾移居向海濵白首一經能教子黃茅千頃比封君異鄉花鳥皆春思故國關山半夕曛何日酒船還舊里青山對榻坐觀雲寄梅林普慶二長老恢復初首座彞天倫藏主諸子才華老更成自慚蒲栁易凋零梅林兵後山如赭普度春還樹似屏塵拂寶花分半席几翻貝葉校羣經彞公閲盡毗盧藏立雪堂中有寧馨庚子十一月望日大星殞于西南嵗十一月大星殞斗柄插子夜初更焰光燭地散霞綵芒角經天如月明春秋重犯災異見田里厭聞愁歎聲臨風勸汝一杯酒海宇何日歌升平客甫里白蓮寺答顧玉山見寄風流王湛豈真癡世路﨑嶇蜀道危獨酌花前明月我百年駒隙主翁誰南州名節稱髙士亂世功名屬健兒海內承平欣有象憂天莫作杞人悲滄浪一曲繞茅堂投老歸來賀監狂鸞鳯豈因梧竹止鴈鴻亦為稻粱忙榮名身後嗟何用濁酒生前醉不妨雪裏梅花逈髙潔結交嵗暮莫相忘江村十日雪不消茅屋難禁風怒號髙隱何殊醉侯放浪逰端似水仙陶大星中天光煜煜孤鴻斷野聲嗷嗷老夫畏寒閉户卧那辭百罰醉酕醄寄蔣都事憶得吳門話别時亂離十載信音稀盈顛白髮今吾老滿眼青山往事非天上郎官應有象江南倦客尚無衣遙知李監歡迎處繡服當春又晝歸水月清華亭晝錦堂中結小亭方池如鑑照檐楹山河影落鮫宫逈蘋藻光涵兔魄明神女凌波遺玉佩素娥飛轡下瑶笙一塵隔斷人間世獨倚髙明爽氣清賦得禹廟送人之越代作大禹神功别九州巍巍古廟越山頭𤣥圭告錫昭成績洪水懷襄息橫流雨濕梅梁靈物化香凝龍衮瑞烟浮送君再拜瞻遺象夢叶熊羆在運籌雪山圗雲氣浮空髙復低石林茅屋望中迷山回鳥道青天上水落魚罧碧澗西欲訪松喬窮絶頂直捫蘿葛躡飛梯歸來城郭還依舊㘴對新圗賦紫溪唐本初西郊草堂草堂小築西郊外孔杜風流尚未隳豈但山靈回俗駕還因録事寄新詩栁塘飛燕穿書幌花墅啼鶯近酒巵從此門前多轍跡老翁莫厭客頻來次韻劉伯叙送鐵教授奉表入京廣文拂曉發東瀛函表乘軺赴帝京雙闕逺瞻龍虎氣層臺重聽鳯凰聲花迎綵仗春風軟栁映宫袍曉露清況是江南佳麗地金尊莫惜倒烏程重韻寄劉伯叙恩榮曾錫燕蓬瀛五馬西來自玉京江左衣冠傳舊族海濵歌頌動新聲蒲輪結駟登金馬茝石聽鶯覲紫清此日牛刀聊小試還居台輔定章程耕學齊詩集卷十一
