body:
  text: 耕學齊詩集卷十二明袁華撰絶句題野航壁緑水滑可染白石明可把髙林落秋聲誰船繫其下顧玉山園池十有六詠碧梧翠竹堂桐花落銀床竹色被蘭渚六合飛炎埃髙堂不知暑玉山佳處玉山最佳處窗户絶纎埃門無俗士駕禽鳥不驚猜釣月軒閒耕山中雲坐釣溪上月仰看白玉釣下埀紫貝闕湖光山色樓嵐起天邊雨帆飛樹杪風湖光與山色倒影畫樓中芝雲堂堂隂有竒石如芝復如雲望雲懷友生采芝招隱君漁莊公子不好獵小莊濠上居長船載大炬清夜看義魚種玉亭采得崑岡玉連雲種小亭月華潤靈雨虹彩燭蒼冥百花潭朝乘百花舫暮醉百花潭纎纎潭上月流影照清酣小蓬萊露下仙人掌雲生玉女窗弱流三萬里飛度寶魔幢可詩齊東閣觀梅放西池夢草芳絶勝驢背上風雪灞橋傍浣花溪花迷巷南北水接壤東西行春向何許只在浣花溪栁塘春燕尾艎飛水鵝黃栁覆隄水流花似雪疑是武陵溪小遊仙麟晡麻姑劈桃花緱母栽天家青鳥使飛去復飛來讀書舍芳草生書帶香藝辟螙魚鈎簾雙燕入長日坐看書鳴玉洞此君有清節髙居在空谷吹簫躡鳳翎珊珊鳴佩玉金粟影金粟花千樹銀河月一輪舉杯邀對飲天上謫仙人采上人南澗圗箕踞長松下溪流如白雲美芹采南澗可以奉吾君溪山髙士便面楊栁拂溪流風牽荇帶柔前山青可數停楫坐船頭題李嵩㑹茶圗穀雨初晴花亂吹金河春水膩如脂挈瓶小試團龍餅想見東都全盛時春日偶成次韻竹樓曉日明踈檻松徑清飈度曲櫺逺水微茫雲外白邊山縹眇雨中青南髙峯下前朝寺寺有髙僧兩耳長當記清秋凉冷後桂花深處坐焚香坐深魚鳥自相親野老忘機欲卜鄰栁外飛橋新雨過桃花水漲半篙春次韻顧仲瑛書杜氏便面乳燕初飛藕作花秋娘二八髻雙了臂韝微露真珠絡疑是錢塘舊內家楊鐵崖顧仲瑛葛元哲約祭張貞居或者以它事所牽弗果元哲有詩謹次韻以速成之湖隂窈窕畫船開誰酹荒山墓上苔明日歸舟載春雨風篁靈石幾時來香滿藝窗晝未開白鵝湖上卧蒼苔山風宿草吹新雨尚有髙人載酒來西湖春日雜興栁淡鵝黃雨弄晴斷岡泥滑竹雞鳴便須移席長松下坐聽風泉落澗聲北瞻靈鷲山圍寺東望初陽樹繞臺昨夜龍泓新過雨亂流花片入城來西郊草堂對酒口占一㸃飛花落酒杯大江如帶草堂開尊前怪底天香滿人在瑶臺月下來吳江道中淡雲收雨動微風山色湖光慘淡中雙漿夷猶坐天上不知身在水晶宫上巳日晚步商墓西村桑葉青時戴勝飛紅紅白白映柴扉棗花欲落繅車響連臂行歌緩緩歸商溪溪上日初晴豔粧綵服踏春明桑樹葉圎蠶出大布穀夜啼郎起耕葉暗柔桑花亂飛新蠶如蟻燕初歸紡得麻紗連夜織為郎製作下田衣客吳興春日偶成曽聽吳門唱大隄只今惟有野烏啼故人魚雁馮誰寄江水無情日又西龍鳳山青露兩尖溪頭把酒月纎纎從教栁絮霑書帙滿地春風不捲簾榿林日暖蕨芽生桑隴風微布穀鳴客子思家政愁絶長松吹雨落溪聲雙眉刷翠小紅娘斗酒梨花為洗粧一曲纒頭不知數揚州城內善和坊深鎖春風罨畫樓杏花香裏醉扶頭何人得似任公子相府蓮歌不解愁杉峯雙鸞壽意便面集句橫玉呌雲清似水松杉峰外亂山青近得麻姑書信否夢中同躡鳳凰翎天基莊菊花仙子乘風過赤城金槃玉露掌中擎月明解佩江頭去五色雲霞擁絳旌寓綽墩壽寧菴栖禪窟畔好髙樹三靜境中皆白雲己翻瞿曇內外典更禮茅家大小君北山何處境清絶藤軒隂隂生晝寒明月飛來散清影金沙布地為君看桞塘春軒口占橫雨狂風三月餘栁塘水漲起潜魚花明蘭渚坐埀釣葉暗藝窗好讀書快雨時晴暖尚微小亭簾幕護春暉麯塵波動鳬雛出金縷條長燕子歸送寧伯讓還南臺分韻得來字落日楓江水似苔畫船撾鼓大帆開柏臺一夜清霜重併逐秋風白雁來顧玉山客嘉興春暉樓前木芍藥盛開因誦張平昌所和令狐祖公别牡丹詩曰平章宅裏一闌花臨到開時不在家莫道兩京成逺别春明門外即天涯因次韻别賦五首同寄真態生香解語花臉酣春酒醉兒家陳王謾倚能詞賦翩若驚鴻洛水涯萬卉千葩孰與京故人相見眼偏明金槃玉露傾朝日似對春風訴不平爛熳春暉玉一闌香籠繡幄醉中看于今寂寞西園裏無奈羅裳怯暮寒三九清齊修洞房小樓午夜禮虛皇殷勤金碗收花露留待研朱校玉章穀雨初晴三月時燕飛簾幕晝遲遲主人不見花開落欲倩徐熙寫折枝怪雨顛風春事非蜻蜓蝴蝶作團飛端端老去才情减不奈輕寒薄縞衣水仙圖集句疑似瑶臺月下逢强擡青鏡欲粧慵風吹仙杖飄飄舉五色雲車駕六龍宣和翠織成雪沙雙鴈圗鴈沙飛雪爛于銀共詫宣和製作新何似帛書歸上苑暮年冠劔畫麒麟題鄭所南畫弓劔空遺瘴海涯南冠悵望淚偷埀滿頭白髮心如鐡自寫幽芳慰所思鄭君獨行今重見圗畫仍兼著述存多少梁園舊詞客長裾又曵向誰門吳緣鸞像身􅘳於莵手執書鍾陵山峻路﨑嶇當時只合華陽去日寫黃庭禮紫虛黃葵蛺蝶圗金莖傾日露華晞漢苑秋髙燕己歸賴有多情雙蛺蝶翩翩時近鵠袍飛馬逺所畫握扇楊后題識于上金粟花攢壁樹開月明露濕玉階苔尚餘數疊香痕在曾向坤寧殿裏來列子御風像四十餘年鄭圃居居人不識獨耽書九天寥廓泠然去安用回風畢道車吳仲圭墨竹風生太液水微波霜影侵階月色多截得昭華蒼玉琯多情簫史奈愁何直沽偶成草低沙軟見牛羊烟霧蒼茫落日黃燕女如花不相識笑傾馬湩勸人嘗海霧昏昏水拍天馬牛遺矢滿平川翻思五月江南道萬木清隂呌杜鵑貍奴窺蝶圗黑睛如線午風清賈勇潛身勢不驚莫向花隂窺蛺蝶街頭鼠輩政從衡過清江浦八里莊頭淮水長清江浦邊楊栁黃楚女窄鞾小錦袖醉歌竹枝行玉觴過能拙翁蘭若鹽鐡塘邊草色齊我居塘東子塘西興來相過不相問自把新詩竹上題二月草九日逰董氏墳菴次錢成夫韻明朝二月三十日三分己過二分春莫思萬事且飲酒林外提壺亦勸人草堂清集芙蓉小苑落秋紅聲動帷犀瑟瑟風共說揚州月無賴紫鸞簫裏露臺空繡被熏籠護暖雲酒痕曽上繚綾紋秋風草閣梧桐雨清坐張鐙校玉文秋風細細動青蘋甘菊决明開漸新禾黍登場雞犬靜買魚沽酒醉比鄰清弓軒棹歌東洄瀛海望蓬山西上昆丘遡九灣四櫓撇波橫鴈翅恍如鶴背載笙還三十六陂春水生一百五日又清明輕帆低拂桃花雨醉踏船舷歌濯纓水落天門放順流何須百丈打磯頭郎歸不化身為石重掃蛾眉兩㸃秋趙魏公黃葵天上王孫白玉堂曾瞻黼扆御袍黃寸心傾日應多渴露㵼金莖賜一觴仙山樓觀圗萬山起伏如波浪中有璚樓暗靄間憶駕松顛騏驥去亂雲堆裏聽潺湲栁塘雙鷺楊栁眠溪春水生舂鉏並立眼偏明莫思灘瀨魚蝦美忘却雲霄萬里程顧定之墨竹八法從衡篆籀文墨池春水蕩湘雲任它門外風埃滿日報平安有此君題仕女微步瑶階不動塵妖嬈豈慕宋東鄰手援仙桂沉吟處誰是龍頭苐一人不使鉛華汚玉肌內家粧束入時宜欲隨女伴尋芳去只恐西園蛺蝶知枇杷白頭枝上花開才嵗暮葉間子熟又春殘何緣山鳥頭先白錯訝韓家金彈丸黃葵圗玉階桐葉委清霜青鳥西飛漢苑荒猶有金盤仙掌上獨承湛露向朝陽梨花乳雞圗乳雛出㲉老雌鳴石上雄呼喔喔聲同入春園拾蟲蟻梨花雪白近清明送王鍊師逰龍虎兼東周白士祝洞天古洞曽窺一線天歸來塵世又千年笑騎遼鶴閩山去荔子花開海月圎磷磷白石龍泓下泉落清池月半彎憶與仙都周白士鈎簾把卷對南山耕學齊詩集卷十二
